name: portable
description: Portable skills for Codex, OpenCode, Gemini, and other agent systems

skills:
  allowed_frontmatter:
    - name
    - description
  strip_fields:
    - slug
    - version
    - status
    - category
    - targets
  exclude_skills:
    # residential_multifamily ships only via Claude Code / Desktop surfaces;
    # its overlay contract is not portable-safe. Pinned by
    # tests/install_smoke/test_portable_zip.py::PORTABLE_EXCLUDED_SKILL_SLUGS.
    - residential_multifamily

agents:
  required_fields:
    - name
    - description

commands:
  forbidden_fields:
    - name

hooks:
  variant: portable

manifest:
  strip_fields:
    - userConfig
  overrides_file: null

orchestrators:
  include: false

mcp_server:
  include: false

calculators:
  include: false
