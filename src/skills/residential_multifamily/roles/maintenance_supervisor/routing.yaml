pack_slug: maintenance_supervisor
pack_type: role
priority: 30
triggers:
  explicit_phrases:
    - "maintenance supervisor"
    - "maintenance backlog"
    - "work order triage"
    - "turn pipeline"
    - "make-ready"
    - "preventive maintenance"
    - "life-safety audit"
    - "vendor scorecard"
    - "repeat work order"
    - "P1 SLA"
  implicit_signals:
    - "asker is tagged role=maintenance_supervisor in session context"
    - "request concerns unit turn, work orders, or preventive maintenance at one property"
required_axes:
  - asset_class
  - segment
  - form_factor
  - lifecycle_stage
  - management_mode
  - role
optional_axes:
  - market
  - submarket
  - output_type
  - decision_severity
fallback_behavior:
  missing_required_axis: ask_user
  missing_optional_axis: proceed_with_default
