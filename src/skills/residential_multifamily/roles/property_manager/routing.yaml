pack_slug: property_manager
pack_type: role
priority: 30
triggers:
  explicit_phrases:
    - "site ops"
    - "property manager"
    - "weekly ops review"
    - "monthly property scorecard"
    - "site review"
    - "PM report"
    - "on-site operations"
    - "delinquency review"
    - "maintenance backlog"
    - "turn pipeline"
    - "leasing funnel"
    - "renewal strategy"
  implicit_signals:
    - "asker is tagged role=property_manager in session context"
    - "request scope is a single property's ongoing operations"
required_axes:
  - asset_class
  - segment
  - form_factor
  - lifecycle_stage
  - management_mode
  - role
optional_axes:
  - market
  - submarket
  - output_type
  - decision_severity
fallback_behavior:
  missing_required_axis: ask_user
  missing_optional_axis: proceed_with_default
