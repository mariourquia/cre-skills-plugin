overlay_id: lifecycle.development
overlay_kind: lifecycle
scope:
  lifecycle: development
authoring_notes: |
  Development overlay. Pre-construction posture: entitlements, permitting, design
  coordination, bid packages, and land / financing closings. No site operations yet.
  Approval posture emphasizes executive and asset-manager gates for entitlement
  decisions and design-development commitments.

overrides:
  - target_kind: metric_target_band
    target_ref: _core/metrics.md#dev_cost_per_unit
    override_value:
      target_band_ref: reference/derived/role_kpi_targets.csv#row_lifecycle_development_cost_per_unit
    reason: |
      Target band for development cost per unit during design-development and bid
      packages; deviation triggers a value-engineering review.
  - target_kind: metric_target_band
    target_ref: _core/metrics.md#dev_cost_per_gsf
    override_value:
      target_band_ref: reference/derived/role_kpi_targets.csv#row_lifecycle_development_cost_per_gsf
    reason: |
      Development cost per gross SF target band for pre-construction phase.
  - target_kind: approval_threshold
    target_ref: _core/approval_matrix.md#row_8_contract_award_procurement
    override_value:
      threshold_ref: reference/derived/role_kpi_targets.csv#row_lifecycle_development_procurement_gate
    reason: |
      Development procurement gates pre-construction contract awards (design team,
      civil, geotech, survey, permit expeditor) at the org-default threshold with an
      executive sign-off overlay.
  - target_kind: reporting_emphasis
    target_ref: _core/metrics.md#dev_cost_per_unit
    override_value:
      reporting_emphasis_ref: reference/derived/role_kpi_targets.csv#row_lifecycle_development_reporting
    reason: |
      Development-phase reporting surfaces entitlement calendar, design milestone
      adherence, bid-package readiness, and cost-plan vs. pro-forma discipline.

adds:
  - added_kind: checklist_item
    slug: entitlement_calendar
    definition_ref: overlays/lifecycle/development/README.md#entitlement_calendar
  - added_kind: checklist_item
    slug: design_coordination_gates
    definition_ref: overlays/lifecycle/development/README.md#design_gates
  - added_kind: checklist_item
    slug: bid_package_readiness
    definition_ref: overlays/lifecycle/development/README.md#bid_package_readiness

approvers:
  - development_manager
  - asset_manager
  - coo_operations_leader
  - ceo_executive_leader
