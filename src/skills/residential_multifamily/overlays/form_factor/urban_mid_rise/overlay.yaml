overlay_id: form_factor.urban_mid_rise
overlay_kind: form_factor
scope:
  form_factor: urban_mid_rise
authoring_notes: |
  Urban mid-rise overlay. Five to eight stories, often with vertical mixed use
  (ground-floor retail, sometimes structured parking below grade). Amenity program
  is full plus rooftop / lifestyle amenities are common. Elevator service is
  standard. Adds retail-tenant and vertical-mixed-use coordination surface. No
  numeric targets embedded; references point to rows.

overrides:
  - target_kind: service_standard
    target_ref: _core/metrics.md#average_days_vacant
    override_value:
      service_standard_ref: reference/derived/role_kpi_targets.csv#row_ff_urban_mid_rise_common_area_cadence
    reason: |
      Higher amenity density plus rooftop and lobby maintenance shifts common-area
      cadence relative to suburban mid-rise.
  - target_kind: metric_target_band
    target_ref: _core/metrics.md#make_ready_days
    override_value:
      target_band_ref: reference/derived/role_kpi_targets.csv#row_ff_urban_mid_rise_make_ready_days
    reason: |
      Urban mid-rise turn durations reflect elevator move-in staging and vendor
      availability in dense markets.
  - target_kind: staffing_ratio
    target_ref: _core/taxonomy.md#role.leasing_manager
    override_value:
      staffing_ratio_ref: reference/derived/role_kpi_targets.csv#row_ff_urban_mid_rise_leasing_ratio
    reason: |
      Leasing team size in an urban mid-rise reflects higher tour volume per month
      and concierge-adjacent posture depending on segment.
  - target_kind: vendor_preference
    target_ref: _core/metrics.md#rm_per_unit
    override_value:
      vendor_preference_ref: reference/normalized/vendor_preferences.csv#row_ff_urban_mid_rise_vendors
    reason: |
      Urban-market vendor preferences favor dense-market specialists (high-rise-adjacent
      HVAC, elevator specialty, rapid-response plumbing).

adds: []

approvers:
  - director_of_operations
