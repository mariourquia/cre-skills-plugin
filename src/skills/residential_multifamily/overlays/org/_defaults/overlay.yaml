overlay_id: org._defaults
overlay_kind: org
status: template
scope:
  org_id: _defaults
authoring_notes: |
  Skeleton org overlay. This is the template the tailoring skill uses when onboarding
  a new organization. Every threshold, screening-policy artifact, concession-policy
  artifact, vendor-preference artifact, and PMA reference starts as a placeholder
  token that the tailoring interview replaces. The org overlay always merges last;
  the operator's values win.

  The tailoring skill reads `interview_status.yaml` in this directory to know what
  must be collected before the overlay is production-ready. Until every required
  field is collected, the overlay's `status` remains `template`.

overrides:
  - target_kind: approval_threshold
    target_ref: _core/approval_matrix.md#row_6_financial_disbursement_tier1
    override_value:
      threshold_token: $TBD_THRESHOLD_DISBURSEMENT_1
    reason: |
      Tier-1 disbursement threshold. Collected during tailoring interview.
  - target_kind: approval_threshold
    target_ref: _core/approval_matrix.md#row_7_financial_disbursement_tier2
    override_value:
