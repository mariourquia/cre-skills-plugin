missing_docs_queue: []
notes: |
  This file is written by the tailoring skill. Fields transition to collected: true
  once the source_artifact path is populated and verified. The overlay.yaml in this
  directory binds its tokens to the collected values; until every required field is
  collected, the overlay is not authoritative and approval matrices fall back to
  the subsystem's canonical floor.
