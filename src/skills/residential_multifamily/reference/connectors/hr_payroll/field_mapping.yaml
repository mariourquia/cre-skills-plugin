# Enriched field mapping for hr_payroll.
# Each row carries: source_description, canonical_field, transform_rule,
# type_cast, null_handling, default_rule, required_for_load,
# required_for_kpi, provenance_note. This is the documentation-grade
# companion to mapping.yaml.

employee:
  - source_column: emp_id
    source_description: stable opaque employee identifier issued by HR system
    canonical_field: employee.employee_id
    transform_rule: trim_string
    type_cast: string
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: anchor for every payroll and assignment record; never null
  - source_column: employment_status
    source_description: current lifecycle state (active, leave, terminated, etc.)
    canonical_field: employee.employment_status
    transform_rule: to_enum
    type_cast: enum
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: drives active-headcount rollups
  - source_column: hire_date
    source_description: most recent hire date (respects rehire)
    canonical_field: employee.hire_date
    transform_rule: to_date
    type_cast: date
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: false
    provenance_note: tenure calculations
  - source_column: ft_pt_flag
    source_description: full_time | part_time | seasonal | temp
    canonical_field: employee.ft_pt_flag
    transform_rule: to_enum
    type_cast: enum
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: FTE conversion
  - source_column: term_date
    source_description: termination date, null if active
    canonical_field: employee.term_date
    transform_rule: to_date
    type_cast: date
    null_handling: default_to_null
    default_rule: null
    required_for_load: false
    required_for_kpi: false
    provenance_note: drives turnover metrics
  - source_column: display_code
    source_description: non-PII display handle for operator reference
    canonical_field: employee.display_code
    transform_rule: trim_string
    type_cast: string
    null_handling: default_to_null
    default_rule: employee_id
    required_for_load: false
    required_for_kpi: false
    provenance_note: optional convenience field; never carries a legal name

staffing_position:
  - source_column: property_code
    source_description: property code tied to the position (null = shared)
    canonical_field: staffing_position.property_id
    transform_rule: trim_string
    type_cast: string
