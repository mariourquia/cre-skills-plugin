    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: resolves to property master
  - source_column: position_id
    source_description: stable position id from the staffing plan
    canonical_field: staffing_position.position_id
    transform_rule: trim_string
    type_cast: string
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: primary key half
  - source_column: role_code
    source_description: canonical role code from role_catalog
    canonical_field: staffing_position.role_code
    transform_rule: lowercase
    type_cast: string
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: must exist in master_data/role_catalog.yaml
  - source_column: budgeted_fte
    source_description: budgeted FTE for the position (0.0-2.0 expected)
    canonical_field: staffing_position.budgeted_fte
    transform_rule: to_number
    type_cast: number
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: drives StaffingPlan reconciliation
  - source_column: position_status
    source_description: budgeted | filled | vacant | on_hold | eliminated
    canonical_field: staffing_position.position_status
    transform_rule: to_enum
    type_cast: enum
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: vacancy ratio

