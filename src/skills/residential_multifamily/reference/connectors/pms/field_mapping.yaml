    type_cast_rule: date
    null_handling: reject_record
    default_rule: none
    validation_rule: end_date >= start_date
    required_for_load: true
    required_for_kpi: true
    provenance_note: expiry schedule basis
  - canonical_field: base_rent_monthly_cents
    source_field: base_rent_usd
    source_description: Base monthly rent in source dollars
    transform_rule: dollars_to_cents
    type_cast_rule: money_cents
    null_handling: reject_record
    default_rule: none
    validation_rule: base_rent_monthly_cents > 0
    required_for_load: true
    required_for_kpi: true
    provenance_note: revenue math anchor
  - canonical_field: status
    source_field: lease_status
    source_description: Lease workflow status
    transform_rule: map_lease_status
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: status IN canonical_enum(pms.lease.status)
    required_for_load: true
    required_for_kpi: true
    provenance_note: leased_occupancy and notice_exposure depend on this
  - canonical_field: term_months
    source_field: term_months
    source_description: Nominal lease term
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: default_to_null
    default_rule: null
    validation_rule: term_months IS NULL OR term_months > 0
    required_for_load: false
    required_for_kpi: false
    provenance_note: renewal cohort segmentation
  - canonical_field: concessions_total_cents
    source_field: concessions_usd
    source_description: Total lease concessions in source dollars
    transform_rule: dollars_to_cents
    type_cast_rule: money_cents
    null_handling: default_to_null
    default_rule: 0
    validation_rule: concessions_total_cents IS NULL OR concessions_total_cents >=
      0
    required_for_load: false
    required_for_kpi: true
    provenance_note: effective rent requires this
  - canonical_field: is_renewal
    source_field: is_renewal_flag
    source_description: Renewal flag
    transform_rule: to_boolean
    type_cast_rule: boolean
    null_handling: default_to_null
    default_rule: false
    validation_rule: is_renewal IN (true, false)
    required_for_load: false
    required_for_kpi: true
    provenance_note: rent_growth_renewal relies on this
  - canonical_field: prior_lease_id
    source_field: prior_lease
    source_description: Prior lease reference when renewal
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: prior_lease_id IN pms.lease.lease_id when is_renewal = true
    required_for_load: false
    required_for_kpi: true
    provenance_note: rent delta computation for renewals
