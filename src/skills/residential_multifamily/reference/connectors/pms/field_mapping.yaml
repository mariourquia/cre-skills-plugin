# Richer per-entity field mapping template for the PMS connector.
# Adds required_for_kpi and provenance_note context beyond mapping.yaml.
# Entities correspond to those declared in pms/schema.yaml.
property:
  fields:
  - canonical_field: property_id
    source_field: prop_id
    source_description: PMS-native stable property identifier
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: matches property_crosswalk; alias registration required before landing
    required_for_load: true
    required_for_kpi: true
    provenance_note: anchor for every property-scoped metric; changes require property_crosswalk entry
  - canonical_field: property_name
    source_field: prop_name
    source_description: Operating name used in reporting
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: non-empty after trim
    required_for_load: true
    required_for_kpi: false
    provenance_note: displayed name; not used in joins
  - canonical_field: unit_count_total
    source_field: total_units
    source_description: Total units including down, model, employee
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: reject_record
    default_rule: none
    validation_rule: unit_count_total >= unit_count_rentable
    required_for_load: true
    required_for_kpi: true
    provenance_note: reconciles against pms.unit count; see pms_unit_count_reconciles
  - canonical_field: unit_count_rentable
    source_field: rentable_units
    source_description: Rentable units excluding model and employee
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: reject_record
    default_rule: none
    validation_rule: unit_count_rentable <= unit_count_total
    required_for_load: true
    required_for_kpi: true
    provenance_note: occupancy denominator
  - canonical_field: market
    source_field: market_label
    source_description: Market label as reported by PMS
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: market IN reference market registry
    required_for_load: true
    required_for_kpi: true
    provenance_note: required for market-scoped rollups
  - canonical_field: submarket
    source_field: submkt
    source_description: Submarket label if operator reports it
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: submarket IN reference submarket registry when non-null
    required_for_load: false
    required_for_kpi: false
    provenance_note: enables submarket rollups; absent when operator does not track
  - canonical_field: year_built
    source_field: yr_built
    source_description: First-placed-in-service year
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: default_to_null
    default_rule: null
    validation_rule: year_built IS NULL OR year_built > 1900
    required_for_load: false
    required_for_kpi: false
    provenance_note: used in vintage cohort analysis
  - canonical_field: year_renovated
    source_field: yr_reno
    source_description: Last substantial renovation year
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: default_to_null
    default_rule: null
    validation_rule: year_renovated IS NULL OR year_renovated >= year_built
    required_for_load: false
    required_for_kpi: false
    provenance_note: used in renovation-yield analysis
unit:
  fields:
  - canonical_field: property_id
    source_field: prop_id
    source_description: Parent property (FK)
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: property_id IN pms.property.property_id
    required_for_load: true
    required_for_kpi: true
    provenance_note: FK to property; reject on missing parent
  - canonical_field: unit_id
    source_field: unit_id
    source_description: PMS-native unit identifier
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: unit_id unique within property_id; lineage in unit_crosswalk
    required_for_load: true
    required_for_kpi: true
    provenance_note: joins to leases and turns; renumbering preserved in crosswalk
  - canonical_field: bedrooms
    source_field: bedrooms
    source_description: Bedroom count, studio = 0
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: reject_record
    default_rule: none
    validation_rule: bedrooms >= 0
    required_for_load: true
    required_for_kpi: true
    provenance_note: unit-mix segmentation
  - canonical_field: bathrooms
    source_field: bathrooms
    source_description: Bathroom count, halves allowed
    transform_rule: to_number
    type_cast_rule: number
    null_handling: reject_record
    default_rule: none
    validation_rule: bathrooms > 0
    required_for_load: true
    required_for_kpi: false
    provenance_note: unit-mix display
  - canonical_field: nrsf
    source_field: nrsf
    source_description: Net rentable square feet
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: escalate_missing
    default_rule: none
    validation_rule: nrsf > 0 when non-null
    required_for_load: true
    required_for_kpi: true
    provenance_note: rent-per-sf metrics fail closed on null
  - canonical_field: status
    source_field: unit_status
    source_description: Current unit status
    transform_rule: map_unit_status
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: status IN canonical_enum(pms.unit.status)
    required_for_load: true
    required_for_kpi: true
    provenance_note: occupancy numerator basis
  - canonical_field: unit_type_id
    source_field: unit_type
    source_description: Unit-type FK
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: unit_type_id resolves to unit_type registry when non-null
    required_for_load: false
    required_for_kpi: true
    provenance_note: unit-type-weighted rent metrics require this
  - canonical_field: floor
    source_field: floor
    source_description: Floor number
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: default_to_null
    default_rule: null
    validation_rule: floor IS NULL OR floor > 0
    required_for_load: false
    required_for_kpi: false
    provenance_note: used in upper-floor premium analysis
  - canonical_field: classification
    source_field: finish_class
    source_description: Renovation classification
    transform_rule: map_classification
    type_cast_rule: enum
    null_handling: default_to_null
    default_rule: null
    validation_rule: classification IN (classic, renovated, fully_renovated) when
      non-null
    required_for_load: false
    required_for_kpi: true
    provenance_note: renovation-yield analysis pivots on this
lease:
  fields:
  - canonical_field: lease_id
    source_field: lease_id
