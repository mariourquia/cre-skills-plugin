# AP mapping template.

vendor:
  source_format: [csv]
  dedup_rule:
    keys: [vendor_id]
    tie_breaker: latest_extracted_at_wins
  as_of_handling:
    carry_field: source_date
    allow_backfill: false
  fields:
    - { source_column: v_id,         normalized_column: vendor_id,              transform: trim_string, required: true }
    - { source_column: v_name,       normalized_column: vendor_name,            transform: trim_string, required: true }
    - { source_column: w9_flag,      normalized_column: w9_on_file,             transform: to_boolean,  required: true }
    - { source_column: services,     normalized_column: services,               transform: split_list,  required: false }
    - { source_column: coi_expiry,   normalized_column: insurance_expiry_date,  transform: to_iso_date, required: false }
    - { source_column: preferred,    normalized_column: preferred_flag,         transform: to_boolean,  required: false }

invoice:
  source_format: [csv, jsonl]
  dedup_rule:
    keys: [invoice_id]
    tie_breaker: latest_extracted_at_wins
  as_of_handling:
    carry_field: source_date
    allow_backfill: true
  fields:
    - { source_column: inv_id,       normalized_column: invoice_id,   transform: trim_string,     required: true }
    - { source_column: v_id,         normalized_column: vendor_id,    transform: trim_string,     required: true }
    - { source_column: prop_id,      normalized_column: property_id,  transform: trim_string,     required: true }
    - { source_column: inv_date,     normalized_column: invoice_date, transform: to_iso_date,     required: true }
    - { source_column: amt_usd,      normalized_column: amount_cents, transform: dollars_to_cents, required: true }
    - { source_column: inv_status,   normalized_column: status,       transform: map_invoice_status, required: true }
    - { source_column: po_ref,       normalized_column: po_id,        transform: trim_string,     required: false }
    - { source_column: contract_ref, normalized_column: contract_id,  transform: trim_string,     required: false }
    - { source_column: due_dt,       normalized_column: due_date,     transform: to_iso_date,     required: false }

contract:        { status: TODO, note: "map per vendor" }
commitment:      { status: TODO, note: "map per vendor" }
purchase_order:  { status: TODO, note: "map per vendor" }
payment_status:  { status: TODO, note: "map per vendor" }
