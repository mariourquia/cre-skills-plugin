# Richer per-entity field mapping template for the market_data connector.
rent_comp:
  fields:
  - canonical_field: comp_observation_id
    source_field: observation_id
    source_description: Stable observation id from source
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: comp_observation_id unique
    required_for_load: true
    required_for_kpi: true
    provenance_note: observation anchor
  - canonical_field: comp_property_id
    source_field: property_id
    source_description: Comp property id
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: comp_property_id resolves via comp_property_crosswalk
    required_for_load: true
    required_for_kpi: true
    provenance_note: cross-source property dedup anchor
  - canonical_field: market
    source_field: market
    source_description: Market label
    transform_rule: map_market
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: market IN market_gazetteer.markets
    required_for_load: true
    required_for_kpi: true
    provenance_note: market-scoped aggregation
  - canonical_field: as_of_date
    source_field: observed_at
    source_description: Observation as-of date
    transform_rule: to_iso_date
    type_cast_rule: date
    null_handling: reject_record
    default_rule: none
    validation_rule: as_of_date <= today
    required_for_load: true
    required_for_kpi: true
    provenance_note: freshness filter basis
  - canonical_field: unit_type_label
    source_field: unit_type
    source_description: Unit type label
    transform_rule: map_unit_type_label
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: unit_type_label IN canonical unit_type_harmonization
    required_for_load: true
    required_for_kpi: true
    provenance_note: unit-type segmentation
  - canonical_field: asking_rent_monthly_cents
    source_field: asking_rent_usd
    source_description: Asking rent in dollars
    transform_rule: dollars_to_cents
    type_cast_rule: money_cents
    null_handling: reject_record
    default_rule: none
    validation_rule: asking_rent_monthly_cents > 0
    required_for_load: true
    required_for_kpi: true
    provenance_note: primary comp observation
  - canonical_field: submarket
    source_field: submarket
    source_description: Submarket label
    transform_rule: map_submarket
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: submarket IN gazetteer[market].submarkets when non-null OR submarket_unknown
      = true
    required_for_load: false
    required_for_kpi: true
    provenance_note: submarket-scoped aggregation
  - canonical_field: nrsf
    source_field: nrsf
    source_description: NRSF of the unit type
    transform_rule: to_integer
    type_cast_rule: integer
    null_handling: default_to_null
    default_rule: null
    validation_rule: nrsf IS NULL OR nrsf > 0
    required_for_load: false
    required_for_kpi: true
    provenance_note: rent-per-sf comp derivation
  - canonical_field: concessions_weeks
    source_field: concessions_weeks
    source_description: Concessions in weeks
    transform_rule: to_number
    type_cast_rule: number
    null_handling: default_to_null
    default_rule: 0
    validation_rule: concessions_weeks IS NULL OR concessions_weeks >= 0
    required_for_load: false
    required_for_kpi: true
    provenance_note: effective-rent computation input
