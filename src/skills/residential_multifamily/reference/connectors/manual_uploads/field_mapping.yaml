    transform_rule: parse_currency
    type_cast: money_cents
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: core budget figure
  - source_column: period_split
    source_description: even | seasonal | custom
    canonical_field: budget_file.period_split
    transform_rule: trim_string
    type_cast: string
    null_handling: default_to_null
    default_rule: even
    required_for_load: false
    required_for_kpi: false
    provenance_note: drives period allocation downstream
  - source_column: notes
