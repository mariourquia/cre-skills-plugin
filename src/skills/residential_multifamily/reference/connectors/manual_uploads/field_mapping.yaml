# Enriched per-template field mapping for manual_uploads.
# Documentation-grade companion to mapping.yaml. Each row carries:
# source_description, canonical_field, transform_rule, type_cast,
# null_handling, default_rule, required_for_load, required_for_kpi,
# provenance_note.

budget_file:
  - source_column: property_id
    source_description: property code as declared in property master
    canonical_field: budget_file.property_id
    transform_rule: trim_string
    type_cast: string
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: crosswalk to property master
  - source_column: account_code
    source_description: GL account code
    canonical_field: budget_file.account_code
    transform_rule: trim_string
    type_cast: string
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: crosswalk to gl.chart_of_accounts
  - source_column: budget_year
    source_description: budget year (YYYY)
    canonical_field: budget_file.budget_year
    transform_rule: to_integer
    type_cast: integer
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: period anchor
  - source_column: budget_version
    source_description: draft | approved | reforecast_q1 | reforecast_q2 | reforecast_q3 | final
    canonical_field: budget_file.budget_version
    transform_rule: to_enum
    type_cast: enum
    null_handling: reject_record
    default_rule: none
    required_for_load: true
    required_for_kpi: true
    provenance_note: disambiguates overlapping budget snapshots
  - source_column: annual_amount_usd
    source_description: annual budget amount in dollars
