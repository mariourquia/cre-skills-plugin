# Manual Uploads mapping template - header-as-typed-by-operator to normalized column.
# Vendor-neutral. Each template has its own mapping because operator-prepared
# files differ from system-exported feeds. Dollar headers map to cents
# columns via parse_currency.

budget_file:
  source_format: [csv]
  dedup_rule:
    keys: [property_id, account_code, budget_year]
    tie_breaker: latest_extracted_at_wins
  as_of_handling:
    carry_field: source_date
    allow_backfill: true
  fields:
    - { source_column: property_id,           normalized_column: property_id,          transform: trim_string,    required: true }
    - { source_column: account_code,          normalized_column: account_code,         transform: trim_string,    required: true }
    - { source_column: budget_year,           normalized_column: budget_year,          transform: to_integer,     required: true }
    - { source_column: budget_version,        normalized_column: budget_version,       transform: to_enum,        required: true }
    - { source_column: annual_amount_usd,     normalized_column: annual_amount_cents,  transform: parse_currency, required: true }
    - { source_column: period_split,          normalized_column: period_split,         transform: trim_string,    required: false }
    - { source_column: notes,                 normalized_column: notes,                transform: trim_string,    required: false }

forecast_file:
  source_format: [csv]
  dedup_rule:
    keys: [property_id, account_code, forecast_period]
    tie_breaker: latest_extracted_at_wins
  as_of_handling:
    carry_field: source_date
    allow_backfill: true
  fields:
    - { source_column: property_id,           normalized_column: property_id,            transform: trim_string,    required: true }
    - { source_column: account_code,          normalized_column: account_code,           transform: trim_string,    required: true }
    - { source_column: forecast_period,       normalized_column: forecast_period,        transform: trim_string,    required: true }
    - { source_column: forecast_amount_usd,   normalized_column: forecast_amount_cents,  transform: parse_currency, required: true }
    - { source_column: forecast_method,       normalized_column: forecast_method,        transform: trim_string,    required: false }

