      Tracker row. Approved 2025-05-20. GL posting pending owner
      countersign; GL row will be added when the posting arrives. Until
      then, reconciliation shows a tracker-GL delta; the commitment +
      change order + draw reconciliation check (../qa/
      commitment_change_order_draw.yaml) will report the gap.

