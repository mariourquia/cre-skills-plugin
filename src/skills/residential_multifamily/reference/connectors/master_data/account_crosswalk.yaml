# Account Crosswalk (starter set).
# Conforms to crosswalk.schema.yaml with the extension that source_id carries
# the GL account code string from the source system and canonical_id is the
# canonical account slug consumed by downstream budget and variance workflows.
#
# Canonical account slugs cross-reference the revenue / expense / capex
# taxonomy surfaced in _core/ontology.md via BudgetLine.build_basis and
# the residential multifamily skill's budget-defense templates.

status_tag: sample

rows:

