  - canonical_id: revenue_base_rent
    source_system: corporate_gl
    source_id: "4000"
    match_confidence: high
    match_method: manual
    effective_start: "2020-01-01"
    survivorship_rule: account_default
    manual_override: false
    reviewer: corporate_controller
    last_validated_at: "2026-03-31"
    notes: |
      GL account 4000 "Rental Income - Base". Canonical slug aggregates
      net of concessions for residential multifamily revenue rollup.

