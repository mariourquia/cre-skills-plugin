# Manual Overrides (structured queue of human-override decisions).
# Each entry records an override of the default survivorship or match logic
# on a specific crosswalk row. Overrides name an approver, a reason, and an
# expiration date. When an override expires, the default survivorship applies
# again unless the override is renewed by a new entry here.
#
# Overrides do not change the crosswalk row itself; they sit alongside it and
# the survivorship engine consults this file before applying rules. An
# override that has been expired or retired is kept for audit; it is not
# deleted.

status_tag: sample

overrides:

  - override_id: ovr_prop_cta_002_pms_migration
    crosswalk_file: property_master_crosswalk.yaml
    canonical_id: prop_cta_002
    source_system: east_region_pms
    source_id: P1184
    override_type: manual_match
    override_reason: |
      Property code assignment after migration was done by hand against the
      legacy PMS extract; automated match cannot verify stability until the
      first full reconciliation window completes.
    approver: regional_ops_director
    approved_at: "2025-03-01"
    expires_at: "2026-09-01"
    renewal_policy: |
      Automatically expires 2026-09-01 unless a rolling reconciliation window
      confirms identity stability. Renewals are new entries in this file.
    notes: |
      Pairs with the corresponding property_master_crosswalk row.

