      Post-renovation relabel carried out manually because the PMS did not
      automatically emit a mapping row on renumber.
    approver: regional_ops_director
    approved_at: "2024-09-16"
    expires_at: "2025-09-16"
    renewal_policy: |
      Expired 2025-09-16 per operator review and confirmed as stable; not
      renewed. Override entry retained for audit only.
    notes: |
      Override has expired and is now inactive. The underlying crosswalk row
      remains current because the mapping was confirmed during the review
      window.

