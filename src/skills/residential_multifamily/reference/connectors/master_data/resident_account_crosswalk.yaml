# Resident Account Crosswalk (starter set).
# Conforms to crosswalk.schema.yaml.
# Illustrates dedup across PMS and CRM using composite match on
# phone / email / normalized-last-name. See identity_resolution_framework.md
# section 7.8.
#
# GUARDRAIL: protected-class attributes MUST NEVER be used as match keys,
# tiebreakers, or survivorship fields. This includes race, color, religion,
# national origin, sex, familial status, disability, and any state or local
# protected class. See _core/ontology.md ResidentAccount + Lead guardrails
# and the fair-housing rules referenced by the residential_multifamily skill.

status_tag: sample

rows:

  # -----------------------------------------------------------------------
