  # applied and was approved. Converges on one canonical resident id once
  # the lease is executed. Composite match on phone + email + last-name-
  # normalized. None of these are protected-class attributes.
  # -----------------------------------------------------------------------

  - canonical_id: resident_rac_000412
    source_system: marketing_crm
    source_id: LEAD-CRM-553912
    match_confidence: high
    match_method: composite
    effective_start: "2024-01-12"
    survivorship_rule: resident_account_default
    manual_override: false
    reviewer: leasing_director
