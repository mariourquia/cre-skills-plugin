  # NOT in the canonical 27 today. Their inclusion is surfaced as an open
  # question in ../../../_core/stack_wave4/open_questions_and_risks.md.

  - proposed_workflow_slug: sop_guidance_lookup
    hypothesis: |
      Role-aware retrieval over GraySail content; grounds a workflow-
      guidance agent.
    canonical_status: not_in_canonical_27
    blocked_until_classified: true

  - proposed_workflow_slug: policy_exception_review
    hypothesis: |
      Structured review when a workflow outcome deviates from GraySail
      policy; routes through owner_approval_routing.
    canonical_status: not_in_canonical_27
    blocked_until_classified: true

  - proposed_workflow_slug: role_onboarding_playbook
    hypothesis: |
      Role-based onboarding driven by GraySail SOPs.
    canonical_status: not_in_canonical_27
    blocked_until_classified: true

open_questions_cross_reference:
  - see ../../../_core/stack_wave4/open_questions_and_risks.md for the
    canonical change-control entries that govern ontology and workflow
    extensions triggered by GraySail classification.
