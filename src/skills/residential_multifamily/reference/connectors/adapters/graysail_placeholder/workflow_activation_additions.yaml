# Merge posture
# -------------
# This file, like the placeholder adapter overall, does NOT merge into
# _core/workflow_activation_map.yaml while the adapter is in stub state.
# The merge is performed only after the adapter forks into
# graysail_<role>_<pattern>/ AND every workflow entry above is promoted
# from pending_classification to a confirmed role (C5).

merge_rule:
  merge_into: _core/workflow_activation_map.yaml
  merge_gate: runbooks/graysail_classification_path.md::C5 AND C8
  default_merge_state_until_gated: advisory_only
  notes: |
    Advisory-only means the content is discoverable by downstream tooling
    that scans adapter directories, but the canonical workflow activation
    map does NOT treat GraySail as a dependency. Any workflow that attempts
    to read GraySail through this advisory-only fragment trips
    gs_classification_pending_blocker per dq_rules.yaml.
