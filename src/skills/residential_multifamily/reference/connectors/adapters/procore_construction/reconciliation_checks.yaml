# Procore adapter reconciliation checks.
# Conforms to reference/connectors/_schema/reconciliation_check.schema.yaml.
# All tolerance references cite
# reference/normalized/schemas/reconciliation_tolerance_band.yaml.
# Per-adapter rule_id prefix: pc_recon_.

checks:

  # ---------------------------------------------------------------------
  # Procore x Intacct checks — financial reconciliation
  # ---------------------------------------------------------------------
  - check_id: pc_recon_commitment_vs_posted_spend
    check_kind: budget_actual
    severity: blocker
    description: Procore commitment paid_to_date must reconcile to Intacct posted capex_actual per project dimension within capex_posting_band.
    inputs:
      - reference/normalized/construction_commitment__<scope>.csv
      - reference/normalized/gl_actual_line__<scope>.csv
      - reference/connectors/master_data/capex_project_crosswalk.yaml
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each commitment: abs(procore.paid_to_date_cents - intacct.sum(actual_line.amount_cents where dim_project = capex_project_id AND account IN capex_account_range)) <= capex_posting_band
    tolerance:
      relative_percent: null
    remediation: runbooks/procore_common_issues.md::cost_posting_lag
    affected_workflows:
      - cost_to_complete_review
      - draw_package_review

  - check_id: pc_recon_co_approved_vs_invoice_posted
    check_kind: budget_actual
    severity: blocker
    description: Every approved Procore CO must have a matching Intacct invoice line within co_posting_lag_band; pending COs must not appear in posted spend.
    inputs:
      - reference/normalized/construction_change_order__<scope>.csv
      - reference/normalized/gl_invoice__<scope>.csv
      - reference/connectors/master_data/change_order_crosswalk.yaml
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each change_order where status = approved: exists intacct.invoice with co_ref = change_order_id AND invoice.posting_date <= co.approved_date + co_posting_lag_band; AND for each change_order where status IN (pending_approval, proposed): NOT exists intacct.invoice with co_ref = change_order_id
    remediation: runbooks/procore_common_issues.md::co_posting_lag
    affected_workflows:
      - change_order_review
      - draw_package_review

  - check_id: pc_recon_draw_approved_vs_cash_funded
    check_kind: commitment_draw
    severity: blocker
    description: Every approved Procore draw must post as a funded line in Intacct within draw_posting_lag_band.
    inputs:
      - reference/normalized/construction_draw_request__<scope>.csv
      - reference/normalized/gl_actual_line__<scope>.csv
      - reference/connectors/master_data/draw_request_crosswalk.yaml
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each draw_request where approval_status IN (approved, approved_with_conditions, funded): exists intacct.actual_line with draw_ref = draw_request_id AND actual_line.posting_date <= draw.approved_date + draw_posting_lag_band
    remediation: runbooks/procore_common_issues.md::draw_posting_lag
    affected_workflows:
      - draw_package_review

  - check_id: pc_recon_retainage_at_closeout
    check_kind: commitment_draw
    severity: warning
    description: At commitment closeout, retainage_balance must equal original cumulative pay-app retainage held minus pay-app retainage released within retainage_closeout_band.
    inputs:
      - reference/normalized/construction_commitment__<scope>.csv
      - reference/normalized/construction_draw_request__<scope>.csv
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each commitment where status = closed: abs(commitment.retention_balance_cents - (sum(draw.retainage_held_this_period) - sum(draw.retainage_released_this_period))) <= retainage_closeout_band
    remediation: runbooks/procore_common_issues.md::retainage_closeout_drift
    affected_workflows:
      - cost_to_complete_review

  # ---------------------------------------------------------------------
  # Procore x Dealpath checks — development handoff
  # ---------------------------------------------------------------------
  - check_id: pc_recon_dealpath_dev_handoff_to_procore
    check_kind: date_coverage
    severity: blocker
    description: Every IC-approved Dealpath development deal must have a Procore project opened within dev_handoff_lag.
    inputs:
      - reference/normalized/deal_pipeline_deal__<scope>.csv
      - reference/normalized/construction_project__<scope>.csv
      - reference/connectors/master_data/dev_project_crosswalk.yaml
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each deal where pipeline_stage = ic_approved AND deal_type = development: exists procore.project with dev_project_crosswalk.canonical_id = deal.canonical_asset_id AND procore.created_at <= deal.ic_approval_date + dev_handoff_lag
    remediation: runbooks/dealpath_common_issues.md::dev_handoff
    affected_workflows:
      - capital_project_intake_and_prioritization
      - development_pipeline_tracking

  - check_id: pc_recon_procore_project_has_dealpath_anchor
    check_kind: null_critical
    severity: blocker
    description: Every Procore development project must resolve to a Dealpath asset_id via dev_project_crosswalk; orphan Procore development projects are blocking.
    inputs:
      - reference/normalized/construction_project__<scope>.csv
      - reference/connectors/master_data/dev_project_crosswalk.yaml
    expected_invariant: |
      for each procore.project where construction_type = new_construction: exists dev_project_crosswalk row where source_system = procore_prod AND source_id = project_id
    remediation: runbooks/procore_common_issues.md::orphan_dev_project
    affected_workflows:
      - development_pipeline_tracking

  # ---------------------------------------------------------------------
  # Procore x Excel checks — estimate calibration
  # ---------------------------------------------------------------------
  - check_id: pc_recon_estimate_vs_material_reference
    check_kind: budget_actual
    severity: warning
    description: Procore estimate line unit_cost must track Excel material_cost_reference by cost_code within material_reference_drift_band.
    inputs:
      - reference/normalized/construction_estimate_line_item__<scope>.csv
      - reference/normalized/material_cost_reference.csv
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each estimate_line_item where csi_division IS NOT NULL AND source_basis = reference_library: abs(unit_cost_cents - material_cost_reference.unit_cost_cents where cost_code_match) <= material_reference_drift_band
    remediation: runbooks/benchmark_refresh.md
    affected_workflows:
      - capex_estimate_generation

  # ---------------------------------------------------------------------
  # Procore x AppFolio checks — vendor master + delivery
  # ---------------------------------------------------------------------
  - check_id: pc_recon_vendor_three_way_identity
    check_kind: duplicate_id
    severity: warning
    description: For every Procore vendor active on post-delivery work, vendor_master_crosswalk must resolve Procore directory id + Intacct AP vendor id + AppFolio vendor id to same canonical vendor_id.
    inputs:
      - reference/normalized/construction_vendor__<scope>.csv
      - reference/normalized/ap_vendor__<scope>.csv
      - reference/normalized/pms_vendor__<scope>.csv
      - reference/connectors/master_data/vendor_master_crosswalk.yaml
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each procore.vendor where active_post_delivery = true: count(distinct vendor_master_crosswalk.canonical_id where source_id IN (procore_directory_id, intacct_ap_id, appfolio_vendor_id)) = 1
    remediation: runbooks/vendor_crosswalk_mismatch.md
    affected_workflows:
      - vendor_dispatch_sla_review

  - check_id: pc_recon_project_to_property_delivery_handoff
    check_kind: date_coverage
    severity: blocker
    description: At project_phase = Post Construction, property_master_crosswalk must carry a row linking Procore project to AppFolio property_id within delivery_handoff_band.
    inputs:
      - reference/normalized/construction_project__<scope>.csv
      - reference/normalized/pms_property__<scope>.csv
      - reference/connectors/master_data/property_master_crosswalk.yaml
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each procore.project where stage = "Post Construction": exists property_master_crosswalk row where source_system IN (appfolio_prod, yardi_prod) AND capex_project_crosswalk_ref = project_id AND row.created_at <= project.updated_at + delivery_handoff_band
    remediation: runbooks/procore_common_issues.md::delivery_handoff
    affected_workflows:
      - lease_up_first_period
      - delivery_handoff

  # ---------------------------------------------------------------------
  # Internal Procore invariants
  # ---------------------------------------------------------------------
  - check_id: pc_recon_commitment_overdrawn
    check_kind: commitment_draw
    severity: blocker
    description: A commitment's paid_to_date plus retainage_balance must not exceed revised_contract_amount within overdrawn_tolerance_band.
    inputs:
      - reference/normalized/construction_commitment__<scope>.csv
      - reference/normalized/schemas/reconciliation_tolerance_band.yaml
    expected_invariant: |
      for each commitment: (commitment.paid_to_date_cents + commitment.retention_balance_cents) <= (commitment.revised_contract_total_cents + overdrawn_tolerance_band)
    remediation: runbooks/procore_common_issues.md::commitment_overdrawn
    affected_workflows:
      - cost_to_complete_review
      - change_order_review

  - check_id: pc_recon_schedule_baseline_preserved
    check_kind: date_coverage
    severity: warning
    description: A milestone's baseline_date must remain stable across pulls unless baseline_revision_id advances with an operator note.
    inputs:
      - reference/normalized/construction_schedule_milestone__<scope>.csv
    expected_invariant: |
      for each milestone: baseline_date unchanged across successive pulls OR baseline_revision_id advanced AND manual_override_approved = true
    remediation: runbooks/procore_common_issues.md::schedule_baseline_overwrite
    affected_workflows:
      - schedule_risk_review
      - construction_meeting_prep_and_action_tracking

  - check_id: pc_recon_co_pending_excluded_from_budget
    check_kind: budget_actual
    severity: blocker
    description: Pending COs must be excluded from canonical revised_contract_total; only approved COs contribute to the commitment ceiling.
    inputs:
      - reference/normalized/construction_change_order__<scope>.csv
      - reference/normalized/construction_commitment__<scope>.csv
    expected_invariant: |
      for each commitment: revised_contract_total_cents == contract_total_cents + sum(change_order.cost_delta_cents where status = approved AND commitment_id = commitment.commitment_id)
    remediation: runbooks/procore_common_issues.md::co_sum_mismatch
    affected_workflows:
      - change_order_review
      - cost_to_complete_review
