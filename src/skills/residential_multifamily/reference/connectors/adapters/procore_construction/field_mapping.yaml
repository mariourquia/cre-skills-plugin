# Procore Construction — Full per-entity field mapping.
# Mirrors the shape of ../../construction/field_mapping.yaml but is
# scoped to Procore raw fields. Canonical contract at
# ../../construction/schema.yaml remains authoritative.

status_tag: stub

capex_project:
  fields:
    - canonical_field: capex_project_id
      source_field: project_id
      source_description: Procore project id
      transform_rule: resolve_via_capex_project_crosswalk
      type_cast_rule: string
      null_handling: reject_record
      default_rule: none
      validation_rule: canonical capex_project_id resolves via capex_project_crosswalk
      required_for_load: true
      required_for_kpi: true
      provenance_note: project anchor
    - canonical_field: project_name
      source_field: name
      source_description: Procore project display name
      transform_rule: trim_string
      type_cast_rule: string
      null_handling: reject_record
      default_rule: none
      validation_rule: non-empty
      required_for_load: true
      required_for_kpi: false
      provenance_note: display
    - canonical_field: project_type
      source_field: project_type
      source_description: Procore operator-defined project type
      transform_rule: map_procore_project_type
      type_cast_rule: enum
      null_handling: default_to_null
      default_rule: component_replacement
      validation_rule: project_type IN (component_replacement, value_add, amenity_upgrade, deferred_mx, life_safety, compliance, other) when non-null
      required_for_load: false
      required_for_kpi: true
      provenance_note: CapexProject subtype discrimination
    - canonical_field: status
      source_field: stage
      source_description: Procore project stage
      transform_rule: map_procore_stage
      type_cast_rule: enum
      null_handling: reject_record
      default_rule: none
      validation_rule: status IN (proposed, approved, in_progress, complete, cancelled, deferred)
      required_for_load: true
      required_for_kpi: true
      provenance_note: project lifecycle
    - canonical_field: target_start
      source_field: start_date
      source_description: Procore planned start
      transform_rule: to_iso_date
      type_cast_rule: date
      null_handling: default_to_null
      default_rule: null
      validation_rule: target_start IS NULL OR target_start <= target_completion
      required_for_load: false
      required_for_kpi: true
      provenance_note: schedule anchor
    - canonical_field: target_completion
      source_field: completion_date
      source_description: Procore planned completion
      transform_rule: to_iso_date
      type_cast_rule: date
      null_handling: default_to_null
      default_rule: null
      validation_rule: target_completion IS NULL OR target_completion >= target_start
      required_for_load: false
      required_for_kpi: true
      provenance_note: schedule anchor
    - canonical_field: property_id
      source_field: derived_via_crosswalk
      source_description: Resolved via property_master_crosswalk at load time
      transform_rule: resolve_via_property_master_crosswalk
      type_cast_rule: string
      null_handling: default_to_null
      default_rule: null
      validation_rule: property_id resolves or records enter pre_delivery_queue
      required_for_load: false
      required_for_kpi: true
      provenance_note: property FK — null allowed for ground-up pre-delivery

estimate_line_item:
  fields:
    - canonical_field: line_item_id
