      type_cast_rule: money_cents
      null_handling: reject_record
      default_rule: none
      validation_rule: extended_cost_cents >= 0
      required_for_load: true
      required_for_kpi: true
      provenance_note: line total
    - canonical_field: csi_division
      source_field: cost_code
      source_description: Procore cost code
