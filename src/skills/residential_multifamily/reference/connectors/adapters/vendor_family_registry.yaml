# Vendor Family Adapter Registry
# Directory of every adapter under reference/connectors/adapters/.
# Every record ships at status: stub. Operators fork a stub and advance the
# record to starter/production as described in adapter_lifecycle.md.
#
# Vendor family names are generic placeholders. When an operator specializes
# a stub to a real vendor, they fork the adapter directory under a new slug,
# rename vendor_family to the internal codename for that vendor, and add a
# new record here. Trademarks do not belong in file paths.

status_tag: sample

records:

  - adapter_id: pms_vendor_family_stub
    adapter_name: Generic PMS Vendor Family Stub
    connector_domain: pms
    status: stub
    rollout_wave: wave_0
    owner: data_platform_team
    short_description: |
      Placeholder adapter for property management systems. Seeds operator
      onboarding with common rent-roll column-name patterns, lease-status
      taxonomies, and concession-encoding hints.

  - adapter_id: gl_vendor_family_stub
    adapter_name: Generic ERP/GL Vendor Family Stub
    connector_domain: gl
    status: stub
    rollout_wave: wave_0
    owner: finance_systems_team
    short_description: |
      Placeholder adapter for general-ledger and ERP feeds. Seeds
      onboarding with account-coding convention hints (5-digit, 7-digit,
      segmented), posting-date vs operating-month handling, budget
      versions, accrual codes.

  - adapter_id: crm_vendor_family_stub
    adapter_name: Generic CRM Vendor Family Stub
    connector_domain: crm
    status: stub
    rollout_wave: wave_0
    owner: data_platform_team
    short_description: |
      Placeholder adapter for leasing CRM platforms. Seeds onboarding
      with lead-source taxonomy hints, campaign id patterns, tour-outcome
      enums, follow-up task types.

  - adapter_id: ap_vendor_family_stub
    adapter_name: Generic AP Vendor Family Stub
    connector_domain: ap
    status: stub
    rollout_wave: wave_0
    owner: finance_systems_team
    short_description: |
      Placeholder adapter for accounts-payable systems. Seeds onboarding
      with vendor, invoice, tax, freight, property-code, and approval-
      status mapping hints.

  - adapter_id: market_data_provider_stub
    adapter_name: Generic Market Data Provider Stub
    connector_domain: market_data
    status: stub
    rollout_wave: wave_1
    owner: data_platform_team
    short_description: |
      Placeholder adapter for rent-comp and market-data subscriptions.
      Seeds onboarding with comp format hints (subscription exports,
      manual survey sheets), concession encoding, submarket tagging,
      effective-date handling.

  - adapter_id: construction_platform_stub
    adapter_name: Generic Construction Platform Stub
    connector_domain: construction
    status: stub
    rollout_wave: wave_1
    owner: capital_projects_team
    short_description: |
      Placeholder adapter for construction and capex platforms. Seeds
      onboarding with project id, cost-code, CSI-division, commitment,
      change-order, draw, and retention mapping hints.

  - adapter_id: manual_excel_ingestion_stub
    adapter_name: Manual Excel Ingestion Stub
    connector_domain: manual_uploads
    status: stub
    rollout_wave: wave_1
    owner: finance_systems_team
    short_description: |
      Placeholder adapter for spreadsheet-based inbound. Seeds onboarding
      with budget-sheet, variance-report, and owner-report page
      conventions, including handling of merged cells, blank rows,
      inconsistent headers, and template drift.

  - adapter_id: hr_payroll_vendor_family_stub
    adapter_name: Generic HR/Payroll Vendor Family Stub
    connector_domain: hr_payroll
    status: stub
    rollout_wave: wave_1
    owner: hr_systems_team
    short_description: |
      Placeholder adapter for HR and payroll feeds. Seeds onboarding
      with employee, job, role, property-assignment, pay-period,
      regular-hours, overtime, and contractor-flag mapping hints.
      PII minimization is explicit in the per-adapter README.

  - adapter_id: appfolio_pms
    adapter_name: AppFolio PMS Adapter
    connector_domain: pms
    status: stub
    rollout_wave: wave_2
    owner: data_platform_team
    short_description: |
      AppFolio Property Manager adapter. Primary source for unit roster,
      lease, charge, payment, work_order, vendor directory, leasing funnel.
      Secondary for property and vendor master. See adapters/appfolio_pms/.

  - adapter_id: sage_intacct_gl
    adapter_name: Sage Intacct GL Adapter
    connector_domain: gl
    status: stub
    rollout_wave: wave_2
    owner: finance_systems_team
    short_description: |
      Sage Intacct adapter. Primary for budget/forecast/actuals/variance,
      vendor master after close, payroll line entity. Survives AppFolio for
      posted actuals after close. See adapters/sage_intacct_gl/.

  - adapter_id: procore_construction
    adapter_name: Procore Construction Adapter
    connector_domain: construction
    status: stub
    rollout_wave: wave_2
    owner: capital_projects_team
    short_description: |
      Procore adapter. Primary for construction project, capex_project
      (scope side), commitments, change orders, draws, schedule milestones.
      Reconciles to Intacct on capex postings. See adapters/procore_construction/.

  - adapter_id: dealpath_deal_pipeline
    adapter_name: Dealpath Deal Pipeline Adapter
    connector_domain: deal_pipeline
    status: stub
    rollout_wave: wave_2
    owner: data_platform_team
    short_description: |
      Dealpath adapter. Primary source for pre-close deal state, IC
      milestones, deal team assignments, deal key dates. Seeds downstream
      AppFolio / Procore / Intacct setup. See adapters/dealpath_deal_pipeline/.

  - adapter_id: excel_market_surveys
    adapter_name: Excel Market Surveys Adapter
    connector_domain: market_data
    status: stub
    rollout_wave: wave_2
    owner: data_platform_team
    short_description: |
      Excel market-survey intake. Primary for rent_comp, market_rent_benchmark,
      concession_benchmark, occupancy_benchmark, labor_rate_reference,
      material_cost_reference, turn_cost_reference, vendor_rate, market_commentary.
      First-class production input with provenance, staleness, reviewer attestation.
      See adapters/excel_market_surveys/.

  - adapter_id: manual_sources_expanded
    adapter_name: Manual Sources Expanded Adapter
    connector_domain: manual_uploads
    status: stub
    rollout_wave: wave_2
    owner: finance_systems_team
    short_description: |
      Expanded manual-source coverage for emailed files, shared-drive
      submissions, operator workbooks, approval matrices, TPM submissions,
      bid tabs, escalation logs, payroll summaries. Primary for
      variance_explanation, escalation_event; secondary for many objects.
      See adapters/manual_sources_expanded/.

  - adapter_id: graysail_placeholder
    adapter_name: GraySail Placeholder Adapter (Classification Pending)
    connector_domain: other
    status: stub
    rollout_wave: wave_2
    owner: data_platform_team
    short_description: |
      Non-destructive integration stub pending operator classification.
      Workflows blocked from treating GraySail as primary while placeholder.
      Closure path documented in adapters/graysail_placeholder/runbooks/
      graysail_classification_path.md. Status remains stub until classification
      closes and adapter is forked into role-specific implementation.

  - adapter_id: yardi_multi_role
    adapter_name: Yardi Multi-Role Adapter (Voyager + RentCafe + Data Connect)
    connector_domain: pms
    status: stub
    rollout_wave: wave_2
    owner: data_platform_team
    short_description: |
      Vendor-specific adapter that specializes the canonical pms connector
      for the Yardi family. Unlike single-domain PMS adapters, Yardi commonly
      acts as MORE than one canonical domain at a given operator: primary
      PMS (Voyager residential), primary GL (Voyager financial), primary
      leasing / CRM (RentCafe + Voyager leasing), reporting feed (Data
      Connect warehouse), and legacy / historical archive during migration.
      Because the role Yardi plays depends on the operator stack posture,
      this adapter is CLASSIFICATION-GATED: downstream workflows treat
      output as historical-only until classification_worksheet.md Section 1
      and 2 close. Live adapter is NOT running; status: stub. See
      adapters/yardi_multi_role/ for manifest, mapping, dq rules, runbooks.

# Note: yardi_voyager_classified_template was previously listed here as a
# fork-from-yardi_multi_role planning template, but no adapter directory
# exists for it. Removed in wave-5 to keep registry == on-disk adapters.
# When operators close classification, they fork yardi_multi_role into a
# new adapter directory (e.g. yardi_primary_pms) and add a record here.
