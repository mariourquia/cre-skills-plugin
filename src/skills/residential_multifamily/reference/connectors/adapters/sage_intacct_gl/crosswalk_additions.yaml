# Sage Intacct crosswalk additions.
#
# Fragments that extend master_data/ crosswalks with Intacct-specific rows.
# These fragments will be merged into:
#   - master_data/account_crosswalk.yaml
#   - master_data/vendor_master_crosswalk.yaml
#   - master_data/property_master_crosswalk.yaml
#   - master_data/capex_project_crosswalk.yaml
#   - master_data/employee_crosswalk.yaml
#
# Each row conforms to master_data/crosswalk.schema.yaml.
# intacct_id = Intacct-facing key (RECORDNO, GLACCOUNTNO, DIMENSION_ID,
# VENDORID, PROJECTID, or HRIS id as appropriate).
# canonical_id = the canonical slug downstream consumers see.
# Survivorship rules reference master_data/survivorship_rules.md.

status_tag: template

