# Mapping template for the manual Excel ingestion stub.
# Applied on top of reference/connectors/manual_uploads/ templates.
# Canonical manual_uploads contracts win on conflict.

status_tag: template

budget_line:
  source_format: [jsonl]
  dedup_rule:
    keys: [property_id, account_slug, operating_month, budget_version]
    tie_breaker: latest_extracted_at_wins
  fields:
    - { source_column: prop_code,       normalized_column: property_id,          transform: trim_string,      required: true }
    - { source_column: account_name,    normalized_column: account_slug,         transform: map_account_slug, required: true }
    - { source_column: operating_month, normalized_column: operating_month,      transform: to_iso_month,     required: true }
    - { source_column: budget,          normalized_column: budget_amount_cents,  transform: dollars_to_cents, required: true }
    - { source_column: budget_version,  normalized_column: budget_version,       transform: trim_string,      required: true }
    - { source_column: sheet_name,      normalized_column: source_sheet_name,    transform: trim_string,      required: false }

forecast_line:
  source_format: [jsonl]
  dedup_rule:
    keys: [property_id, account_slug, operating_month, budget_version]
    tie_breaker: latest_extracted_at_wins
  fields:
    - { source_column: prop_code,       normalized_column: property_id,           transform: trim_string,      required: true }
    - { source_column: account_name,    normalized_column: account_slug,          transform: map_account_slug, required: true }
    - { source_column: operating_month, normalized_column: operating_month,       transform: to_iso_month,     required: true }
    - { source_column: forecast,        normalized_column: forecast_amount_cents, transform: dollars_to_cents, required: true }
    - { source_column: budget_version,  normalized_column: budget_version,        transform: trim_string,      required: true }
    - { source_column: sheet_name,      normalized_column: source_sheet_name,     transform: trim_string,      required: false }

variance_explanation:
  source_format: [jsonl]
  dedup_rule:
    keys: [property_id, account_slug, operating_month]
    tie_breaker: latest_extracted_at_wins
  fields:
    - { source_column: prop_code,       normalized_column: property_id,        transform: trim_string,      required: true }
    - { source_column: account_name,    normalized_column: account_slug,       transform: map_account_slug, required: true }
    - { source_column: operating_month, normalized_column: operating_month,    transform: to_iso_month,     required: true }
    - { source_column: variance_note,   normalized_column: explanation_text,   transform: trim_string,      required: true }
    - { source_column: sheet_name,      normalized_column: source_sheet_name,  transform: trim_string,      required: false }
