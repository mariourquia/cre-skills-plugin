# Provisional source contract for Yardi.
# Non-destructive placeholder. Every field is marked `provisional: true`
# and every object carries `requires_classification: true`. Until
# classification_worksheet.md closes, no shape is committed to. The
# authoritative contract lives in source_contract.yaml (populated once
# Dimension 1+2 of the worksheet close).
#
# This file exists so the adapter directory is never empty and downstream
# harnesses can reason about a placeholder target. It does NOT claim
# source-of-truth for any canonical object.

status_tag: stub
schema_version: "0.0.1-provisional"
classification_status: pending

provenance_envelope_required:
  - source_name: yardi_multi_role_stub
  - source_type: pms            # provisional; may become gl / crm / reporting post-classification
  - source_date: iso_date_required
  - extracted_at: iso_datetime_required
  - extractor_version: "0.0.0-stub"
  - source_row_id: string_required

entities:

  property:
    requires_classification: true
    description: placeholder; resolves to canonical Property once classification closes
    grain_hypothesis: one_record_per_voyager_propid
    identity_hypothesis: propid
    field_placeholders:
      - { name: propid,         type_hypothesis: string,   provisional: true, description: voyager propid }
      - { name: scode,          type_hypothesis: string,   provisional: true, description: voyager short property code }
      - { name: property_name,  type_hypothesis: string,   provisional: true
                                                           }
      - { name: legal_entity,   type_hypothesis: string,   provisional: true, description: Yardi entity id; resolves to canonical legal_entity_id via crosswalk }
      - { name: book_id,        type_hypothesis: string,   provisional: true, description: accrual / cash / tax / budget book label }
    source_of_truth_claim: none_until_classified
    reconciliation_with_other_sources: deferred_until_classified

  building:
    requires_classification: true
    grain_hypothesis: one_record_per_voyager_building
    identity_hypothesis: (propid, building_code)
    field_placeholders:
      - { name: propid,         type_hypothesis: string,   provisional: true }
      - { name: building_code,  type_hypothesis: string,   provisional: true }
      - { name: building_label, type_hypothesis: string,   provisional: true }
    source_of_truth_claim: none_until_classified

  unit:
    requires_classification: true
    grain_hypothesis: one_record_per_voyager_unit
    identity_hypothesis: hunit
    field_placeholders:
