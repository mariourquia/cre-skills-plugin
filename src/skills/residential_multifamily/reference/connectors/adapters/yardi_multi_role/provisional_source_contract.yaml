      - { name: propid,         type_hypothesis: string,   provisional: true }
      - { name: unit_code,      type_hypothesis: string,   provisional: true }
      - { name: floorplan,      type_hypothesis: string,   provisional: true }
      - { name: bedrooms,       type_hypothesis: integer,  provisional: true }
      - { name: bathrooms,      type_hypothesis: number,   provisional: true }
      - { name: sqft,           type_hypothesis: integer,  provisional: true }
      - { name: unit_status,    type_hypothesis: enum,     provisional: true }
