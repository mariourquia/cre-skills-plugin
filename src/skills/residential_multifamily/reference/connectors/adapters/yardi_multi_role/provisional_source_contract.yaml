non_contract_notes:
  - This file is a placeholder, not a source contract in the canonical
    sense of reference/connectors/<domain>/sample_input.json. It is a
    sketch held in place so the adapter directory is not empty.
  - The authoritative contract lives in source_contract.yaml once
    classification_worksheet.md closes. Fields in this file may be
    renamed or removed without a schema change to the canonical
    subsystem; none are canonical.
  - Object families flagged `access_blocked_until_rentcafe_scope_confirmed`
    are held in quarantine until Dimension 2c closes. Existing rows are
    not surfaced to downstream workflows.
