# Crosswalk additions for the AppFolio adapter.
# Merged into the master crosswalks under
# reference/connectors/master_data/. Each fragment names the destination
# file, the survivorship rule that applies, and the per-attribute
# source-of-record assignment. These are synthetic illustrative rows
# matching the sample_raw fixture set (Ashford Park, Willow Creek,
# Maple Vista, Cedar Grove). Conforms to crosswalk.schema.yaml.
#
# Schema per row (reminder):
#   canonical_id, source_system, source_id (= appfolio_id),
#   match_confidence, match_method, effective_start, survivorship_rule,
#   manual_override, reviewer, last_validated_at, notes,
#   source_of_record_per_attribute (per-attribute survivorship).

