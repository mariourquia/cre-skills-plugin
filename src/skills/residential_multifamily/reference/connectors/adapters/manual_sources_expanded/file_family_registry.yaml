# File Family Registry for the Manual Sources Expanded adapter.
# One record per recognized manual file family. Each entry captures:
#   - family_id            snake_case slug
#   - family_name          human-readable label
#   - expected_format      xlsx | csv | pdf | email_table
#   - expected_headers     canonical header list (template v1)
#   - delivery_channel     sftp | shared_drive | email | portal
#   - cadence              monthly | quarterly | event_driven | ad_hoc | weekly | annual
#   - provenance_required  fields the landing helper MUST capture
#   - staleness_threshold_days   numeric staleness tolerance (cite
#                                 reference/normalized/schemas/reconciliation_tolerance_band.yaml)
#   - target_canonical_object    canonical object slug from _core/ontology.md
#
# This registry is the SINGLE source of the families the adapter recognizes.
# Anything landed outside this registry routes to _rejected/ with an
# unknown_family reason.
#
# Numeric thresholds live here rather than inline in prose per _core/DESIGN_RULES.md.

status_tag: template
schema_version: "0.1.0"

file_families:

  - family_id: tpm_submission_monthly_report
    family_name: Third-Party Manager Monthly Scorecard Submission
    expected_format: csv
    expected_headers:
      - property_code
      - period
      - occupancy_physical
      - occupancy_economic
      - collections_rate
      - delinquency_balance
      - narrative_summary
      - submitted_by
      - submitted_date
      - signed_off
    delivery_channel: shared_drive
    cadence: monthly
    provenance_required:
      - source_file
      - sheet_tab
      - as_of_date
      - submitted_by
      - received_at
      - row_id
    staleness_threshold_days: 10
    target_canonical_object: tpm_scorecard
    notes: Lag beyond staleness_threshold_days flags tpm_submission_lag per dq_rules.yaml::msx_tpm_submission_lag.

  - family_id: tpm_submission_quarterly_report
