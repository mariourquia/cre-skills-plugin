      - sheet_tab
      - as_of_date
      - submitted_by
      - reviewer
      - received_at
      - row_id
    staleness_threshold_days: 30
    target_canonical_object: tpm_scorecard
    notes: Quarterly pack contributes narrative commentary used by executive_operating_summary_generation.

