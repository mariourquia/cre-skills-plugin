adapter_id: manual_sources_expanded
adapter_name: Manual Sources Expanded Adapter
vendor_family: manual_file_family
connector_domain: manual_uploads
status: stub
rollout_wave: wave_4
description: |
  Wave-4 expansion of the manual_uploads connector. Covers emailed files,
  shared-drive submissions, operator-maintained workbooks, approval matrices,
  staffing plans, capex trackers, regional review packs, executive reporting
  inputs, bid tabs, draw packages, owner reports, and TPM data submissions.

  Manual sources remain first-class production inputs. Each file family has
  intake metadata, reviewer attestation, retention horizon, and reconciliation
  rules. Compatible with the existing manual_uploads connector under
  ../../manual_uploads/.

supported_source_systems:
  - operator_monthly_report_inbox
  - tpm_data_submission_drive
  - bid_tab_workbook_drive
  - approval_matrix_workbook

mapping_hints:
  - { source_field_pattern: "file_received_date|received_date",  canonical_field: provenance_received_at,  transform_hint: to_iso_datetime }
  - { source_field_pattern: "submitted_by|submitter",             canonical_field: provenance_submitted_by, transform_hint: pii_redact_partial }
  - { source_field_pattern: "attestation_signed",                 canonical_field: reviewer_attestation,    transform_hint: to_boolean }
  - { source_field_pattern: "report_period|as_of",                canonical_field: as_of_date,              transform_hint: to_iso_date }
  - { source_field_pattern: "property_code|property_id",          canonical_field: property_id,             transform_hint: crosswalk_lookup }

known_gotchas:
  - file naming inconsistent across operators
  - missing sheet in workbook common
  - partial-period coverage common
  - attestation sometimes missing; flag for follow-up
  - TPM submission lag known degradation
  - approver assignments vary by deal type
  - bid leveling logic varies by analyst

reference_documentation:
  - placeholder_link_to_manual_intake_runbook
  - placeholder_link_to_tpm_submission_sla_doc
  - placeholder_link_to_attestation_policy

author_metadata:
  authored_by: residential_multifamily_subsystem
  authored_role: data_platform_team

last_updated: "2026-04-15"
