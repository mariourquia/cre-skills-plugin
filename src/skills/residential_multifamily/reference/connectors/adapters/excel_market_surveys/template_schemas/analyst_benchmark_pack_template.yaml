# Template schema for analyst_benchmark_pack.
# Cross-market rent / occupancy / concession benchmarks authored and signed
# off by the research analyst, consumed by investments / asset management.

status_tag: template
template_slug: analyst_benchmark_pack
canonical_reference_schemas:
  - reference/normalized/schemas/market_rent_benchmark.yaml
  - reference/normalized/schemas/occupancy_benchmark.yaml
  - reference/normalized/schemas/concession_benchmark.yaml
canonical_ontology_objects: [rent_benchmark, occupancy_benchmark, concession_benchmark]
source_format: xlsx
expected_sheets:
  - cover_metadata
  - rent_benchmarks
  - occupancy_benchmarks
  - concession_benchmarks
  - change_log

sheet_schemas:

  rent_benchmarks:
    columns:
      - { name: market,          required: true, type: string }
      - { name: submarket,       required: false, type: string }
      - { name: segment,         required: true, type: string, enum: [middle_market, affordable, luxury] }
      - { name: property_form,   required: true, type: string, enum: [garden, walk_up, wrap, suburban_mid_rise, urban_mid_rise, high_rise] }
      - { name: property_class,  required: false, type: string, enum: [A, B, C, D] }
      - { name: unit_type_label, required: true, type: string }
      - { name: unit_beds,       required: true, type: integer }
      - { name: unit_baths,      required: false, type: number }
      - { name: unit_sf_avg,     required: false, type: integer }
      - { name: avg_rent,        required: true, type: number, unit: dollars_per_unit_per_month }
      - { name: rent_per_sf,     required: false, type: number }
      - { name: sample_size_properties, required: false, type: integer }
      - { name: trailing_3mo_change_pct, required: false, type: number }
      - { name: confidence,      required: true, type: string, enum: [low, medium, high] }
      - { name: as_of_date,      required: true, type: date }

  occupancy_benchmarks:
    columns:
      - { name: market,          required: false, type: string }
      - { name: submarket,       required: false, type: string }
      - { name: region,          required: false, type: string }
      - { name: segment,         required: true, type: string }
      - { name: property_form,   required: false, type: string }
      - { name: lifecycle_stage, required: false, type: string, enum: [development, construction, lease_up, stabilized, renovation, recap_support] }
      - { name: metric_slug,     required: true, type: string }
      - { name: value,           required: true, type: number }
      - { name: band_low,        required: false, type: number }
      - { name: band_high,       required: false, type: number }
      - { name: peer_median,     required: false, type: number }
      - { name: unit,            required: true, type: string, enum: [percent, percent_of_gpr, ratio] }
      - { name: as_of_date,      required: true, type: date }

  concession_benchmarks:
    columns:
      - { name: market,                    required: true, type: string }
      - { name: submarket,                 required: false, type: string }
      - { name: segment,                   required: true, type: string }
      - { name: property_form,             required: true, type: string }
      - { name: lease_term_months,         required: true, type: integer }
      - { name: concession_months_offered, required: true, type: number }
      - { name: pct_comps_offering,        required: false, type: number }
      - { name: avg_concession_dollars,    required: false, type: number }
      - { name: new_lease_trade_out_avg,   required: false, type: number }
      - { name: as_of_date,                required: true, type: date }

  cover_metadata:
    columns:
      - { name: pack_version,       required: true, type: string }
      - { name: quarter,            required: true, type: string }
      - { name: analyst_name,       required: true, type: string }
      - { name: reviewer,           required: true, type: string }
      - { name: signed_off_date,    required: true, type: date }
      - { name: scope_description,  required: true, type: string }

  change_log:
    columns:
      - { name: change_slug,        required: true, type: string }
      - { name: description,        required: true, type: string }
      - { name: analyst_name,       required: true, type: string }
      - { name: effective_date,     required: true, type: date }

validation_rules:
  - rule_id: abp_version_recognized
    severity: blocker
    description: pack_version recognized by the template registry
  - rule_id: abp_reviewer_signoff_required
    severity: blocker
    description: cover_metadata.reviewer and signed_off_date non-null
  - rule_id: abp_outlier_check
    severity: warning
    description: rent, concession, occupancy values within plausible bands per segment overlay
  - rule_id: abp_segment_consistency
    severity: blocker
    description: rows tagged segment match the sheet-level segment where applicable

allowed_submarkets_reference: reference/connectors/master_data/submarket_crosswalk.yaml
