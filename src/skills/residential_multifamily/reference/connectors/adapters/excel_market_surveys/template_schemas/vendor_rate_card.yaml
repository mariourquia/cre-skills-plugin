# Template schema for vendor_rate_card Excel drops.
# Aligns with canonical normalized schema at
# ../../../../normalized/schemas/vendor_rate.yaml.
# One tab per vendor; rows per service_slug + unit_basis.

status_tag: template
template_slug: vendor_rate_card
canonical_reference_schema: reference/normalized/schemas/vendor_rate.yaml
canonical_ontology_object: vendor_rate
source_format: xlsx
csv_sibling_format: csv
expected_sheets:
  - vendor_rate_lines
  - cover_metadata
header_rows: 1
filename_pattern: "^vendor_rate_card__<vendor_slug>__\\d{4}-\\d{2}-\\d{2}\\.(xlsx|csv)$"

sheet_schemas:

  vendor_rate_lines:
    columns:
      - { name: vendor_id,         required: true,  type: string, description: vendor master crosswalk id }
      - { name: vendor_name,       required: true,  type: string, description: human-readable vendor name }
      - { name: service,           required: true,  type: string, description: service_slug (e.g., hvac_pm_biannual) }
      - { name: service_category,  required: true,  type: string, enum: [turn_clean, turn_paint, turn_flooring, turn_punch, hvac, plumbing, electrical, pest, landscape, pool, fitness, general_r_and_m, security, trash, other] }
      - { name: unit_basis,        required: true,  type: string, enum: [dollars_per_unit, dollars_per_trip, dollars_per_month, dollars_per_hour, dollars_per_sf, dollars_per_lump_sum] }
      - { name: market,            required: true,  type: string, description: canonical market label; crosswalk to market_id }
      - { name: region,            required: false, type: string }
      - { name: segment,           required: false, type: string, enum: [middle_market, affordable, luxury] }
      - { name: rate_low,          required: true,  type: number, description: low end of quoted band }
      - { name: rate_typical,      required: true,  type: number, description: typical/target rate }
      - { name: rate_high,         required: true,  type: number, description: high end of quoted band }
      - { name: currency,          required: true,  type: string, enum: [USD] }
      - { name: escalation,        required: false, type: number, description: annual escalation percent (decimal form) }
      - { name: contract_term_months, required: false, type: integer }
      - { name: as_of,             required: true,  type: date, format: iso_8601 }
      - { name: source,            required: true,  type: string, description: origin quote or contract id }
      - { name: source_basis,      required: true,  type: string, enum: [contracted, quoted, verbal, survey_estimate, extrapolated] }
      - { name: row_id,            required: true,  type: string }

  cover_metadata:
    columns:
      - { name: rate_card_version, required: true,  type: string }
      - { name: analyst_name,      required: true,  type: string }
      - { name: reviewer,          required: true,  type: string }
      - { name: signed_off_date,   required: true,  type: date }

validation_rules:
  - rule_id: vrc_unit_basis_enum
    severity: blocker
    description: unit_basis value resolves to a recognized enum member
  - rule_id: vrc_rate_band_monotonic
    severity: blocker
    description: rate_low <= rate_typical <= rate_high
  - rule_id: vrc_reviewer_signoff
    severity: blocker
    description: cover_metadata.reviewer and signed_off_date non-null (high-impact file)
  - rule_id: vrc_market_recognized
    severity: blocker
    description: market resolves via market_crosswalk

allowed_markets_reference: reference/connectors/master_data/market_crosswalk.yaml
allowed_vendors_reference: reference/connectors/master_data/vendor_master_crosswalk.yaml
