# Source registry FRAGMENT for Excel market surveys + analyst benchmark packs.
# One source_id per file family for traceability. Merged into source_registry.yaml.

records:

  - source_id: excel_rent_comp_weekly
    source_name: Excel Weekly Rent Comp Survey
    source_domain: market_data
    vendor_family: excel_benchmark_family
    ingestion_mode: shared_drive
    environment: prod
    cadence: weekly
    data_owner: asset_mgmt_analyst_team
    business_owner: asset_mgmt_director
    technical_owner: data_platform_team
    credential_method: shared_drive_placeholder
    object_coverage:
      - rent_comp
      - market_rent_benchmark
    expected_latency_minutes: 10080
    known_limitations:
      - hidden tabs may carry working data not for ingest
      - merged cells require pre-processing
      - analyst formulas must be value-resolved before extract
      - missing as_of_date triggers blocker
      - duplicate comp rows possible
      - luxury comps may contaminate middle_market sheets
    pii_classification: low
    financial_sensitivity: moderate
    legal_sensitivity: low
    status: active
    rollout_wave: wave_4
    last_validated_at: "2026-04-15"
    notes: |
      File-based intake under adapters/excel_market_surveys/. Treated as
      first-class production input. Analyst sign-off required. Staleness
      window enforced via dq_rule excel_freshness.

