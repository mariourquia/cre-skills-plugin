# Mapping template for the generic market data provider stub.
# Applied on top of reference/connectors/market_data/mapping.yaml.

status_tag: template

market_comp:
  source_format: [csv, jsonl]
  dedup_rule:
    keys: [market_comp_id, effective_date]
    tie_breaker: latest_extracted_at_wins
  fields:
    - { source_column: comp_id,             normalized_column: market_comp_id,              transform: trim_string,         required: true }
    - { source_column: property_name,        normalized_column: comp_property_name,          transform: trim_string,         required: true }
    - { source_column: submarket,            normalized_column: submarket,                   transform: map_submarket,       required: true }
    - { source_column: market,               normalized_column: market,                      transform: trim_string,         required: true }
    - { source_column: observation_date,     normalized_column: effective_date,              transform: to_iso_date,         required: true }
    - { source_column: unit_type,            normalized_column: unit_type_label,             transform: trim_string,         required: false }
    - { source_column: beds,                 normalized_column: bedrooms,                    transform: to_integer,          required: false }
    - { source_column: baths,                normalized_column: bathrooms,                   transform: to_number,           required: false }
    - { source_column: sqft,                 normalized_column: nrsf,                        transform: to_integer,          required: false }
    - { source_column: asking_rent,          normalized_column: asking_rent_monthly_cents,   transform: dollars_to_cents,    required: true }
    - { source_column: effective_rent,       normalized_column: effective_rent_monthly_cents, transform: dollars_to_cents,   required: false }
    - { source_column: concession_weeks,     normalized_column: concession_periods,          transform: to_number,           required: false }
    - { source_column: concession_type,      normalized_column: concession_type,             transform: map_concession_type, required: false }
    - { source_column: source_tag,           normalized_column: source_provider,             transform: trim_string,         required: true }
    - { source_column: observation_method,   normalized_column: observation_method,          transform: map_observation_method, required: true }
