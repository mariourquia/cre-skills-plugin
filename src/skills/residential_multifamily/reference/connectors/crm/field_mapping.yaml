# Richer per-entity field mapping template for the CRM connector.
lead_interaction:
  fields:
  - canonical_field: interaction_id
    source_field: interaction_id
    source_description: Stable interaction id
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: interaction_id unique
    required_for_load: true
    required_for_kpi: true
    provenance_note: interaction anchor
  - canonical_field: lead_id
    source_field: lead_id
    source_description: Lead FK
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: lead_id IS NULL OR lead_id IN pms.lead.lead_id
    required_for_load: false
    required_for_kpi: true
    provenance_note: FK to pms.lead; warn on orphan
  - canonical_field: interaction_date
    source_field: interaction_ts
    source_description: Interaction timestamp
    transform_rule: to_iso_datetime
    type_cast_rule: datetime
    null_handling: reject_record
    default_rule: none
    validation_rule: interaction_date <= today
    required_for_load: true
    required_for_kpi: true
    provenance_note: lead_response_time computation
  - canonical_field: channel
    source_field: channel
    source_description: Channel used
    transform_rule: map_channel
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: channel IN canonical_enum(crm.lead_interaction.channel)
    required_for_load: true
    required_for_kpi: true
    provenance_note: channel mix analytics
  - canonical_field: direction
    source_field: direction
    source_description: Inbound vs outbound
    transform_rule: map_direction
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: direction IN (inbound, outbound)
    required_for_load: true
    required_for_kpi: true
    provenance_note: response-time measurement pivot
  - canonical_field: agent_id
    source_field: agent_id
    source_description: Agent FK
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: agent_id IS NULL OR agent_id IN staff registry
    required_for_load: false
    required_for_kpi: true
    provenance_note: agent-level coaching reports
  - canonical_field: outcome
    source_field: outcome
    source_description: Interaction outcome
    transform_rule: map_interaction_outcome
    type_cast_rule: enum
    null_handling: default_to_null
    default_rule: null
    validation_rule: outcome IN canonical_enum(crm.lead_interaction.outcome) when
      non-null
    required_for_load: false
    required_for_kpi: true
    provenance_note: touch effectiveness
  - canonical_field: notes
    source_field: notes
    source_description: Sanitized free text
    transform_rule: sanitize_text
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: protected_class_scan clean
    required_for_load: false
    required_for_kpi: false
    provenance_note: protected-class scan gate
campaign_source:
  fields:
  - canonical_field: campaign_id
    source_field: campaign_id
    source_description: Campaign id
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: campaign_id unique
    required_for_load: true
    required_for_kpi: true
    provenance_note: attribution anchor
  - canonical_field: campaign_label
    source_field: label
    source_description: Operator-facing label
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: non-empty
    required_for_load: true
    required_for_kpi: false
    provenance_note: display
  - canonical_field: medium
    source_field: medium
    source_description: Media channel
    transform_rule: map_medium
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: medium IN canonical_enum(crm.campaign_source.medium)
    required_for_load: true
    required_for_kpi: true
    provenance_note: medium mix analytics
  - canonical_field: start_date
    source_field: start_date
    source_description: Campaign start
    transform_rule: to_iso_date
    type_cast_rule: date
    null_handling: default_to_null
    default_rule: null
    validation_rule: start_date IS NULL OR start_date <= end_date when end_date IS
      NOT NULL
    required_for_load: false
    required_for_kpi: true
    provenance_note: attribution window start
  - canonical_field: end_date
    source_field: end_date
    source_description: Campaign end
    transform_rule: to_iso_date
    type_cast_rule: date
    null_handling: default_to_null
    default_rule: null
    validation_rule: end_date IS NULL OR end_date >= start_date
    required_for_load: false
    required_for_kpi: true
    provenance_note: attribution window end
  - canonical_field: spend_cents
    source_field: spend_usd
    source_description: Campaign spend in dollars
    transform_rule: dollars_to_cents
    type_cast_rule: money_cents
    null_handling: default_to_null
    default_rule: null
    validation_rule: spend_cents IS NULL OR spend_cents >= 0
    required_for_load: false
    required_for_kpi: true
    provenance_note: cost-per-lead numerator
