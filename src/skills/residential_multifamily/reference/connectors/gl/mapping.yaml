# GL mapping template — raw source column → normalized column.
# Two entities worked as examples; the rest marked TODO for a vendor adapter.

chart_of_accounts:
  source_format: [csv]
  dedup_rule:
    keys: [account_id]
    tie_breaker: latest_extracted_at_wins
  as_of_handling:
    carry_field: source_date
    allow_backfill: false
  fields:
    - { source_column: acct_num,       normalized_column: account_id,     transform: trim_string, required: true }
    - { source_column: acct_name,      normalized_column: account_label,  transform: trim_string, required: true }
    - { source_column: acct_type,      normalized_column: account_type,   transform: map_account_type, required: true }
    - { source_column: normal_bal,     normalized_column: normal_balance, transform: map_normal_balance, required: true }
    - { source_column: parent_acct,    normalized_column: parent_account_id, transform: trim_string, required: false }
    - { source_column: inactive_flag,  normalized_column: inactive,       transform: to_boolean, required: false }

actual:
  source_format: [csv]
  dedup_rule:
    keys: [property_id, account_id, period]
    tie_breaker: latest_source_date_wins
  as_of_handling:
    carry_field: source_date
    allow_backfill: true
  fields:
    - { source_column: prop_id,   normalized_column: property_id,   transform: trim_string, required: true }
    - { source_column: acct_num,  normalized_column: account_id,    transform: trim_string, required: true }
    - { source_column: period,    normalized_column: period,        transform: trim_string, required: true }
    - { source_column: amount_usd, normalized_column: amount_cents, transform: dollars_to_cents, required: true }
    - { source_column: memo,      normalized_column: memo,          transform: trim_string, required: false }

account_mapping: { status: TODO, note: "map per vendor" }
budget:          { status: TODO, note: "map per vendor" }
forecast:        { status: TODO, note: "map per vendor" }
variance_line:   { status: TODO, note: "map per vendor" }
capex_actual:    { status: TODO, note: "map per vendor" }
commitment:      { status: TODO, note: "map per vendor" }
