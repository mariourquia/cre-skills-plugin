# Richer per-entity field mapping template for the GL connector.
chart_of_accounts:
  fields:
  - canonical_field: account_id
    source_field: acct_id
    source_description: Operator-native account identifier
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: account_id unique per source; rename history in account_crosswalk
    required_for_load: true
    required_for_kpi: true
    provenance_note: join key for all GL postings
  - canonical_field: account_label
    source_field: acct_label
    source_description: Operator account label
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: non-empty after trim
    required_for_load: true
    required_for_kpi: false
    provenance_note: used in variance templates display
  - canonical_field: account_type
    source_field: acct_type
    source_description: Operator account type
    transform_rule: map_account_type
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: account_type IN (asset, liability, equity, revenue, expense,
      capex)
    required_for_load: true
    required_for_kpi: true
    provenance_note: drives aggregation in NOI and variance
  - canonical_field: normal_balance
    source_field: normal_balance
    source_description: Debit or credit
    transform_rule: map_debit_credit
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: normal_balance IN (debit, credit)
    required_for_load: true
    required_for_kpi: false
    provenance_note: sign-convention check basis
  - canonical_field: parent_account_id
    source_field: parent_acct
    source_description: Parent account
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: parent_account_id IS NULL OR parent_account_id IN chart_of_accounts.account_id
    required_for_load: false
    required_for_kpi: false
    provenance_note: hierarchical rollup display
  - canonical_field: inactive
    source_field: inactive_flag
    source_description: Inactive flag
    transform_rule: to_boolean
    type_cast_rule: boolean
    null_handling: default_to_null
    default_rule: false
    validation_rule: inactive IN (true, false)
    required_for_load: false
    required_for_kpi: false
    provenance_note: filters inactive accounts from current-period rollups
account_mapping:
  fields:
  - canonical_field: source_account_id
    source_field: acct_id
    source_description: FK to chart_of_accounts
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: source_account_id IN chart_of_accounts.account_id
    required_for_load: true
    required_for_kpi: true
    provenance_note: FK to chart_of_accounts
  - canonical_field: canonical_account_slug
    source_field: canonical_slug
    source_description: Canonical account slug
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: canonical_account_slug IN canonical taxonomy
    required_for_load: true
    required_for_kpi: true
    provenance_note: canonical aggregation key
  - canonical_field: effective_start
    source_field: effective_start
    source_description: Mapping effective start
    transform_rule: to_iso_date
    type_cast_rule: date
    null_handling: reject_record
    default_rule: none
    validation_rule: effective_start <= effective_end when effective_end IS NOT NULL
    required_for_load: true
    required_for_kpi: true
    provenance_note: time-travel window
  - canonical_field: effective_end
    source_field: effective_end
    source_description: Mapping effective end
    transform_rule: to_iso_date
    type_cast_rule: date
    null_handling: default_to_null
    default_rule: null
    validation_rule: effective_end IS NULL OR effective_end >= effective_start
    required_for_load: false
    required_for_kpi: false
    provenance_note: null means current mapping
  - canonical_field: notes
    source_field: notes
    source_description: Operator notes
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: default_to_null
    default_rule: null
    validation_rule: optional
    required_for_load: false
    required_for_kpi: false
    provenance_note: audit trail for mapping change
