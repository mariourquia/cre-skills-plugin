# Richer per-entity field mapping template for the construction connector.
dev_budget:
  fields:
  - canonical_field: project_id
    source_field: project_id
    source_description: Development project id
    transform_rule: trim_string
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: project_id resolves via construction_project_registry
    required_for_load: true
    required_for_kpi: true
    provenance_note: project anchor
  - canonical_field: budget_line_slug
    source_field: budget_line
    source_description: Canonical line slug
    transform_rule: map_budget_line
    type_cast_rule: string
    null_handling: reject_record
    default_rule: none
    validation_rule: budget_line_slug IN canonical dev_budget_line taxonomy
    required_for_load: true
    required_for_kpi: true
    provenance_note: line-level roll-up
  - canonical_field: scenario
    source_field: scenario
    source_description: Budget scenario
    transform_rule: map_budget_scenario
    type_cast_rule: enum
    null_handling: reject_record
    default_rule: none
    validation_rule: scenario IN (baseline, current, approved, proposed)
    required_for_load: true
    required_for_kpi: true
    provenance_note: scenario filter basis
  - canonical_field: as_of_date
    source_field: as_of
    source_description: Budget vintage
    transform_rule: to_iso_date
    type_cast_rule: date
    null_handling: reject_record
    default_rule: none
    validation_rule: as_of_date <= today
    required_for_load: true
    required_for_kpi: true
    provenance_note: vintage comparison key
  - canonical_field: amount_cents
    source_field: amount_usd
    source_description: Budget amount
    transform_rule: dollars_to_cents
    type_cast_rule: money_cents
    null_handling: reject_record
    default_rule: none
    validation_rule: amount_cents >= 0
    required_for_load: true
    required_for_kpi: true
    provenance_note: budget total
  - canonical_field: contingency_applied_percent
    source_field: contingency_pct
    source_description: Contingency applied to the line
    transform_rule: to_number
    type_cast_rule: number
    null_handling: default_to_null
    default_rule: null
    validation_rule: contingency_applied_percent IS NULL OR contingency_applied_percent
      >= 0
    required_for_load: false
    required_for_kpi: true
    provenance_note: contingency analysis
