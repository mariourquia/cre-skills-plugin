pack_slug: quarterly_portfolio_review
reads:
  - path: reference/derived/role_kpi_targets.csv
    category: occupancy_benchmark
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
  - path: reference/normalized/occupancy_benchmarks__{market}_mf.csv
    category: occupancy_benchmark
    expected_schema_version: "0.1.0"
    required: false
    fallback_behavior: use_portfolio_average
  - path: reference/normalized/collections_benchmarks__{region}_mf.csv
    category: occupancy_benchmark
    expected_schema_version: "0.1.0"
    required: false
    fallback_behavior: use_portfolio_average
  - path: reference/normalized/watchlist_scoring.yaml
    category: approval_threshold_policy
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
  - path: reference/derived/same_store_set__{org}.yaml
    category: approval_threshold_policy
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
  - path: reference/normalized/approval_threshold_defaults.csv
    category: approval_threshold_policy
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
writes: []

# Period-seal gating: see _core/final_marked_workflows.yaml#period_grade_workflows
# and _core/schemas/period_seal.yaml. Test: test_period_seal_gating.
required_period_seal:
  minimum_close_status: hard_close
  requires_close_lock_timestamp: true
  as_of_required: true
  rationale: |
    Quarterly LP letter body reuses numbers from this workflow
    verbatim. Hard_close is the earliest state where the GL matches
    what the LP audit will see — running against soft-closed books
    risks material restatement after publication.
