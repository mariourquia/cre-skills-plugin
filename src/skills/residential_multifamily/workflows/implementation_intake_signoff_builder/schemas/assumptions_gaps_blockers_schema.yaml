$schema: https://json-schema.org/draft/2020-12/schema
title: AssumptionsGapsBlockersLog
type: array
minItems: 1
items:
  type: object
  required:
    - item_id
    - area
    - status
    - description
    - owner
    - next_step
    - downstream_impact
  properties:
    item_id:
      type: string
      pattern: "^[a-z][a-z0-9_]*$"
    area:
      type: string
    status:
      type: string
      enum: [confirmed, assumed, inferred, missing, blocked, conflicting]
    description:
      type: string
    missing_evidence:
      type: string
    owner:
      type: string
    next_step:
      type: string
    due_date:
      type: string
    downstream_impact:
      type: string
  additionalProperties: false
