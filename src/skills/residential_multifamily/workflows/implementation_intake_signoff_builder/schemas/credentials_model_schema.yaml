$schema: https://json-schema.org/draft/2020-12/schema
title: ImplementationCredentialsModel
type: object
required:
  - schema_version
  - records
properties:
  schema_version:
    type: string
  records:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - source_system
        - access_method
        - sandbox_availability
        - production_availability
        - refresh_cadence
        - expected_latency
        - export_owner
        - credentials_owner
        - provisioning_process
        - required_approvals
        - legal_or_security_restrictions
        - secret_storage_allowed
      properties:
        source_system:
          type: string
        access_method:
          type: string
        sandbox_availability:
          type: string
        production_availability:
          type: string
        refresh_cadence:
          type: string
        expected_latency:
          type: string
        export_owner:
          type: string
        credentials_owner:
          type: string
        provisioning_process:
          type: string
        required_approvals:
          type: array
          items:
            type: string
        legal_or_security_restrictions:
          type: string
        secret_storage_allowed:
          type: boolean
          const: false
      additionalProperties: false
additionalProperties: false
