$schema: https://json-schema.org/draft/2020-12/schema
title: ImplementationEvidenceItems
type: object
required:
  - schema_version
  - evidence_items
properties:
  schema_version:
    type: string
  evidence_items:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - evidence_id
        - evidence_type
        - file_name_or_reference
        - source_system
        - object_family
        - date_received
        - received_from
        - validation_status
        - coverage_level
        - related_questions
        - related_outputs
        - notes
      properties:
        evidence_id:
          type: string
        evidence_type:
          type: string
          enum:
            - export_sample
            - screenshot
            - report_pack
            - spreadsheet_template
            - field_dictionary
            - org_document
            - approval_document
            - calendar_document
            - mapping_file
            - verbally_confirmed_note
        file_name_or_reference:
          type: string
        source_system:
          type: string
        object_family:
          type: string
        date_received:
          type: string
        received_from:
          type: string
        validation_status:
          type: string
          enum:
            - received_not_reviewed
            - reviewed_incomplete
            - reviewed_sufficient
            - conflicting_with_prior
        coverage_level:
          type: string
          enum:
            - single_property
            - multi_property_partial
            - portfolio_full
            - system_partial
            - system_full
        related_questions:
          type: array
          items:
            type: string
        related_outputs:
          type: array
          items:
            type: string
        notes:
          type: string
      additionalProperties: false
additionalProperties: false
