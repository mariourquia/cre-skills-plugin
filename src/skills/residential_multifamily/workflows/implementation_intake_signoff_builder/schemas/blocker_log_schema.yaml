$schema: https://json-schema.org/draft/2020-12/schema
title: ImplementationBlockerLog
type: object
required:
  - schema_version
  - blockers
properties:
  schema_version:
    type: string
  blockers:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - blocker_id
        - description
        - severity
        - impacted_area
        - owner
        - requested_from
        - date_requested
        - follow_up_due
        - status
      properties:
        blocker_id:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        impacted_area:
          type: string
        owner:
          type: string
        requested_from:
          type: string
        date_requested:
          type: string
        follow_up_due:
          type: string
        status:
          type: string
          enum: [open, in_progress, closed, blocked]
      additionalProperties: false
additionalProperties: false
