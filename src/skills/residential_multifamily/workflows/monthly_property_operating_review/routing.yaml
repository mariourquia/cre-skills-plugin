pack_slug: monthly_property_operating_review
pack_type: workflow
priority: 20
triggers:
  explicit_phrases:
    - "monthly review"
    - "monthly scorecard"
    - "monthly operating review"
    - "property scorecard"
    - "AM submission"
  implicit_signals:
    - "calendar month close"
    - "AM requests monthly pack"
required_axes:
