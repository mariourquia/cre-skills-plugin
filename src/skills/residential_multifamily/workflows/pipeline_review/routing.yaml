pack_slug: pipeline_review
pack_type: workflow
priority: 20
triggers:
  explicit_phrases:
    - "weekly pipeline review"
    - "pipeline review"
    - "pipeline scorecard"
    - "pipeline dashboard"
    - "pipeline by stage"
    - "stalled deals"
    - "IC load"
    - "deal pipeline summary"
  implicit_signals:
    - "week close calendar trigger"
    - "Dealpath adapter emits multiple stage transitions in a week"
    - "IC meeting within one cycle"
    - "executive asks for weekly deal desk summary"
required_axes:
  - asset_class
  - segment
  - lifecycle_stage
  - management_mode
  - org_id
optional_axes:
  - form_factor
  - market
  - submarket
  - role
  - output_type
  - fund_id
axes_match:
  segment: [middle_market, luxury, affordable]
  lifecycle: [development, construction, lease_up, stabilized, renovation, recap_support]
  management_mode: [self_managed, third_party_managed, owner_oversight]
  output_types: [operating_review, kpi_review, dashboard, memo]
fallback_behavior:
  missing_required_axis: ask_user
  missing_optional_axis: proceed_with_default
