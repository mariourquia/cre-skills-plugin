pack_slug: capex_estimate_generation
reads:
  - path: reference/normalized/capex_line_items__{scope}.csv
    category: capex_line_item
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
  - path: reference/normalized/labor_rates__{market}.csv
    category: labor_rate
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
  - path: reference/normalized/material_costs__{region}_residential.csv
    category: material_cost
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
  - path: reference/normalized/construction_duration_assumptions__{region}.csv
    category: construction_duration_assumption
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
  - path: reference/derived/contingency_assumptions__{org}.csv
    category: capex_line_item
    expected_schema_version: "0.1.0"
    required: true
    fallback_behavior: refuse
writes: []
