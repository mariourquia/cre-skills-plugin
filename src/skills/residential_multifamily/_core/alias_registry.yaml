object_aliases:
  unit_type:
    canonical_object: UnitType
    aliases: [FloorPlan, floor_plan]
    warning: |
      In marketing contexts a UnitType is often called a FloorPlan.
      Canonical object is UnitType; FloorPlan is an alias only.
  resident_account:
    canonical_object: ResidentAccount
    aliases: [Household, Tenant]
    warning: |
      "Tenant" is commonly used but can conflate lease-level and account-level.
      Canonical object is ResidentAccount; each Lease points to one ResidentAccount.
  capex_project:
    canonical_object: CapexProject
    aliases: [CapitalProject, CapEx]
  development_project:
    canonical_object: DevelopmentProject
    aliases: [DevProject, GroundUpProject]
  construction_project:
    canonical_object: ConstructionProject
    aliases: [ConProject]
  market_comp:
    canonical_object: MarketComp
    aliases: [Comp, RentComp]
    warning: |
      "Comp" is ambiguous — rent comp, sales comp, or lease comp. In this subsystem,
      MarketComp defaults to RentComp; sales comps live outside this subsystem.

reserved_slots:
  # These slugs are reserved for planned metrics. Do not use them for other meanings.
  metrics:
    - rent_growth_same_store
    - rent_growth_new_supply
    - absorption_rate
    - lease_exposure_by_month
    - rubs_recovery_rate
    - insurance_claim_frequency
    - capex_deferred_to_life_safety_ratio
    - tenant_satisfaction_index
    - vendor_scorecard_index
  objects:
    - StaffingRoster
    - ResidentCommunication
    - ComplianceAttestation

# Workflow alias registry.
# An alias is a non-canonical name that resolves to a canonical workflow slug.
# Every alias must point to a canonical workflow directory name. The
# test_workflow_slug_registry test fails if any alias target is not canonical,
# and if any routing reference uses a slug that is not canonical, not
# scaffolding, and not in this alias table.
workflow_aliases: {}

# Workflows that are intentionally referenced before their workflow packs exist
# on disk. These slugs must be named in routing.yaml or similar structural files
# because the router needs to recognize them as planned, but the workflow pack
# itself is scaffolding and attempting to run it MUST fail closed (see
# _core/routing/rules.yaml, rule r011_regulatory_workflow_explicit).
#
# DO NOT add a slug here just because it's broken. Add it only when the routing
# system intentionally declares a placeholder for a gated, not-yet-built flow.
workflow_scaffolding_slugs:
  # Regulatory / affordable compliance workflows (rule r011). Phase 1
  # scaffolding only. Gated behind regulatory_program != none and refuse-to-run
  # when the referenced rent_limits / income_limits files are absent.
  - agency_reporting_prep
  - compliance_calendar_review
  - file_audit_prep
  - income_certification_cycle
  - recertification_batch
  - rent_limit_test
  # Tailoring interview - a special-purpose mode not implemented as a workflow
  # pack (see rule r010_tailoring_interview). The tailoring TUI is the entry
  # point; it is not a workflow directory under workflows/.
  - tailoring_interview
