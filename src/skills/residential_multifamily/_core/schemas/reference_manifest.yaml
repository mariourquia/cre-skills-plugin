# Reference Manifest Schema
# Applies to every pack's reference_manifest.yaml.
# Tests fail if a pack reads a reference not listed in its manifest.

$schema: https://json-schema.org/draft/2020-12/schema
title: ReferenceManifest
type: object
required:
  - pack_slug
  - reads
  - writes
properties:
  pack_slug:
    type: string
  reads:
    type: array
    items:
      type: object
      required: [path, category]
      properties:
        path:
          type: string
          description: Path relative to src/skills/residential_multifamily/.
        category:
          type: string
        expected_schema_version:
          type: string
        required:
          type: boolean
          default: true
        fallback_behavior:
          type: string
          enum: [ask_user, use_portfolio_average, use_prior_period, refuse, escalate, proceed_with_default]
  writes:
    type: array
    items:
      type: object
      required: [path, category]
      properties:
        path:
          type: string
        category:
          type: string
        write_mode:
          type: string
          enum: [append, upsert, replace, propose_then_approve]
  required_period_seal:
    type: object
    description: |
      Period-seal gate for period-grade financial workflows. See
      _core/final_marked_workflows.yaml#period_grade_workflows and
      _core/schemas/period_seal.yaml. Enforced by test_period_seal_gating.
    required: [minimum_close_status, as_of_required]
    additionalProperties: false
    properties:
      minimum_close_status:
        type: string
        enum: [draft, soft_close, hard_close, locked]
      requires_close_lock_timestamp:
        type: boolean
        default: false
      as_of_required:
        type: boolean
      required_version_fields:
        type: array
        items:
          type: string
          enum: [budget_version, reforecast_version]
      rationale:
        type: string
additionalProperties: false
