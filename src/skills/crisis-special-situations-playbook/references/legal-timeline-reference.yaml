remediation_timeline:
  description: "Environmental remediation timelines by contamination type"

  petroleum_soil_only:
    phase_ii_assessment: "4-8 weeks"
    regulatory_notification: "24-48 hours from discovery (if above reportable quantities)"
    remedial_investigation: "4-12 weeks"
    remedial_action_plan: "4-8 weeks for preparation and approval"
    active_remediation: "2-12 months (excavation: weeks; in-situ: months)"
    confirmation_sampling: "2-4 weeks post-remediation"
    closure_report: "4-8 weeks to prepare"
    agency_review_and_nfa: "60-180 days"
    total_typical: "12-36 months"

  petroleum_with_groundwater:
    phase_ii_assessment: "6-12 weeks (includes monitoring well installation)"
    delineation: "3-6 months (quarterly groundwater sampling to define plume)"
    regulatory_notification: "24-48 hours from discovery"
    remedial_investigation: "6-12 months"
    remedial_action_plan: "2-4 months"
    active_remediation: "2-7 years (pump-and-treat or enhanced bioremediation)"
    monitoring: "Quarterly sampling for 1-4 years post-active treatment"
    closure_report: "4-8 weeks to prepare"
    agency_review_and_nfa: "90-270 days"
    total_typical: "3-10 years"

  chlorinated_solvents:
    phase_ii_assessment: "8-16 weeks (complex site characterization needed)"
    delineation: "6-18 months (solvents migrate far and deep)"
    regulatory_notification: "24-48 hours from discovery"
    remedial_investigation: "12-24 months"
    feasibility_study: "4-8 months"
    remedial_action_plan: "3-6 months for preparation and approval"
    active_remediation: "5-20 years (chemical oxidation, bioremediation, PRB)"
    long_term_monitoring: "Quarterly to semi-annual for 5-10 years"
    institutional_controls: "Deed restrictions if residual contamination remains"
    closure: "May achieve NFA or may transition to long-term monitoring with controls"
    total_typical: "10-25+ years"

  asbestos_building_materials:
    survey: "1-2 weeks for comprehensive building survey"
    abatement_plan: "2-4 weeks"
    neshap_notification: "10 working days before demolition or renovation"
    abatement: "1-8 weeks depending on scope"
    air_monitoring: "During and after abatement"
    clearance: "1-2 days post-abatement"
    total_typical: "6-16 weeks"

