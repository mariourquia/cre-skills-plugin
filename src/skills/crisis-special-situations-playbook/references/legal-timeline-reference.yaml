fund_dissolution_timeline:
  description: "Closed-end CRE fund wind-down and dissolution timeline"

  phases:
    - phase: "Decision and authorization"
      duration: "30-60 days"
      actions:
        - "GP determines fund term is expiring or early termination warranted"
        - "Review LPA dissolution provisions and required approvals"
        - "Obtain LPAC consent if required"
        - "Notify all LPs in writing per LPA notice provisions"
        - "Engage dissolution counsel and accountants"

    - phase: "Asset disposition"
      duration: "6-24 months"
      actions:
        - "Develop disposition strategy: orderly sale vs. portfolio sale vs. continuation vehicle"
        - "Engage disposition brokers"
        - "Market and sell assets"
        - "Consider GP-led secondary for assets not ready for sale"
        - "Wind down property-level operations"
        - "Terminate property management and vendor contracts"

    - phase: "Final accounting and distribution"
      duration: "90-120 days after last asset sale"
      actions:
        - "Complete final capital account reconciliation"
        - "Calculate final waterfall: return of capital, preferred return, promote"
        - "Prepare final financial statements"
        - "Engage auditor for final audit"
        - "Wire final distributions to all LPs"
        - "Deliver final capital account statements"

    - phase: "Tax and regulatory filings"
      duration: "Per applicable deadlines"
      actions:
        - "Prepare and distribute final K-1s"
        - "File final fund tax returns (federal and all applicable states)"
        - "File final informational returns"
        - "Obtain tax clearance certificates where required"

    - phase: "Entity dissolution"
      duration: "30-90 days"
      actions:
        - "File Certificate of Cancellation (Delaware LP/LLC)"
        - "File withdrawal/dissolution in all registered states"
        - "Cancel EIN if no longer needed"
        - "Terminate registered agent services"
        - "Archive all fund records per LPA retention requirements (typically 7-10 years)"

    - phase: "Tail period"
      duration: "2-3 years post-dissolution"
      actions:
        - "Maintain D&O/E&O insurance tail coverage"
        - "Maintain records for potential tax audits or litigation"
        - "Address any post-dissolution claims or adjustments"
        - "Distribute any holdback or escrow releases"
