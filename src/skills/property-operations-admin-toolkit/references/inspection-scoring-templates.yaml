# Property Operations Inspection Scoring Templates
# Standardized rubrics for common area, landscaping, janitorial, and parking

---
metadata:
  document: "Inspection Scoring Templates"
  scoring_scale: "1-5 (1=Unacceptable, 2=Poor, 3=Fair, 4=Good, 5=Excellent)"
  passing_threshold: 3
  action_threshold: "Score of 2 or below requires immediate work order"
  target_score: "4.0 average across all zones (Class A); 3.5 (Class B)"

---
common_area_cleanliness:
  description: "10-zone scoring for common area condition"
  frequency: "Weekly (Class A), Bi-weekly (Class B/C)"
  zones:

    - zone: "lobby_reception"
      zone_id: 1
      criteria:
        - element: "Flooring"
          score_5: "Spotless, high-gloss finish, no marks or stains"
          score_4: "Clean, minor scuffs that are not noticeable at walking pace"
          score_3: "Generally clean, some visible scuffs or light staining"
          score_2: "Noticeable dirt, staining, or damaged areas"
          score_1: "Dirty, damaged, or hazardous condition"
        - element: "Walls and baseboards"
          score_5: "Freshly painted appearance, no marks, scuffs, or damage"
          score_4: "Clean, minor scuffs at low-traffic contact points only"
          score_3: "Some visible marks or scuffs, generally acceptable"
          score_2: "Noticeable damage, peeling, or widespread marks"
          score_1: "Damaged, stained, or in disrepair"
        - element: "Furniture and fixtures"
          score_5: "Like new, polished, properly arranged"
          score_4: "Clean, minor wear consistent with age, well-arranged"
          score_3: "Acceptable wear, some items need attention"
          score_2: "Worn, stained, or damaged; detracts from appearance"
          score_1: "Broken, heavily stained, or missing items"
        - element: "Lighting"
          score_5: "All fixtures operational, clean, proper illumination level"
          score_4: "All operational, minor dust on fixtures"
          score_3: "1-2 bulbs out, general illumination adequate"
          score_2: "Multiple bulbs out, dim areas, dirty fixtures"
          score_1: "Significant lighting deficiency, safety concern"
        - element: "Temperature and comfort"
          score_5: "Comfortable (70-74F), no drafts, no odors"
          score_4: "Comfortable, minor variations"
          score_3: "Slightly warm or cool, but acceptable"
          score_2: "Noticeably uncomfortable, tenant complaints likely"
          score_1: "HVAC failure, extreme conditions"

    - zone: "elevators"
      zone_id: 2
      criteria:
        - element: "Cab interior"
          score_5: "Spotless walls, floors, ceiling; pads removed; fresh appearance"
          score_4: "Clean, minor fingerprints on panels"
          score_3: "Generally clean, some wear visible"
          score_2: "Dirty panels, stained floor, scratches"
          score_1: "Heavily soiled, damaged, or graffiti"
        - element: "Operation"
          score_5: "Smooth, quiet, doors align perfectly, all buttons responsive"
          score_4: "Normal operation, occasional minor noise"
          score_3: "Operational but noticeably slow or noisy"
          score_2: "Intermittent issues, door alignment off, button failures"
          score_1: "Frequent breakdowns, out of service, safety concern"
        - element: "Indicators and signage"
          score_5: "All floor indicators lit, emergency phone tested, certificate current"
          score_4: "All functional, certificate current"
          score_3: "Minor indicator issue, certificate current"
          score_2: "Multiple indicator failures or certificate expired"
          score_1: "Emergency phone non-functional or certificate missing"

    - zone: "restrooms"
      zone_id: 3
      criteria:
        - element: "Fixtures"
          score_5: "All functional, no drips, clean, caulking intact"
          score_4: "All functional, minor wear"
          score_3: "Functional, some cosmetic issues"
          score_2: "Dripping faucet, running toilet, or stained fixtures"
          score_1: "Non-functional fixture, active leak, broken hardware"
        - element: "Cleanliness"
          score_5: "Sanitized, fresh scent, no residue anywhere"
          score_4: "Clean, minor spots in low-visibility areas"
          score_3: "Acceptable, could use touch-up"
          score_2: "Dirty, residue on fixtures or floors"
          score_1: "Unsanitary, odor, staining"
        - element: "Supplies"
          score_5: "All dispensers full (soap, paper, seat covers)"
          score_4: "All dispensers have adequate supply"
          score_3: "One dispenser low but not empty"
          score_2: "One or more dispensers empty"
          score_1: "Multiple dispensers empty, no backup stock"
        - element: "Odor"
          score_5: "Fresh, clean scent"
          score_4: "Neutral, no unpleasant odor"
          score_3: "Slight odor, manageable"
          score_2: "Noticeable unpleasant odor"
          score_1: "Strong offensive odor, plumbing issue suspected"

    - zone: "stairwells"
      zone_id: 4
      criteria:
        - element: "Lighting"
          score_5: "All fixtures operational, bright, no dark areas"
          score_4: "Adequate lighting throughout"
          score_3: "1-2 fixtures out, generally adequate"
          score_2: "Dark areas, multiple fixtures out"
          score_1: "Significant dark areas, safety hazard"
        - element: "Handrails"
          score_5: "Secure, clean, continuous, proper height"
          score_4: "Secure, minor dust"
          score_3: "Secure but needs cleaning or minor repair"
          score_2: "Loose or discontinuous in one area"
          score_1: "Missing, broken, or severely loose"
        - element: "Cleanliness"
          score_5: "Clean floors and landings, no debris, no cobwebs"
          score_4: "Clean, minor dust in corners"
          score_3: "Generally clean, some debris"
          score_2: "Dirty, debris on landings, cobwebs"
          score_1: "Heavily soiled, storage items in stairwell (fire code violation)"
        - element: "Fire doors"
          score_5: "All doors close and latch properly, no obstructions"
          score_4: "All functional, minor cosmetic wear"
          score_3: "Functional, one door slow to close"
          score_2: "One door not latching properly"
          score_1: "Door propped open, missing hardware, or non-functional"

    - zone: "corridors"
      zone_id: 5
      criteria:
        - element: "Flooring"
          score_5: "Clean, well-maintained, no trip hazards"
          score_4: "Clean, minor wear in high-traffic areas"
          score_3: "Acceptable, some visible wear"
          score_2: "Stained, worn, or minor trip hazards"
          score_1: "Damaged, significant trip hazards, or heavily soiled"
        - element: "Walls and ceiling"
          score_5: "Clean, no marks, ceiling tiles intact"
          score_4: "Clean, minor scuffs, all tiles in place"
          score_3: "Some marks, one stained ceiling tile"
          score_2: "Multiple marks, stained or missing ceiling tiles"
          score_1: "Damaged, water staining, missing tiles, peeling"
        - element: "Lighting"
          score_5: "All operational, clean lenses, even illumination"
          score_4: "All operational, minor lens dust"
          score_3: "1-2 out, adequate overall"
          score_2: "Dark sections, multiple fixtures out"
          score_1: "Significant dark areas"

    - zone: "loading_dock"
      zone_id: 6
      criteria:
        - element: "Cleanliness"
          score_5: "Clean, organized, no debris, no pests"
          score_4: "Clean, minor debris from recent delivery"
          score_3: "Some accumulated debris, needs sweep"
          score_2: "Dirty, debris accumulation, pest evidence"
          score_1: "Unsanitary, major debris, pest infestation"
        - element: "Door operation"
          score_5: "All doors operational, smooth, seals intact"
          score_4: "All operational, minor wear on seals"
          score_3: "Operational, one seal needs replacement"
          score_2: "One door not operating properly"
          score_1: "Door inoperable, security or weather exposure"
        - element: "Safety"
          score_5: "Dock bumpers intact, edge markings visible, lighting adequate"
          score_4: "All safety items in place, minor wear"
          score_3: "One item needs attention"
          score_2: "Multiple safety items deficient"
          score_1: "Missing bumpers, no edge marking, poor lighting"

    - zone: "exterior_facade"
      zone_id: 7
      criteria:
        - element: "Building exterior"
          score_5: "Clean, well-maintained, no visible damage"
          score_4: "Good condition, minor weathering"
          score_3: "Acceptable, some weathering or minor repair needed"
          score_2: "Noticeable damage, staining, or deterioration"
          score_1: "Significant damage, safety concern, facade ordinance risk"
        - element: "Windows"
          score_5: "Clean, seals intact, no cracked or broken panes"
          score_4: "Clean, minor edge condensation"
          score_3: "Some dirty windows, minor seal issues"
          score_2: "Dirty, failed seals (fogged), or cracked panes"
          score_1: "Broken panes, significant seal failure"
        - element: "Sidewalks and entry"
          score_5: "Clean, even, no trip hazards, well-lit"
          score_4: "Clean, minor wear"
          score_3: "Some debris, minor unevenness"
          score_2: "Dirty, trip hazards, poor lighting"
          score_1: "Significant trip hazard, ADA non-compliance, safety risk"

    - zone: "parking"
      zone_id: 8
      criteria:
        - element: "Surface condition"
          score_5: "Smooth, sealed, no potholes, proper drainage"
          score_4: "Good condition, minor surface wear"
          score_3: "Acceptable, small cracks, one minor pothole"
          score_2: "Cracking, potholes, ponding water"
          score_1: "Significant deterioration, multiple potholes, drainage failure"
        - element: "Striping and signage"
          score_5: "Bright, clearly visible, all signs present and legible"
          score_4: "Visible, minor fading in low-traffic areas"
          score_3: "Fading in some areas, all signs present"
          score_2: "Significantly faded, missing signs"
          score_1: "Striping not visible, missing or damaged signs"
        - element: "Lighting"
          score_5: "All fixtures operational, even coverage, no dark areas"
          score_4: "All operational, minor shadows in corners"
          score_3: "1-2 fixtures out, generally adequate"
          score_2: "Dark areas, multiple fixtures out"
          score_1: "Significant dark areas, security concern"
        - element: "Curbs and wheel stops"
          score_5: "Intact, painted, properly positioned"
          score_4: "Intact, minor paint wear"
          score_3: "Minor damage, mostly functional"
          score_2: "Damaged or displaced wheel stops"
          score_1: "Missing or severely damaged, vehicles overhanging walks"

    - zone: "mechanical_rooms"
      zone_id: 9
      criteria:
        - element: "Access"
          score_5: "Locked, keyed access only, signage posted"
          score_4: "Secured, signage present"
          score_3: "Secured, signage needs update"
          score_2: "Lock not functioning or signage missing"
          score_1: "Unsecured access, unauthorized entry possible"
        - element: "Labeling"
          score_5: "All equipment, valves, panels clearly labeled"
          score_4: "Most labeled, minor updates needed"
          score_3: "Partially labeled"
          score_2: "Minimal labeling, difficult to identify equipment"
          score_1: "No labeling, safety hazard for emergency response"
        - element: "Cleanliness and organization"
          score_5: "Clean, organized, no storage of non-mechanical items"
          score_4: "Clean, organized"
          score_3: "Some clutter, needs organizing"
          score_2: "Cluttered, unauthorized storage"
          score_1: "Dirty, heavily cluttered, leak evidence, fire code concern"

    - zone: "roof"
      zone_id: 10
      criteria:
        - element: "Membrane/surface condition"
          score_5: "No defects, clean, properly sloped to drains"
          score_4: "Good condition, minor debris"
          score_3: "Minor wear, no active leaks"
          score_2: "Blistering, cracking, or ponding water"
          score_1: "Active leak, significant damage, membrane failure"
        - element: "Drains and scuppers"
          score_5: "Clear, free-flowing, strainers in place"
          score_4: "Clear, minor debris near drains"
          score_3: "Some debris, may slow in heavy rain"
          score_2: "Partially blocked, ponding risk"
          score_1: "Blocked, ponding present, structural load concern"
        - element: "Equipment screens and fall protection"
          score_5: "All screens intact, fall protection compliant, warning lines in place"
          score_4: "Intact, minor cosmetic wear"
          score_3: "One screen needs repair, fall protection in place"
          score_2: "Damaged screens, fall protection deficient"
          score_1: "Missing screens, no fall protection, OSHA violation"

---
landscaping_condition:
  description: "Seasonal scoring criteria for landscaping quality"
  frequency: "Quarterly"

  scoring_by_season:
    spring:
      - element: "Cleanup completeness"
        score_5: "All winter debris removed, beds edged and mulched, lawn dethatched"
        score_3: "Mostly cleaned, some areas need attention"
        score_1: "Winter debris still present, beds not prepared"
      - element: "Planting"
        score_5: "Seasonal color installed, dead plants replaced, design intent maintained"
        score_3: "Some new planting, some gaps"
        score_1: "No new planting, dead plant material visible"
      - element: "Irrigation"
        score_5: "System started, all heads checked, coverage verified, no leaks"
        score_3: "System running, minor coverage issues"
        score_1: "System not started or major failures"

    summer:
      - element: "Turf condition"
        score_5: "Green, uniform height (3-3.5 inches), no bare spots, edged"
        score_3: "Green with some stress areas, mowed regularly"
        score_1: "Brown, patchy, uneven, not mowed regularly"
      - element: "Shrub and tree condition"
        score_5: "Pruned to shape, healthy foliage, no dead branches"
        score_3: "Generally healthy, needs shaping"
        score_1: "Overgrown, dead branches, disease visible"
      - element: "Weed control"
        score_5: "No weeds in beds or pavement joints"
        score_3: "Minor weeds, controlled"
        score_1: "Heavy weed growth, untreated"

    fall:
      - element: "Leaf management"
        score_5: "Removed within 48 hours of accumulation, beds clean"
        score_3: "Removed weekly, some accumulation"
        score_1: "Heavy accumulation, not removed"
      - element: "Winterization"
        score_5: "Irrigation blown out, tender plants protected, fall fertilization complete"
        score_3: "Irrigation off, basic winterization"
        score_1: "System not winterized, freeze damage risk"

    winter:
      - element: "Snow/ice management"
        score_5: "Cleared within 2 hours of cessation, salt/sand applied, ADA routes clear"
        score_3: "Cleared within 4 hours, main routes clear"
        score_1: "Not cleared within 8 hours, ice hazards present"
      - element: "Dormant appearance"
        score_5: "Beds mulched, no debris, hardscape clean"
        score_3: "Acceptable dormant appearance"
        score_1: "Debris, damaged plants, unkempt appearance"

---
parking_compliance:
  description: "Parking management scoring and enforcement workflow"

  permit_verification:
    process:
      1: "Assign unique permit number tied to tenant, vehicle, and space"
      2: "Issue permit (hangtag or sticker) with expiration date"
      3: "Maintain digital registry: permit number, tenant, vehicle make/model/plate, space assignment"
      4: "Monthly reconciliation: permits issued vs. spaces allocated vs. lease entitlement"

  violation_tracking:
    escalation:
      first_offense: "Warning notice placed on vehicle (photo documented)"
      second_offense: "Written violation notice to tenant contact"
      third_offense: "Vehicle booted or towed per posted signage and local law"
    documentation: "Date, time, location, photo, plate number, permit status, action taken"

  enforcement_workflow:
    daily_patrol:
      time: "8:00 AM and 2:00 PM"
      check: "Verify permits displayed, no unauthorized vehicles, ADA spaces clear"
    monthly_report:
      metrics:
        - "Permits issued vs. capacity"
        - "Violations issued by type"
        - "Revenue collected vs. projected"
        - "Maintenance items (striping, signage, surface, lighting)"
