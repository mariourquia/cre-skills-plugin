decision_framework:
  stabilized_core:
    first_choice: "Life company (lowest rate, longest term)"
    second_choice: "Agency (if multifamily, higher leverage)"
    avoid: "Bridge (overpaying for flexibility not needed)"
  stabilized_multifamily:
    first_choice: "Agency (best leverage + rate combo for MF)"
    second_choice: "Life company (lower rate if lower leverage acceptable)"
    avoid: "Bridge"
  value_add:
    first_choice: "Bridge (funds renovation, IO during transition)"
    second_choice: "Bank (if lower leverage acceptable, relationship pricing)"
    permanent_takeout: "Agency or CMBS (refinance after stabilization)"
  commercial_stabilized:
    first_choice: "CMBS (all property types, non-recourse)"
    second_choice: "Life company (if asset is core quality)"
    third_choice: "Bank (if flexible terms needed)"
  small_balance:
    first_choice: "Bank (relationship, speed)"
    second_choice: "Agency small balance (Fannie/Freddie for $1M-$7.5M MF)"
    avoid: "CMBS (not cost-effective below $5M)"
