# State Landlord-Tenant Rules Reference
# Key rules for the top 25 states by rental housing stock.
# Data reflects mid-2025 statutes. ALWAYS verify against current state law
# before relying on specific thresholds -- these change frequently.
#
# Fields:
#   security_deposit_max: maximum security deposit allowed
#   deposit_return_days: days after move-out to return deposit or itemized statement
#   deposit_interest: whether interest on deposits is required
#   deposit_separate_account: whether a separate account is required
#   late_fee_cap: statutory limit on late fees (null = no statutory cap)
#   grace_period_days: statutory grace period before late fee may be assessed
#   notice_to_quit_nonpayment_days: days in a pay-or-quit notice for nonpayment
#   notice_to_terminate_monthly_days: days notice to terminate a month-to-month tenancy
#   rent_increase_notice_days: days notice required before rent increase
#   source_of_income_protected: whether source of income (Section 8) is protected
#   rent_control: whether any form of rent control exists (state or local)
#   lead_paint_state_rules: state-level lead paint rules beyond federal (pre-1978)
#   eviction_timeline_estimate: rough estimate of uncontested eviction timeline
#   notes: important state-specific considerations

states:
  california:
    security_deposit_max: "2 months (unfurnished), 3 months (furnished)"
    deposit_return_days: 21
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "No statutory cap, but courts void 'unreasonable' fees. Industry norm: 5-6% of rent."
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 3
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: "30 days (increase < 10%), 90 days (increase >= 10%)"
    source_of_income_protected: true
    rent_control: true
    lead_paint_state_rules: "State disclosure required for pre-1978. Some cities require inspections."
    eviction_timeline_estimate: "45-90 days"
    notes: "AB 1482 (2020) caps rent increases at 5% + CPI (max 10%) statewide for qualifying properties (15+ years old, with exemptions). Just cause eviction required for qualifying properties."

  new_york:
    security_deposit_max: "1 month rent (statewide since 2019 HSTPA)"
    deposit_return_days: 14
    deposit_interest: true
    deposit_separate_account: true
    late_fee_cap: "$50 or 5% of rent, whichever is less"
    grace_period_days: 5
    notice_to_quit_nonpayment_days: 14
    notice_to_terminate_monthly_days: "30 days (tenancy < 1yr), 60 days (1-2yr), 90 days (2+yr)"
    rent_increase_notice_days: "30 days (tenancy < 1yr), 60 days (1-2yr), 90 days (2+yr)"
    source_of_income_protected: true
    rent_control: true
    lead_paint_state_rules: "NYC Local Law 1 requires lead paint inspections in buildings with children under 6."
    eviction_timeline_estimate: "60-120+ days (NYC can be 6+ months)"
    notes: "HSTPA (2019) eliminated most landlord-friendly provisions. Rent stabilization applies to many NYC units. Statewide good cause eviction law enacted 2024."

  texas:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 30
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "No statutory cap. Must be 'reasonable.' Industry norm: 10-12% of rent is generally upheld."
    grace_period_days: 2
    notice_to_quit_nonpayment_days: 3
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "21-30 days"
    notes: "Most landlord-friendly large state. No rent control preemption. Justice court handles evictions quickly. Lockouts for nonpayment are legal with specific notice requirements."

  florida:
    security_deposit_max: "No statutory limit"
    deposit_return_days: "15 days (no deductions), 30 days (with deductions)"
    deposit_interest: "Optional, but if held in interest-bearing account, must pay 75% of interest or 5% simple interest annually"
    deposit_separate_account: true
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 3
    notice_to_terminate_monthly_days: 15
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "14-30 days (uncontested)"
    notes: "Fast eviction process. Landlord must notify tenant within 30 days of receipt of deposit how and where deposit is held."

  illinois:
    security_deposit_max: "No statutory limit (but Chicago caps at 1.5 months)"
    deposit_return_days: "30 days (45 days if deductions)"
    deposit_interest: "Required in jurisdictions with 25+ units (Chicago, Evanston, others)"
    deposit_separate_account: true
    late_fee_cap: "$20/month for first $500 of rent, then 5% of amount over $500 (Chicago RLTO)"
    grace_period_days: 5
    notice_to_quit_nonpayment_days: 5
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: true
    rent_control: false
    lead_paint_state_rules: "Chicago Lead Ordinance requires pre-1978 rental units to be inspected."
    eviction_timeline_estimate: "30-60 days"
    notes: "Chicago RLTO (Residential Landlord and Tenant Ordinance) is far more restrictive than state law. Significant penalties for non-compliance. Treat Chicago as its own jurisdiction."

  pennsylvania:
    security_deposit_max: "2 months (first year), 1 month (subsequent years)"
    deposit_return_days: 30
    deposit_interest: "Required after 2 years of tenancy (interest-bearing escrow account)"
    deposit_separate_account: true
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 10
    notice_to_terminate_monthly_days: "15 days (lease < 1yr), 30 days (lease >= 1yr)"
    rent_increase_notice_days: 30
    source_of_income_protected: "Philadelphia yes, statewide no"
    rent_control: false
    lead_paint_state_rules: "Philadelphia requires lead-safe certification for pre-1978 rentals."
    eviction_timeline_estimate: "30-60 days"
    notes: "Security deposit reduction from 2 months to 1 month after first year is unique. Philadelphia has its own Fair Practices Ordinance with additional protections."

  ohio:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 30
    deposit_interest: "Required if deposit > $50 and tenancy > 6 months (5% or actual interest)"
    deposit_separate_account: false
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 3
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "21-30 days"
    notes: "Landlord-friendly state. No rent control. Relatively fast eviction process."

  georgia:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 30
    deposit_interest: false
    deposit_separate_account: "Required if landlord owns 10+ units (escrow account)"
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: "Immediate demand (no cure period)"
    notice_to_terminate_monthly_days: 60
    rent_increase_notice_days: 60
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "14-30 days"
    notes: "No statutory cure period for nonpayment -- landlord can demand immediate payment and file for dispossessory if not paid. Very landlord-friendly."

  north_carolina:
    security_deposit_max: "1.5 months (week-to-week tenancy: 2 weeks), 2 months (month-to-month)"
    deposit_return_days: 30
    deposit_interest: false
    deposit_separate_account: "Required (trust account or bond)"
    late_fee_cap: "$15 or 5% of rent, whichever is greater"
    grace_period_days: 5
    notice_to_quit_nonpayment_days: 10
    notice_to_terminate_monthly_days: 7
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "14-30 days"
    notes: "Late fee cap is specifically codified. Trust account for deposits required with landlord's name and address on the account."

  michigan:
    security_deposit_max: "1.5 months rent"
    deposit_return_days: 30
    deposit_interest: false
    deposit_separate_account: "Required (regulated financial institution)"
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 7
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "State lead rules track federal. Detroit has additional requirements."
    eviction_timeline_estimate: "30-45 days"
    notes: "Landlord must provide tenant with inventory of existing damages within 7 days of move-in. Security deposit must be held in regulated financial institution."

  new_jersey:
    security_deposit_max: "1.5 months rent"
    deposit_return_days: 30
    deposit_interest: true
    deposit_separate_account: true
    late_fee_cap: "No statutory cap. Courts void 'unconscionable' fees."
    grace_period_days: 5
    notice_to_quit_nonpayment_days: 30
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: true
    rent_control: "Local option (many municipalities have it)"
    lead_paint_state_rules: "State registration and inspection requirements for pre-1978 multifamily."
    eviction_timeline_estimate: "45-90 days"
    notes: "Strong tenant protections. Interest on deposits required annually. Many municipalities have rent control ordinances. Anti-eviction act requires good cause for removal."

  virginia:
    security_deposit_max: "2 months rent"
    deposit_return_days: 45
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "10% of periodic rent or 10% of remaining balance, whichever is less"
    grace_period_days: 5
    notice_to_quit_nonpayment_days: 5
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: "Some localities"
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "21-45 days"
    notes: "VRLTA (Virginia Residential Landlord Tenant Act) governs most residential tenancies. Specific late fee cap is codified at 10%."

  washington:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 21
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 14
    notice_to_terminate_monthly_days: 20
    rent_increase_notice_days: 60
    source_of_income_protected: true
    rent_control: "No (but Seattle has specific protections)"
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "30-60 days"
    notes: "Just cause eviction law in Seattle (and statewide for some properties since 2021). 60-day rent increase notice is longer than most states."

  massachusetts:
    security_deposit_max: "1 month rent"
    deposit_return_days: 30
    deposit_interest: true
    deposit_separate_account: true
    late_fee_cap: "No statutory cap. Must be 'reasonable.' $50 is common."
    grace_period_days: 30
    notice_to_quit_nonpayment_days: 14
    notice_to_terminate_monthly_days: "30 days or rental period, whichever is longer"
    rent_increase_notice_days: "30 days (or rental period)"
    source_of_income_protected: true
    rent_control: "No (repealed 1994)"
    lead_paint_state_rules: "Strict lead paint law. Landlords must delead if child under 6 lives in pre-1978 unit."
    eviction_timeline_estimate: "60-90 days"
    notes: "Very strict security deposit statute. Failure to comply exactly can result in 3x damages. Must provide receipt for deposit, identify bank and account, pay 5% interest annually. 30-day grace period before late fees is uniquely long."

  arizona:
    security_deposit_max: "1.5 months rent"
    deposit_return_days: 14
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 5
    notice_to_quit_nonpayment_days: 5
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "14-21 days"
    notes: "Fast eviction process. 14-day deposit return is among the shortest. Landlord-friendly state."

  tennessee:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 30
    deposit_interest: false
    deposit_separate_account: "Required (separate from landlord's personal funds)"
    late_fee_cap: "10% of past-due rent (statutory maximum)"
    grace_period_days: 5
    notice_to_quit_nonpayment_days: 14
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "14-30 days"
    notes: "Late fee cap at 10% is statutory. Relatively fast eviction process through General Sessions Court."

  maryland:
    security_deposit_max: "2 months rent"
    deposit_return_days: 45
    deposit_interest: "Required (simple interest at rate set annually by state)"
    deposit_separate_account: true
    late_fee_cap: "5% of monthly rent"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: "Immediate (no notice required for nonpayment)"
    notice_to_terminate_monthly_days: "30 days (most), 60 days (Baltimore City)"
    rent_increase_notice_days: 30
    source_of_income_protected: true
    rent_control: "Some jurisdictions (Montgomery County, Takoma Park)"
    lead_paint_state_rules: "Maryland has strict lead paint law for pre-1978 properties. Registration required. Must provide lead-free or lead-safe certification."
    eviction_timeline_estimate: "30-60 days"
    notes: "Late fee cap at 5% is one of the lowest. Security deposit interest rate set by the Commissioner of Financial Regulation annually. Strict lead paint requirements."

  indiana:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 45
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 10
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "21-30 days"
    notes: "Landlord-friendly. No deposit limit. Relatively fast eviction process."

  minnesota:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 21
    deposit_interest: "Required (1% simple interest)"
    deposit_separate_account: false
    late_fee_cap: "8% of overdue rent"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 14
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: true
    rent_control: "St. Paul has rent stabilization (3% cap, effective 2022)"
    lead_paint_state_rules: "Federal rules only. Minneapolis has additional rental licensing requirements."
    eviction_timeline_estimate: "30-45 days"
    notes: "Late fee cap at 8% is statutory. Interest on deposits required. St. Paul rent stabilization is unique -- 3% annual cap regardless of CPI."

  colorado:
    security_deposit_max: "No statutory limit"
    deposit_return_days: "30 days (60 days if stated in lease)"
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "$50 or 5% of past-due rent, whichever is greater (effective 2023)"
    grace_period_days: 7
    notice_to_quit_nonpayment_days: 10
    notice_to_terminate_monthly_days: 21
    rent_increase_notice_days: 30
    source_of_income_protected: true
    rent_control: false
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "30-45 days"
    notes: "Significant tenant protection reforms in 2023-2024. Late fee cap is new. 7-day grace period required. Source of income now protected."

  wisconsin:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 21
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 0
    notice_to_quit_nonpayment_days: 5
    notice_to_terminate_monthly_days: 28
    rent_increase_notice_days: 28
    source_of_income_protected: false
    rent_control: false
    lead_paint_state_rules: "State disclosure required for pre-1978. Stricter than federal in some respects."
    eviction_timeline_estimate: "14-30 days"
    notes: "Landlord must provide itemized deposit accounting within 21 days. 28-day notice period is unique. ATCP 134 (WI Admin Code) governs rental practices."

  connecticut:
    security_deposit_max: "2 months rent"
    deposit_return_days: 30
    deposit_interest: true
    deposit_separate_account: true
    late_fee_cap: "No statutory cap. Must be 'reasonable.'"
    grace_period_days: 9
    notice_to_quit_nonpayment_days: 3
    notice_to_terminate_monthly_days: 30
    rent_increase_notice_days: 30
    source_of_income_protected: true
    rent_control: false
    lead_paint_state_rules: "Connecticut has comprehensive lead paint statute for pre-1978 properties."
    eviction_timeline_estimate: "30-60 days"
    notes: "9-day grace period is one of the longest. Interest on deposits required annually. Source of income protected since 1990 (one of the earliest states)."

  oregon:
    security_deposit_max: "No statutory limit"
    deposit_return_days: 31
    deposit_interest: false
    deposit_separate_account: false
    late_fee_cap: "Reasonable amount. $50/month is generally accepted; above $100 may be challenged."
    grace_period_days: 4
    notice_to_quit_nonpayment_days: "72 hours (first occurrence), 144 hours (repeat within 12 months)"
    notice_to_terminate_monthly_days: "30 days (first year), 90 days (after first year, with cause)"
    rent_increase_notice_days: 90
    source_of_income_protected: true
    rent_control: true
    lead_paint_state_rules: "Federal rules only."
    eviction_timeline_estimate: "30-45 days"
    notes: "SB 608 (2019) caps rent increases at 7% + CPI statewide (with exemptions for new construction < 15 years). 90-day rent increase notice is among the longest. Just cause eviction after first year."
