# LP Objection Library
# 15 objections organized by investor type with response frameworks.
# Each entry: objection text, investor types most likely to raise it,
# why they ask, response framework, and a concrete example response.

---

# CATEGORY 1: TRACK RECORD AND EXPERIENCE

objection_01:
  text: "You don't have enough track record. We need to see at least 3 full-cycle funds."
  investor_types:
    - pension
    - endowment
    - fund_of_funds
  why_they_ask: >
    Institutional LPs have allocation constraints. Committing to an emerging
    manager means higher perceived risk. Their IC wants demonstrated ability to
    execute across a full market cycle (acquisition, operation, disposition).
  response_framework:
    structure: "Acknowledge, reframe, evidence, close"
    steps:
      - "Acknowledge the concern directly. Do not dismiss it."
      - "Reframe: track record is about the team, not the fund label."
      - "Present the team's pre-fund track record (deals done at prior shops)."
      - "Highlight any realized exits, even if small."
      - "Close: offer reference calls with existing investors and co-investment partners."
  example_response: >
    "We are a Fund II manager, so our fund-level track record is limited to
    5 realized investments. However, the investment team has 45 combined years
    of experience and $380M of aggregate transaction volume across their prior
    roles at [Prior Firm 1] and [Prior Firm 2]. We can provide deal-level
    detail on 12 transactions personally led by our partners, including 3 full
    cycles with documented gross IRRs ranging from 14-22%. We also have 3
    existing institutional LPs from Fund I who have committed to re-up in
    Fund II -- we are happy to arrange reference calls."

objection_02:
  text: "Your returns look good, but they're mostly unrealized. What happens when you actually sell?"
  investor_types:
    - pension
    - family_office
    - fund_of_funds
  why_they_ask: >
    Unrealized returns depend on GP valuations. LPs know GPs can mark
    aggressively. The LP wants to see cash-on-cash realized performance.
  response_framework:
    structure: "Separate, validate, contextualize"
    steps:
      - "Separate realized from unrealized returns explicitly."
      - "Show the realized-only IRR and EM (it should be strong)."
      - "Explain the valuation methodology for unrealized (T-12 NOI, external appraisals)."
      - "Offer data room access for third-party appraisals."
  example_response: >
    "Good question. Of our 8 investments, 3 are fully realized with a
    15.8% gross IRR and 1.92x gross EM on $14M of equity. The 5
    unrealized investments are valued using trailing 12-month actual NOI
    capitalized at rates derived from comparable sales within 6 months.
    Two of the five had independent USPAP appraisals in Q4 2025 -- both
    came in within 3% of our internal marks. We can share the appraisals
    in the data room."

objection_03:
  text: "You've never managed through a downturn. How do I know you can protect capital?"
  investor_types:
    - pension
    - endowment
    - sovereign_wealth
  why_they_ask: >
    Post-2022 rate shock, LPs are focused on downside protection. If the GP
    has only operated in a favorable market, there is no evidence of
    resilience.
  response_framework:
    structure: "Evidence from adversity, structural protections, stress test"
    steps:
      - "Cite any challenging situations you navigated (even if not a full downturn)."
      - "Highlight structural downside protections in the strategy (basis discount, low leverage)."
      - "Present stress-test results from your underwriting."
      - "Reference the team's downturn experience from prior firms."
  example_response: >
    "Fund I deployed capital in 2022-2024, which included a 425bps rate
    increase cycle. During that period, we acquired 5 assets at an
    average 22% discount to replacement cost. Our average going-in LTV
    of 63% provided a meaningful cushion. When one asset's NOI
    underperformed plan by 12% in 2023 due to insurance cost spikes,
    we renegotiated the insurance program and filed a tax appeal that
    recovered $45K annually. No capital calls beyond the original
    commitment were required. At the team level, our principals managed
    $120M of assets through the 2008-2010 period at [Prior Firm],
    with zero principal losses on equity."

---

# CATEGORY 2: STRATEGY AND MARKET

objection_04:
  text: "Your market is too concentrated. What if Newark/Jersey City has a downturn?"
  investor_types:
    - pension
    - fund_of_funds
    - endowment
  why_they_ask: >
    Geographic concentration is a real risk. Institutional LPs manage
    diversified portfolios and worry about correlated losses.
  response_framework:
    structure: "Justify concentration, quantify the edge, show the stress case"
    steps:
      - "Explain why concentration IS the strategy (local sourcing edge, operator knowledge)."
      - "Quantify the edge: off-market deal flow, pricing advantage, execution speed."
      - "Show the stress-test: what happens if the market declines 10-20%?"
      - "Note that the LP's own portfolio provides diversification; the fund's job is alpha."
  example_response: >
    "Our concentration in Northern NJ is intentional -- it is the source
    of our edge. We have sourced 60% of Fund I deals off-market through
    local broker and estate attorney relationships that require physical
    presence and multi-year cultivation. Our average acquisition price is
    15% below marketed comparables. In a stress scenario where Newark MF
    values decline 15%, our portfolio LTV would increase from 63% to 74%
    -- still within lender covenants. NOI at a 10% haircut still covers
    debt service at 1.05x. The LP's broader portfolio provides
    geographic diversification; our fund's mandate is to deliver alpha
    in a market we know deeply."

objection_05:
  text: "Why multifamily? Isn't the sector overbuilt and overpriced?"
  investor_types:
    - family_office
    - fund_of_funds
  why_they_ask: >
    National headlines about Sun Belt oversupply and elevated MF
    valuations create concern. The LP may not distinguish between
    national trends and submarket dynamics.
  response_framework:
    structure: "National vs. local, supply data, basis argument"
    steps:
      - "Acknowledge the national oversupply narrative and agree it applies to some markets."
      - "Present submarket-specific supply data showing your markets are NOT oversupplied."
      - "Show your purchase basis vs. replacement cost (can you build for less than you buy?)."
      - "Cite demand drivers specific to your submarket."
  example_response: >
    "You are right that Sun Belt markets like Austin and Nashville have
    significant oversupply -- 7-10% inventory growth in 2024-2025.
    Our target markets are the opposite. Newark Ironbound has 0 units
    under construction within 0.5 miles and a 2.8% vacancy rate. Rent
    growth was 2.8% in 2025 despite the national deceleration. Our
    average basis of $245K/unit is 20-25% below the $310-330K/unit
    replacement cost, meaning new supply is not economically viable at
    current rents. We are buying assets that cannot be replicated at
    our cost basis."

objection_06:
  text: "How is this different from every other value-add MF fund pitching us?"
  investor_types:
    - all
  why_they_ask: >
    LPs see dozens of value-add MF pitches. They need to understand what
    makes THIS fund differentiated. The answer cannot be "we are good operators."
  response_framework:
    structure: "Specific edge, quantified, verifiable"
    steps:
      - "Name 1-2 specific, verifiable competitive advantages."
      - "Quantify each advantage (discount to market, deal flow volume, execution speed)."
      - "Offer proof points (specific deals, references, data)."
  example_response: >
    "Two things differentiate us. First, sourcing: 60% of our deals
    are off-market, sourced through estate attorneys and local brokers
    who send us deals before marketing. Our Fund I average purchase
    price was $238K/unit vs. $275K/unit average for marketed MF
    transactions in Northern NJ -- a 13% discount. We can provide the
    comp set. Second, execution speed: our in-house property management
    and renovation team starts unit turns within 14 days of acquisition.
    Fund I averaged 11 months from acquisition to stabilization, vs.
    the 18-24 month industry norm for comparable renovations."

