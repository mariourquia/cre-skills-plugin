# CATEGORY 3: TERMS AND FEES

objection_07:
  text: "Your management fee is too high. We're seeing 1.0-1.25% from other managers."
  investor_types:
    - pension
    - sovereign_wealth
    - fund_of_funds
  why_they_ask: >
    Fee compression is real. Large LPs have negotiating leverage and
    benchmark fees across their portfolio. Smaller/emerging managers
    charge higher fees due to fixed cost absorption.
  response_framework:
    structure: "Context, total fee load, alignment, negotiate"
    steps:
      - "Acknowledge the fee environment."
      - "Show total fee load (TER) and compare to peer funds of similar size."
      - "Highlight fee offsets and alignment features."
      - "If appropriate, offer a fee break at a higher commitment level."
  example_response: >
    "At 1.5% on committed, we are above the large-fund market but in
    line with emerging managers at our fund size ($50-100M). Our
    acquisition fee (1.0%) is 100% offset against the management fee,
    which reduces effective annual fee drag to approximately 1.1%.
    We also reduce to 1.0% on invested capital post-investment period.
    For commitments above $5M, we offer a fee discount to 1.25% on
    committed during the investment period."

objection_08:
  text: "We need a co-investment right and most-favored-nation clause."
  investor_types:
    - pension
    - family_office
    - sovereign_wealth
  why_they_ask: >
    Co-invest allows LPs to increase exposure to the best deals at
    lower fees. MFN protects them from a later LP getting better terms.
  response_framework:
    structure: "Standard accommodation with limits"
    steps:
      - "Agree to co-investment rights on a pro-rata basis."
      - "Agree to MFN for economic terms (fees, carry) but not for governance."
      - "Set a minimum for co-invest allocation to avoid administrative burden."
  example_response: >
    "We provide co-investment rights to all LPs committing $3M or more,
    allocated pro-rata based on fund commitment. Co-invest is offered
    at zero management fee and zero carry -- the LP pays only its share
    of deal-level expenses. We include an MFN clause for economic terms
    in the side letter. Governance terms (advisory committee seats,
    reporting frequency) are allocated based on commitment size."

objection_09:
  text: "Your GP commitment is too low. We want 5% minimum."
  investor_types:
    - pension
    - endowment
    - fund_of_funds
  why_they_ask: >
    GP commitment signals alignment. If the GP has minimal personal
    capital at risk, the LP worries about misaligned incentives.
  response_framework:
    structure: "Show the dollar amount, personal significance, other alignment"
    steps:
      - "State the dollar amount, not just the percentage."
      - "Explain its significance relative to the GP's personal net worth."
      - "Highlight other alignment features (clawback, key person, no-fault removal)."
  example_response: >
    "Our GP commitment is $1.5M, which is 3% of the $50M target.
    For context, this represents approximately 40% of the principals'
    liquid net worth. We are an emerging manager -- a 5% commitment
    ($2.5M) would require illiquid asset pledges, which we do not
    believe serves LP interests. We supplement our financial alignment
    with a full clawback escrow (25% of carried interest distributions),
    key person provisions, and a no-fault removal clause at 75%
    supermajority vote."

---

# CATEGORY 4: OPERATIONS AND RISK

objection_10:
  text: "What happens if your key person leaves or is incapacitated?"
  investor_types:
    - pension
    - endowment
    - fund_of_funds
  why_they_ask: >
    Small teams have key person risk. If the deal sourcer or principal
    is unavailable, the fund may not be able to deploy or manage capital.
  response_framework:
    structure: "Succession plan, contractual protections, bench strength"
    steps:
      - "Describe the key person provision in the LPA."
      - "Explain the succession plan (who takes over each function)."
      - "Highlight team depth beyond the key person."
  example_response: >
    "The LPA includes a key person provision covering [Name 1] and
    [Name 2]. If either is unable to devote substantially all business
    time to the fund, the investment period is automatically suspended.
    LPs then have 90 days to vote on resumption or wind-down. In terms
    of succession: [Name 2] has been the primary underwriter on 4 of 5
    Fund I deals and can assume sourcing responsibility. Our VP of
    Asset Management has 8 years of operating experience and manages
    day-to-day property operations independently. We also maintain
    relationships with two operating partners who could be engaged on
    a per-deal basis if needed."

objection_11:
  text: "How do you handle conflicts of interest between Fund I and Fund II?"
  investor_types:
    - all
  why_they_ask: >
    Multi-fund GPs face allocation conflicts: which fund gets the best
    deals? Is the GP managing Fund I assets diligently or focusing on
    deploying Fund II?
  response_framework:
    structure: "Policy, disclosure, governance"
    steps:
      - "Describe the allocation policy in the LPA."
      - "Show how Fund I is in a different lifecycle stage."
      - "Highlight advisory committee oversight."
  example_response: >
    "Fund I is fully deployed and in asset management / disposition
    mode. Fund II is in its investment period. There is no allocation
    conflict because the funds are in different stages. The LPA for
    both funds includes a formal allocation policy: deals within Fund
    II's investment criteria are offered to Fund II first. If Fund II
    passes or is fully deployed, deals can be offered to co-investors
    or a subsequent fund. The advisory committee reviews any potential
    conflict and has veto authority on conflicted transactions."

objection_12:
  text: "Your leverage is too high. We're not comfortable above 60% LTV."
  investor_types:
    - pension
    - endowment
  why_they_ask: >
    Post-2022 rate environment made leverage more expensive and risky.
    Institutional LPs have tightened leverage tolerance. 60% LTV is
    now a common ceiling for value-add.
  response_framework:
    structure: "Clarify actual vs. max, show DSCR, explain strategy"
    steps:
      - "Distinguish between maximum allowable LTV and actual portfolio LTV."
      - "Show DSCR and debt yield at the portfolio level."
      - "Explain the deleveraging path (value creation reduces LTV over time)."
  example_response: >
    "Our LPA permits up to 70% LTV per investment, but our actual
    portfolio average is 63% and declining as NOI growth reduces
    relative leverage. At stabilization, our portfolio LTV is
    projected to be 55-58% on current values. Portfolio DSCR is
    1.17x at current NOI and 1.35x at projected stabilized NOI.
    We target deleveraging from bridge to agency within 24-36
    months of acquisition, which reduces both rate risk and
    refinancing risk."

---

# CATEGORY 5: MARKET TIMING AND EXIT

objection_13:
  text: "How do you plan to exit in this rate environment? Who is buying?"
  investor_types:
    - all
  why_they_ask: >
    Higher rates have compressed transaction volume. LPs worry about
    exit liquidity and whether the GP can achieve the modeled exit cap.
  response_framework:
    structure: "Buyer universe, exit flexibility, hold extension option"
    steps:
      - "Identify 2-3 specific buyer types for your assets."
      - "Cite recent transaction data showing the buyer pool is active."
      - "Describe exit flexibility (individual asset sales, portfolio sale, refinance and hold)."
  example_response: >
    "Our target exit buyers are agency-qualified stabilized MF
    investors: insurance companies, private REITs, and 1031 exchange
    buyers. In 2025, Northern NJ MF transaction volume was $1.8B per
    MSCI, up 22% from 2024. Three comp sales within 1 mile closed at
    5.0-5.5% cap rates in Q4 2025. We have flexibility: individual
    asset sales to local operators, a portfolio sale to a platform
    buyer, or a refinance into agency debt (our stabilized debt yield
    of 8.1% qualifies) with continued hold if the exit market is
    unfavorable. Our fund term includes two 1-year extensions for
    exactly this scenario."

objection_14:
  text: "What if interest rates go higher? How does that affect your returns?"
  investor_types:
    - all
  why_they_ask: >
    Rate sensitivity is the top-of-mind risk for all CRE investors.
    LPs want to see that the GP has modeled rate scenarios.
  response_framework:
    structure: "Sensitivity table, structural protections, historical context"
    steps:
      - "Present the rate sensitivity table (IRR at +100, +200, +300bps)."
      - "Show structural protections (rate caps, fixed-rate conversion options)."
      - "Note that value-add returns are less rate-sensitive than core (NOI growth offsets)."
  example_response: >
    "Our sensitivity analysis shows the portfolio-level net IRR at
    base rates is 13.5%. At +100bps: 12.1%. At +200bps: 10.8%. At
    +300bps: 9.4%. The fund meets its 10% hurdle up to +200bps from
    current levels. We mitigate rate risk with: (1) rate caps on all
    floating-rate bridge loans (currently 3 of 5 assets), budgeted at
    acquisition, and (2) a refinance pathway to fixed-rate agency debt
    within 24-36 months. Importantly, our returns are primarily
    NOI-growth-driven -- NOI growth from renovation premiums is
    independent of rates."

objection_15:
  text: "We've already allocated to real estate this year. Come back next year."
  investor_types:
    - pension
    - endowment
  why_they_ask: >
    This is often a genuine allocation constraint, not a polite rejection.
    Pensions and endowments have annual allocation budgets. It may also be
    a soft no that needs to be tested.
  response_framework:
    structure: "Respect, stay warm, create urgency for next cycle"
    steps:
      - "Respect the allocation cycle. Do not push against it."
      - "Ask when their next allocation window opens."
      - "Offer to keep them updated quarterly so they have diligence done when the window opens."
      - "Create soft urgency around final close timing."
  example_response: >
    "Understood -- allocation timing is what it is. Two questions:
    when does your next RE allocation cycle begin, and would it be
    helpful if we added you to our quarterly investor update
    distribution so you can track our execution in real time? Our
    final close is targeted for [Month Year]. If your allocation
    opens before then, you would still have the option to come in
    at final close terms. In the meantime, I will send you our Q1
    update when it publishes in April."
