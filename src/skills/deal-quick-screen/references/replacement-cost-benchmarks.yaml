# CRE Replacement Cost Benchmarks
# Per-unit (MF) or per-SF (commercial) by property type and market tier
# Updated: 2026-03-17
# Sources: RSMeans, Marshall & Swift, recent ground-up development budgets
# These are all-in costs: land + hard costs + soft costs + developer profit
# Use for quick-screen comparison against acquisition basis

schema:
  version: "1.0"
  updated: "2026-03-17"
  usage: |
    Compare acquisition price per unit (or per SF) against replacement cost
    for the relevant market tier and property type. A basis below 75% of
    replacement cost provides meaningful margin of safety. Above 100%
    signals peak pricing or a bet on rent growth outpacing construction costs.

market_tier_definitions:
  tier_1:
    description: "Top 6 MSAs by institutional CRE volume"
    examples: ["New York", "Los Angeles", "San Francisco", "Chicago", "Boston", "Washington DC"]
    characteristics: "High land cost, union labor, long entitlement timelines, high soft costs"
  tier_2:
    description: "Major MSAs with active institutional markets"
    examples: ["Dallas", "Atlanta", "Denver", "Phoenix", "Austin", "Nashville", "Charlotte", "Raleigh", "Tampa", "Miami", "Seattle", "Portland"]
    characteristics: "Moderate land cost, competitive labor market, 12-18 month entitlements"
  tier_3:
    description: "Secondary/tertiary markets"
    examples: ["San Antonio", "Jacksonville", "Memphis", "Oklahoma City", "Louisville", "Birmingham", "Tucson", "Boise", "Spokane"]
    characteristics: "Low land cost, available labor, streamlined permitting"

# All costs in 2026 dollars

