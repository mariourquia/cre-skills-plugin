adjustment_factors:
  description: "Apply these multipliers to base replacement costs for specific conditions"

  union_labor:
    description: "Prevailing wage / union labor requirement"
    multiplier: [1.15, 1.35]
    applicable_markets: ["New York", "Chicago", "Boston", "San Francisco", "Los Angeles", "Philadelphia", "Detroit"]

  seismic_zone:
    description: "Seismic design category D, E, or F"
    multiplier: [1.08, 1.18]
    applicable_markets: ["San Francisco", "Los Angeles", "Seattle", "Portland", "Salt Lake City"]

  flood_zone:
    description: "FEMA flood zone AE or VE -- elevated construction required"
    multiplier: [1.10, 1.25]
    note: "Applies to ground floor and foundation. Multiplicative with other factors."

  entitlement_timeline:
    description: "Extended entitlement process adds carry cost"
    short: { months: "6-12", carry_cost_pct: "2-4%" }
    medium: { months: "12-24", carry_cost_pct: "4-8%" }
    long: { months: "24-48", carry_cost_pct: "8-16%" }
    note: "Tier 1 markets typically 18-36 months. Tier 3 markets 6-12 months."

  affordable_set_aside:
    description: "Inclusionary zoning requirement reduces achievable rents"
    impact: "10-20% of units at 60-80% AMI reduces blended revenue by 3-8%"
    markets_with_mandatory: ["New York", "San Francisco", "Los Angeles", "Boston", "Denver", "Portland"]

  impact_fees:
    description: "Municipal impact/linkage fees"
    range_per_unit: [2000, 30000]
    high_fee_markets: ["San Jose", "Irvine", "San Francisco", "Boulder", "Arlington VA"]
    note: "Can add 5-15% to total development cost in high-fee jurisdictions"

  construction_inflation:
    description: "Annual escalator to apply for forward-looking estimates"
    trailing_5yr_avg: "4.5%"
    current_annual_estimate: "3.5-5.0%"
    note: "Apply from benchmark date to expected construction midpoint"

worked_example:
  scenario: "Evaluating 200-unit garden-style MF acquisition in Raleigh (Tier 2) at $160K/unit"
  replacement_cost_calc:
    base_midpoint_per_unit: 195000
    adjustments: "No union labor, no seismic, no flood zone, standard entitlement (12 months)"
    adjusted_replacement_cost: 195000
    acquisition_basis: 160000
    basis_as_pct_of_replacement: "82%"
    scoring: "Score 3 on screening rubric (75-90% = moderate cushion)"
    interpretation: |
      At 82% of replacement cost, there is a modest margin of safety.
      New supply cannot be delivered at this basis, providing a floor.
      However, the discount is not deep enough to constitute a pure
      replacement-cost play. Rent growth and operational upside must
      carry the investment thesis.
