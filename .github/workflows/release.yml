name: Release (Draft)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $ver = $env:REF_NAME -replace '^v', ''
          if ($ver -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format: $ver (expected X.Y.Z)"
            exit 1
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building installer for version: $ver"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed"

      - name: Create dist directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

      - name: Compile installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "Inno Setup compiler not found at: $iscc"
            exit 1
          }
          $src = $env:GITHUB_WORKSPACE
          $ver = $env:APP_VERSION
          Write-Host "Compiling: ISCC /DSourceDir=$src /DAppVersion=$ver scripts\create-exe.iss"
          & $iscc "/DSourceDir=$src" "/DAppVersion=$ver" "scripts\create-exe.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup compilation failed with exit code: $LASTEXITCODE"
            exit 1
          }

      - name: Verify output
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $exe = "dist\cre-skills-v$($env:APP_VERSION)-setup.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Expected output not found: $exe"
            Get-ChildItem dist\ -ErrorAction SilentlyContinue
            exit 1
          }
          $size = (Get-Item $exe).Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "Installer built: $exe ($sizeMB MB)"

      - name: Generate SHA256 checksum
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $exe = "dist\cre-skills-v$($env:APP_VERSION)-setup.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          $filename = Split-Path $exe -Leaf
          "$hash  $filename" | Out-File "dist\cre-skills-v$($env:APP_VERSION)-setup.exe.sha256" -Encoding ascii -NoNewline
          Write-Host "SHA256: $hash"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: |
            dist/cre-skills-v${{ steps.version.outputs.VERSION }}-setup.exe
            dist/cre-skills-v${{ steps.version.outputs.VERSION }}-setup.exe.sha256
          retention-days: 30

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building installer for version: $VERSION"

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "::warning::APPLE_CERTIFICATE_BASE64 not set -- building unsigned DMG"
            echo "SKIP_SIGN=true" >> "$GITHUB_ENV"
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)"/\1/')
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SKIP_SIGN=false" >> "$GITHUB_ENV"

      - name: Build .dmg installer
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ "$SKIP_SIGN" = "true" ]; then
            bash scripts/create-dmg.sh "v${APP_VERSION}" --no-sign
          else
            bash scripts/create-dmg.sh "v${APP_VERSION}" --identity "$SIGN_IDENTITY"
          fi

      - name: Notarize and staple DMG
        if: env.SKIP_SIGN != 'true'
        continue-on-error: true
        id: notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_PATH="dist/cre-skills-v${APP_VERSION}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Verify signed DMG
        if: env.SKIP_SIGN != 'true' && steps.notarize.outcome == 'success'
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_PATH="dist/cre-skills-v${APP_VERSION}.dmg"
          spctl --assess --type open --context context:primary-signature "$DMG_PATH"
          codesign --verify --verbose "$DMG_PATH"
          echo "DMG is signed, notarized, and stapled"

      - name: Warn if notarization failed
        if: env.SKIP_SIGN != 'true' && steps.notarize.outcome != 'success'
        run: |
          echo "::warning::Notarization failed. DMG is signed but not notarized. Regenerate app-specific password at appleid.apple.com if this persists."

      - name: Generate SHA256 checksum
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_PATH="dist/cre-skills-v${APP_VERSION}.dmg"
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"
          cat "${DMG_PATH}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: |
            dist/cre-skills-v${{ steps.version.outputs.VERSION }}.dmg
            dist/cre-skills-v${{ steps.version.outputs.VERSION }}.dmg.sha256
          retention-days: 30

  build-packages:
    name: Build and package targets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/package-lock.json

      - name: Install tools dependencies
        run: cd tools && npm ci

      - name: Build all targets
        run: npx --prefix tools tsx tools/build.ts --target all

      - name: Validate all targets
        run: npx --prefix tools tsx tools/validate.ts --target all

      - name: Package Cowork target
        run: npx --prefix tools tsx tools/package/package-cowork.ts

      - name: Package Claude Code target
        run: npx --prefix tools tsx tools/package/package-claude-code.ts

      - name: Verify package outputs
        run: |
          for f in \
            dist/cre-skills-cowork.zip \
            dist/cre-skills-cowork.zip.sha256 \
            dist/cre-skills-claude-code.zip \
            dist/cre-skills-claude-code.zip.sha256; do
            if [ ! -f "$f" ]; then
              echo "::error::Expected output not found: $f"
              exit 1
            fi
          done
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: target-packages
          path: |
            dist/cre-skills-cowork.zip
            dist/cre-skills-cowork.zip.sha256
            dist/cre-skills-claude-code.zip
            dist/cre-skills-claude-code.zip.sha256
          retention-days: 30

  create-draft-release:
    name: Create draft release
    needs: [build-windows, build-macos, build-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: assets

      - name: List downloaded assets
        run: find assets -type f | sort

      - name: Generate release notes with install instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Generate GitHub's auto-notes into a temp file
          gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq '.body' > /tmp/auto-notes.md 2>/dev/null || echo "" > /tmp/auto-notes.md

          cat > /tmp/release-notes.md << 'HEADER'
          ## Install

          **Claude Code CLI (recommended):**
          ```
          claude plugin install --file /path/to/cre-skills-plugin
          ```

          **Installer:** Download the DMG (macOS) or EXE (Windows) from the assets below.

          **Cowork:** Download `cre-skills-cowork.zip` from the assets below.

          See [README](https://github.com/mariourquia/cre-skills-plugin#install) for all install methods.

          HEADER

          # Append auto-generated notes
          cat /tmp/auto-notes.md >> /tmp/release-notes.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Flatten artifacts into a single directory
          mkdir -p release-assets
          find assets -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

          gh release create "$TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --draft

          echo "Draft release created for $TAG"
