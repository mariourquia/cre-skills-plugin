name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $ver = $env:REF_NAME -replace '^v', ''
          if ($ver -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format: $ver (expected X.Y.Z)"
            exit 1
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building installer for version: $ver"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed"

      - name: Create dist directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

      - name: Compile installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "Inno Setup compiler not found at: $iscc"
            exit 1
          }
          $src = $env:GITHUB_WORKSPACE
          $ver = $env:APP_VERSION
          Write-Host "Compiling: ISCC /DSourceDir=$src /DAppVersion=$ver scripts\create-exe.iss"
          & $iscc "/DSourceDir=$src" "/DAppVersion=$ver" "scripts\create-exe.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup compilation failed with exit code: $LASTEXITCODE"
            exit 1
          }

      - name: Verify output
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $exe = "dist\cre-skills-v$($env:APP_VERSION)-setup.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Expected output not found: $exe"
            Get-ChildItem dist\ -ErrorAction SilentlyContinue
            exit 1
          }
          $size = (Get-Item $exe).Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "Installer built: $exe ($sizeMB MB)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/cre-skills-v${{ steps.version.outputs.VERSION }}-setup.exe
          retention-days: 30

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building installer for version: $VERSION"

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "::warning::APPLE_CERTIFICATE_BASE64 not set -- building unsigned DMG"
            echo "SKIP_SIGN=true" >> "$GITHUB_ENV"
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)"/\1/')
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SKIP_SIGN=false" >> "$GITHUB_ENV"

      - name: Build .dmg installer
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ "$SKIP_SIGN" = "true" ]; then
            bash scripts/create-dmg.sh "v${APP_VERSION}" --no-sign
          else
            bash scripts/create-dmg.sh "v${APP_VERSION}" --identity "$SIGN_IDENTITY"
          fi

      - name: Notarize and staple DMG
        if: env.SKIP_SIGN != 'true'
        continue-on-error: true
        id: notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_PATH="dist/cre-skills-v${APP_VERSION}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Verify signed DMG
        if: env.SKIP_SIGN != 'true' && steps.notarize.outcome == 'success'
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG_PATH="dist/cre-skills-v${APP_VERSION}.dmg"
          spctl --assess --type open --context context:primary-signature "$DMG_PATH"
          codesign --verify --verbose "$DMG_PATH"
          echo "DMG is signed, notarized, and stapled"

      - name: Warn if notarization failed
        if: env.SKIP_SIGN != 'true' && steps.notarize.outcome != 'success'
        run: |
          echo "::warning::Notarization failed. DMG is signed but not notarized. Regenerate app-specific password at appleid.apple.com if this persists."

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: dist/cre-skills-v${{ steps.version.outputs.VERSION }}.dmg
          retention-days: 30

  build-packages:
    name: Build and package targets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/package-lock.json

      - name: Install tools dependencies
        run: cd tools && npm ci

      - name: Build all targets
        run: npx --prefix tools tsx tools/build.ts --target all

      - name: Validate all targets
        run: npx --prefix tools tsx tools/validate.ts --target all

      - name: Package Cowork target
        run: npx --prefix tools tsx tools/package/package-cowork.ts

      - name: Package Claude Code target
        run: npx --prefix tools tsx tools/package/package-claude-code.ts

      - name: Package Desktop target
        run: npx --prefix tools tsx tools/package/package-desktop.ts

      - name: Package Portable target
        run: npx --prefix tools tsx tools/package/package-portable.ts

      - name: Build source archives
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git archive --format=tar.gz --prefix="cre-skills-plugin-${TAG_NAME}/" HEAD -o "dist/cre-skills-plugin-${TAG_NAME}.tar.gz"
          git archive --format=zip --prefix="cre-skills-plugin-${TAG_NAME}/" HEAD -o "dist/cre-skills-plugin-${TAG_NAME}.zip"

      - name: Verify package outputs
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          for f in \
            dist/cre-skills-cowork.zip \
            dist/cre-skills-claude-code.zip \
            dist/cre-skills-desktop.zip \
            dist/cre-skills-portable.zip \
            "dist/cre-skills-plugin-${TAG_NAME}.tar.gz" \
            "dist/cre-skills-plugin-${TAG_NAME}.zip"; do
            if [ ! -f "$f" ]; then
              echo "::error::Expected output not found: $f"
              exit 1
            fi
          done
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: target-packages
          path: |
            dist/cre-skills-cowork.zip
            dist/cre-skills-claude-code.zip
            dist/cre-skills-desktop.zip
            dist/cre-skills-portable.zip
            dist/cre-skills-plugin-${{ github.ref_name }}.tar.gz
            dist/cre-skills-plugin-${{ github.ref_name }}.zip
          retention-days: 30

  create-release:
    name: Create release
    needs: [build-windows, build-macos, build-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: assets

      - name: Prepare release assets
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CLEAN_VERSION="${TAG_NAME#v}"
          mkdir -p final-assets

          # Flatten all artifacts into one directory
          find assets -type f -exec cp {} final-assets/ \;

          # Normalize Windows installer filename to include tag
          if [ -f "final-assets/cre-skills-v${CLEAN_VERSION}-setup.exe" ]; then
            mv "final-assets/cre-skills-v${CLEAN_VERSION}-setup.exe" \
               "final-assets/cre-skills-plugin-${TAG_NAME}-setup.exe"
          fi

          # Normalize DMG filename to include tag
          if [ -f "final-assets/cre-skills-v${CLEAN_VERSION}.dmg" ]; then
            mv "final-assets/cre-skills-v${CLEAN_VERSION}.dmg" \
               "final-assets/cre-skills-plugin-${TAG_NAME}.dmg"
          fi

          ls -lah final-assets/

      - name: Create consolidated checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd final-assets
          sha256sum \
            "cre-skills-plugin-${TAG_NAME}.tar.gz" \
            "cre-skills-plugin-${TAG_NAME}.zip" \
            cre-skills-claude-code.zip \
            cre-skills-cowork.zip \
            cre-skills-desktop.zip \
            cre-skills-portable.zip \
            "cre-skills-plugin-${TAG_NAME}.dmg" \
            "cre-skills-plugin-${TAG_NAME}-setup.exe" \
            > "cre-skills-plugin-${TAG_NAME}.sha256"
          cat "cre-skills-plugin-${TAG_NAME}.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign release assets (keyless OIDC)
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd final-assets
          for f in "cre-skills-plugin-${TAG_NAME}.tar.gz" \
                   "cre-skills-plugin-${TAG_NAME}.zip" \
                   "cre-skills-claude-code.zip" \
                   "cre-skills-cowork.zip" \
                   "cre-skills-desktop.zip" \
                   "cre-skills-portable.zip" \
                   "cre-skills-plugin-${TAG_NAME}.dmg" \
                   "cre-skills-plugin-${TAG_NAME}-setup.exe" \
                   "cre-skills-plugin-${TAG_NAME}.sha256"; do
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert"
          done

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          CLEAN_VERSION="${TAG_NAME#v}"

          # Look for pre-written release-engineer notes
          RE_NOTES=""
          for candidate in \
            "docs/releases/${TAG_NAME}-release-notes.md" \
            "docs/releases/v${CLEAN_VERSION}-release-notes.md" \
            "docs/generated/RELEASE_NOTES_${TAG_NAME}.md" \
            "docs/generated/RELEASE_NOTES_v${CLEAN_VERSION}.md"; do
            if [ -f "$candidate" ]; then
              RE_NOTES="$candidate"
              break
            fi
          done

          if [ -z "$RE_NOTES" ]; then
            echo "::error::No /release-engineer notes found for ${TAG_NAME}. Run /release-engineer and commit the notes before tagging. Searched: docs/releases/ and docs/generated/"
            exit 1
          fi

          # Start with ASCII art banner
          ASCII_FILE="docs/assets/cre-skills-ascii.txt"
          {
            echo '```'
            if [ -f "$ASCII_FILE" ]; then
              cat "$ASCII_FILE"
            fi
            echo ""
            echo "                              ${TAG_NAME}"
            echo '```'
            echo ""
          } > /tmp/release-notes.md

          # Append release-engineer notes (strip YAML frontmatter if present)
          sed '/^---$/,/^---$/d' "$RE_NOTES" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md

          # Append install section
          cat >> /tmp/release-notes.md << 'INSTALL'
          ## Install

          **Marketplace (recommended):**
          ```
          claude plugin marketplace add mariourquia/cre-skills-plugin
          claude plugin install cre-skills@cre-skills-plugin
          ```

          **Installer:** Download the DMG (macOS) or EXE (Windows) from the assets below.

          **Cowork:** Download `cre-skills-cowork.zip` and upload via Customize > Browse plugins.

          See [docs/INSTALL.md](https://github.com/mariourquia/cre-skills-plugin/blob/main/docs/INSTALL.md) for all install methods.

          INSTALL

          # Append auto-generated changelog
          gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="$TAG_NAME" \
            --jq '.body' >> /tmp/release-notes.md 2>/dev/null || true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.tar.gz" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.zip" \
            "final-assets/cre-skills-claude-code.zip" \
            "final-assets/cre-skills-cowork.zip" \
            "final-assets/cre-skills-desktop.zip" \
            "final-assets/cre-skills-portable.zip" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.dmg" \
            "final-assets/cre-skills-plugin-${TAG_NAME}-setup.exe" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.sha256" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.tar.gz.sig" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.tar.gz.cert" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.zip.sig" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.zip.cert" \
            "final-assets/cre-skills-claude-code.zip.sig" \
            "final-assets/cre-skills-claude-code.zip.cert" \
            "final-assets/cre-skills-cowork.zip.sig" \
            "final-assets/cre-skills-cowork.zip.cert" \
            "final-assets/cre-skills-desktop.zip.sig" \
            "final-assets/cre-skills-desktop.zip.cert" \
            "final-assets/cre-skills-portable.zip.sig" \
            "final-assets/cre-skills-portable.zip.cert" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.dmg.sig" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.dmg.cert" \
            "final-assets/cre-skills-plugin-${TAG_NAME}-setup.exe.sig" \
            "final-assets/cre-skills-plugin-${TAG_NAME}-setup.exe.cert" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.sha256.sig" \
            "final-assets/cre-skills-plugin-${TAG_NAME}.sha256.cert" \
            --title "$TAG_NAME" \
            --notes-file /tmp/release-notes.md

  verify-checksums:
    name: Verify published artifact checksums
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download published assets and verify SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p verify
          cd verify

          echo "Downloading published assets for $TAG_NAME..."
          gh release download "$TAG_NAME" --repo "$REPO" \
            --pattern "cre-skills-plugin-${TAG_NAME}.tar.gz" \
            --pattern "cre-skills-plugin-${TAG_NAME}.zip" \
            --pattern "cre-skills-claude-code.zip" \
            --pattern "cre-skills-cowork.zip" \
            --pattern "cre-skills-desktop.zip" \
            --pattern "cre-skills-portable.zip" \
            --pattern "cre-skills-plugin-${TAG_NAME}.dmg" \
            --pattern "cre-skills-plugin-${TAG_NAME}-setup.exe" \
            --pattern "cre-skills-plugin-${TAG_NAME}.sha256"

          ls -lah

          # The published .sha256 file lists "<hex>  <filename>" for each artifact.
          # `sha256sum -c` recomputes each file's hash and compares.
          echo ""
          echo "Verifying checksums against published cre-skills-plugin-${TAG_NAME}.sha256..."
          sha256sum -c "cre-skills-plugin-${TAG_NAME}.sha256"
          echo ""
          echo "All published artifacts match their declared SHA256 sums."
