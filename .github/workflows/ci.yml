name: Plugin Integrity
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        node-version: ['18', '20', '22', '24']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install test dependencies
        run: pip install pytest pyyaml
      - name: Build catalog (required before tests)
        run: python scripts/catalog-build.py
      - name: Run integrity tests
        run: python -m pytest tests/ -v
      - name: Validate hooks JSON
        run: python -c "import json; json.load(open('hooks/hooks.json')); print('hooks.json OK')"
      - name: Validate hook scripts
        run: |
          for f in hooks/*.mjs; do node --check "$f"; done
      - name: Validate Python calculators
        run: |
          for f in scripts/calculators/*.py; do python -c "compile(open('$f').read(), '$f', 'exec')"; done
      - name: Verify plugin structure
        run: bash scripts/verify-install.sh || true
      - name: Validate registry references
        run: python scripts/registry-validator.py
      - name: Rebuild catalog and check for drift
        run: |
          python scripts/catalog-build.py
          python scripts/catalog-generate.py --check
