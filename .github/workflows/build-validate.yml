name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build tools
        run: cd tools && npm ci

      - name: Run doctor
        run: npx --prefix tools tsx tools/doctor.ts

      - name: Build all targets
        run: npx --prefix tools tsx tools/build.ts --target all

      - name: Validate all targets
        run: npx --prefix tools tsx tools/validate.ts --target all

      - name: Run build system tests
        run: npx --prefix tools tsx tools/test.ts
