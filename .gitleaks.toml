# Gitleaks configuration for secret scanning
# https://github.com/gitleaks/gitleaks

title = "cre-skills-plugin gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "apple-team-id"
description = "Hardcoded Apple Team ID"
regex = '''(?i)(team[_-]?id\s*[:=]\s*|--team-id\s+)([A-Z0-9]{10})'''
keywords = ["team-id", "team_id", "teamid"]

  [rules.allowlist]
  regexes = [
    '''YOUR_TEAM_ID''',
    '''\$APPLE_TEAM_ID''',
    '''\$\{\{\s*secrets\.''',
    '''PLACEHOLDER''',
  ]

[[rules]]
id = "personal-email"
description = "Personal email address (use noreply instead)"
regex = '''mario@mariourquia\.com'''
keywords = ["mario@mariourquia"]

[[rules]]
id = "local-filesystem-path"
description = "Hardcoded local filesystem path"
regex = '''/Users/\w+/'''
keywords = ["/Users/"]

  [rules.allowlist]
  paths = [
    '''\.github/workflows/.*\.yml$''',
    # Skill demo/example/sample transcripts are didactic by design and
    # frequently include illustrative filesystem paths (e.g. fake user
    # names like /Users/acme/) that read as placeholders to a human but
    # match the generic /Users/<name>/ pattern. Allowlisting these
    # scoped directories avoids false positives without weakening the
    # rule for production code paths.
    '''src/skills/[^/]+/examples/.*\.md$''',
    '''src/skills/[^/]+/tailoring/examples/.*\.md$''',
    '''src/skills/[^/]+/_core/routing/examples/.*\.md$''',
  ]

[allowlist]
paths = [
  '''\.gitleaks\.toml$''',
  '''node_modules/''',
  '''\.venv/''',
  '''__pycache__/''',
  # Workflow-tool TUI self-tests deliberately embed fake secret-shaped
  # strings (Bearer tokens, api_key=, password=) as fixtures to verify
  # the TUI's secret-redaction code paths. The tests themselves assert
  # the secrets are scrubbed from emitted artifacts; scanning them as
  # real secrets produces false positives.
  '''src/skills/[^/]+/workflows/[^/]+/tools/test_[^/]+\.py$''',
]
