# ============================================================
# CONCESSION NORMS BY PROPERTY TYPE
# ============================================================

concessions:
  multifamily:
    strong_market:
      free_rent_months: 0
      concession_value_pct_of_annual: 0  # No concessions needed
      deposit_waiver: false
      amenity_credits: false
    normal_market:
      free_rent_months: 1
      concession_value_pct_of_annual: 4.0  # ~0.5 months on 12-month lease
      deposit_waiver: false
      amenity_credits: true  # 1-2 months gym/parking
    weak_market:
      free_rent_months: 2
      concession_value_pct_of_annual: 10.0
      deposit_waiver: true  # Reduced or waived
      amenity_credits: true
      look_fee: 500  # Gift cards, move-in bonuses
    lease_up_premium:
      description: "Additional concessions during initial lease-up vs stabilized"
      multiplier: 1.5  # 50% more concessions than market norm during lease-up
      early_bird_discount: 0.05  # 5% rent discount for first 20% of units leased
      referral_bonus: 500  # Per referral that converts

  office:
    strong_market:
      free_rent_months_per_year_of_term: 0.5
      ti_allowance_psf: 40  # Vanilla box
      moving_allowance_psf: 0
    normal_market:
      free_rent_months_per_year_of_term: 1.0
      ti_allowance_psf: 65
      moving_allowance_psf: 5
    weak_market:
      free_rent_months_per_year_of_term: 2.0
      ti_allowance_psf: 90
      moving_allowance_psf: 10
      turnkey_buildout: true  # Landlord builds to spec
    lease_up_premium:
      multiplier: 1.3
      anchor_tenant_premium: 1.5  # 50% more TI for anchor (>20% of building)

  retail:
    strong_market:
      free_rent_months: 1
      ti_allowance_psf: 20
    normal_market:
      free_rent_months: 2
      ti_allowance_psf: 35
    weak_market:
      free_rent_months: 4
      ti_allowance_psf: 55
      percentage_rent_only_period: 6  # Months of percentage-only rent
    anchor_tenant:
      free_rent_months: 6
      ti_allowance_psf: 75
      co_tenancy_protection: true
      exclusive_use: true

  industrial:
    strong_market:
      free_rent_months: 0.5
      ti_allowance_psf: 5
    normal_market:
      free_rent_months: 1
      ti_allowance_psf: 10
    weak_market:
      free_rent_months: 3
      ti_allowance_psf: 20

# ============================================================
# CONCESSION BURN-DOWN SCHEDULE
# ============================================================
# How concessions should decrease as lease-up progresses

concession_burndown:
  description: |
    Concessions are highest at project opening and should systematically
    decrease as occupancy rises. This schedule defines the multiplier
    applied to base concession levels at each occupancy milestone.
  schedule:
    occupancy_0_to_20:
      concession_multiplier: 1.50
      rationale: "Maximum concessions to build initial critical mass"
    occupancy_20_to_40:
      concession_multiplier: 1.30
      rationale: "Still aggressive but showing momentum"
    occupancy_40_to_60:
      concession_multiplier: 1.10
      rationale: "Near market standard concessions"
    occupancy_60_to_75:
      concession_multiplier: 0.90
      rationale: "Below market -- asset has demonstrated demand"
    occupancy_75_to_85:
      concession_multiplier: 0.60
      rationale: "Minimal concessions, approaching stabilization"
    occupancy_85_to_95:
      concession_multiplier: 0.25
      rationale: "Token concessions only for premium units/spaces"
    occupancy_above_95:
      concession_multiplier: 0.00
      rationale: "No concessions -- raise asking rents"

# ============================================================
# BROKER COMMISSIONS
# ============================================================

broker_commissions:
  multifamily:
    owner_direct_leasing: 0  # In-house leasing team
    broker_referral_fee:
      amount: "50-100% of one month rent"
      typical: 0.75  # 75% of one month
    ild_fee:  # Internet listing service
      monthly_subscription: 300
      per_lead_cost: 15

  office:
    procuring_broker:
      new_lease:
        year_1: 0.05  # 5% of Year 1 rent
        year_2_5: 0.03  # 3% of Years 2-5 rent
        year_6_10: 0.02  # 2% of Years 6-10 rent
        typical_5yr_aggregate_pct: 0.035  # Blended ~3.5%
      renewal:
        discount_from_new: 0.50  # Half of new lease rate
        typical_pct: 0.02  # ~2% of aggregate
    listing_broker:
      new_lease:
        year_1: 0.03
        year_2_5: 0.02
        year_6_10: 0.01
        typical_5yr_aggregate_pct: 0.022
      renewal:
        typical_pct: 0.01
    total_both_brokers:
      typical_5yr_aggregate_pct: 0.057
      typical_10yr_aggregate_pct: 0.045
    override_for_anchor: 0.06  # Premium for securing anchor tenant

  retail:
    procuring_broker:
      typical_pct_of_aggregate: 0.04
      inline_tenant: 0.05
      anchor_tenant: 0.06  # Higher for larger deals
      pad_site: 0.06
    listing_broker:
      typical_pct_of_aggregate: 0.02
    total:
      inline: 0.07
      anchor: 0.08

  industrial:
    procuring_broker:
      typical_pct_of_aggregate: 0.04
    listing_broker:
      typical_pct_of_aggregate: 0.02
    total: 0.06
    single_tenant_build_to_suit: 0.03  # Lower rate for large BTS

