# Lease-Up Benchmarks: Absorption, Concessions, Commissions
# Reference data for lease-up financial modeling and war-room planning

# ============================================================
# ABSORPTION RATES BY PROPERTY TYPE & MARKET CONDITION
# ============================================================
# Units: net absorption as % of total available per month
# "Strong" = vacancy < 5%, rent growth > 3%, job growth > 2%
# "Normal" = vacancy 5-8%, rent growth 0-3%, job growth 0-2%
# "Weak"   = vacancy > 8%, rent declining, flat/negative job growth

absorption_rates:
  multifamily:
    class_a:
      strong_market:
        monthly_absorption_pct: 8.0  # 8% of available units per month
        months_to_stabilize_150_units: 10  # 95% occupancy target
        pre_leasing_conversion: 0.65  # % of pre-lease commitments that convert
      normal_market:
        monthly_absorption_pct: 5.0
        months_to_stabilize_150_units: 15
        pre_leasing_conversion: 0.55
      weak_market:
        monthly_absorption_pct: 2.5
        months_to_stabilize_150_units: 28
        pre_leasing_conversion: 0.40
    class_b:
      strong_market:
        monthly_absorption_pct: 10.0
        months_to_stabilize_150_units: 8
        pre_leasing_conversion: 0.70
      normal_market:
        monthly_absorption_pct: 6.5
        months_to_stabilize_150_units: 12
        pre_leasing_conversion: 0.60
      weak_market:
        monthly_absorption_pct: 3.5
        months_to_stabilize_150_units: 22
        pre_leasing_conversion: 0.45
    class_c:
      strong_market:
        monthly_absorption_pct: 12.0
        months_to_stabilize_150_units: 7
        pre_leasing_conversion: 0.75
      normal_market:
        monthly_absorption_pct: 8.0
        months_to_stabilize_150_units: 10
        pre_leasing_conversion: 0.65
      weak_market:
        monthly_absorption_pct: 5.0
        months_to_stabilize_150_units: 16
        pre_leasing_conversion: 0.50

  office:
    class_a_cbd:
      strong_market:
        monthly_absorption_sf_pct: 3.0
        months_to_stabilize_100k_sf: 18
        tour_to_lease_conversion: 0.20
      normal_market:
        monthly_absorption_sf_pct: 1.5
        months_to_stabilize_100k_sf: 30
        tour_to_lease_conversion: 0.12
      weak_market:
        monthly_absorption_sf_pct: 0.5
        months_to_stabilize_100k_sf: 60
        tour_to_lease_conversion: 0.06
    class_a_suburban:
      strong_market:
        monthly_absorption_sf_pct: 2.5
        months_to_stabilize_100k_sf: 22
        tour_to_lease_conversion: 0.18
      normal_market:
        monthly_absorption_sf_pct: 1.2
        months_to_stabilize_100k_sf: 36
        tour_to_lease_conversion: 0.10
      weak_market:
        monthly_absorption_sf_pct: 0.3
        months_to_stabilize_100k_sf: 80
        tour_to_lease_conversion: 0.04
    class_b:
      strong_market:
        monthly_absorption_sf_pct: 3.5
        months_to_stabilize_100k_sf: 16
        tour_to_lease_conversion: 0.22
      normal_market:
        monthly_absorption_sf_pct: 2.0
        months_to_stabilize_100k_sf: 26
        tour_to_lease_conversion: 0.14
      weak_market:
        monthly_absorption_sf_pct: 0.8
        months_to_stabilize_100k_sf: 48
        tour_to_lease_conversion: 0.07

  retail:
    neighborhood_center:
      strong_market:
        monthly_absorption_sf_pct: 4.0
        months_to_stabilize_50k_sf: 14
      normal_market:
        monthly_absorption_sf_pct: 2.0
        months_to_stabilize_50k_sf: 24
      weak_market:
