# Alert thresholds (apply across all types unless overridden above)
alert_thresholds:
  noi_budget_variance_yellow: -0.03
  noi_budget_variance_red: -0.05
  occupancy_drop_yellow_bps: 200
  occupancy_drop_red_bps: 500
  collections_rate_yellow: 0.975
  collections_rate_red: 0.950
  work_order_sla_compliance_yellow: 0.92
  work_order_sla_compliance_red: 0.90
  pm_compliance_yellow: 0.88
  pm_compliance_red: 0.80
  delinquency_30_day_yellow_pct: 0.02
  delinquency_30_day_red_pct: 0.04
  vendor_scorecard_pip_threshold: 3.0
  vendor_scorecard_replace_threshold: 2.5
  capex_overbudget_yellow_pct: 0.10
  capex_overbudget_red_pct: 0.15
  insurance_compliance_yellow_pct: 0.97
  insurance_compliance_red_pct: 0.95
