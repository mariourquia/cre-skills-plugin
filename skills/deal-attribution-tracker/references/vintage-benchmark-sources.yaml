# ============================================================
# DPI PACING BENCHMARKS BY FUND AGE
# Median expected DPI by fund age (closed-end)
# ============================================================

dpi_pacing:
  description: >
    Expected DPI by fund age for closed-end funds. Funds significantly
    below pacing benchmarks may have execution, liquidity, or exit challenges.
    Use fund age from final closing date.

  value_add:
    year_1: { median: 0.00, note: "Deployment phase. No exits expected." }
    year_2: { median: 0.02, note: "Early deployment. Rare early distributions." }
    year_3: { median: 0.08, note: "First exits of stabilized assets." }
    year_4: { median: 0.20, note: "Active harvest beginning." }
    year_5: { median: 0.35, note: "Core harvest period." }
    year_6: { median: 0.55, note: "Primary realization events." }
    year_7: { median: 0.75, note: "Winding down major positions." }
    year_8: { median: 0.90, note: "Near full realization." }
    year_9: { median: 1.00, note: "Target full return of capital." }
    year_10: { median: 1.10, note: "Tail distributions from extensions." }

  opportunistic:
    year_1: { median: 0.00, note: "Development / heavy repositioning." }
    year_2: { median: 0.00, note: "Construction or lease-up phase." }
    year_3: { median: 0.05, note: "First completed development exits." }
    year_4: { median: 0.15, note: "Stabilization and initial sales." }
    year_5: { median: 0.30, note: "Core harvest." }
    year_6: { median: 0.50, note: "Primary exit events." }
    year_7: { median: 0.70, note: "Winding down." }
    year_8: { median: 0.85, note: "Near realization." }
    year_9: { median: 0.95, note: "Target capital return." }
    year_10: { median: 1.10, note: "Extension distributions." }

  core:
    note: "Core closed-end funds distribute earlier due to income orientation."
    year_1: { median: 0.05, note: "Income distributions begin." }
    year_2: { median: 0.12 }
    year_3: { median: 0.22 }
    year_4: { median: 0.35 }
    year_5: { median: 0.50 }
    year_6: { median: 0.65 }
    year_7: { median: 0.80 }
    year_8: { median: 0.92 }
    year_9: { median: 1.00 }
    year_10: { median: 1.08 }

# ============================================================
# CARRY ECONOMICS MARKET DATA
# Market norms for carry rates, hurdle rates, catch-up structures
# Sources: Preqin Fund Terms Database, ILPA, Hodes Weill Allocations Monitor
# ============================================================

carry_market_norms:
  description: >
    Market norms for carry structure as of 2024-2025. Source: Preqin
    Fund Terms Advisor, Hodes Weill Allocations Monitor, ILPA surveys.

  carry_rate_by_strategy:
    core:
      market_rate: 10.0
      range: "8-15%"
      note: "Core managers rarely charge 20% carry. 10-15% is market."
    core_plus:
      market_rate: 15.0
      range: "10-20%"
    value_add:
      market_rate: 20.0
      range: "15-20%"
      note: "20% is dominant market standard for value-add."
    opportunistic:
      market_rate: 20.0
      range: "20-25%"
      note: "Some top-performing opportunistic GPs charge 25%."

  hurdle_rate_by_strategy:
    core:
      market_rate: 6.0
      range: "5-8%"
    core_plus:
      market_rate: 7.0
      range: "6-8%"
    value_add:
      market_rate: 8.0
      range: "7-9%"
      note: "8% IRR is the dominant standard."
    opportunistic:
      market_rate: 8.0
      range: "8-10%"

  waterfall_type_prevalence:
    value_add:
      european_whole_fund: "65%"
      american_deal_by_deal: "35%"
      note: "European waterfall is market standard for institutional VA funds."
    opportunistic:
      european_whole_fund: "55%"
      american_deal_by_deal: "45%"
      note: "American waterfall more prevalent in opportunistic; both are market."

  catch_up_type_prevalence:
    value_add_opportunistic:
      "100_percent_gp": "55%"
      "50_50": "35%"
      "no_catchup": "10%"
      note: "100% GP catch-up is most common but 50/50 is gaining LP traction."

  gp_commitment_norms:
    minimum_acceptable: "1%"
    market_standard: "2-3%"
    lp_preferred: "3-5%"
    note: >
      GP commitment below 1% is a red flag for alignment.
      Some large GPs use a dollar commitment rather than a percentage
      (e.g., $50M into a $2B fund = 2.5%), which is acceptable if meaningful
      relative to GP principals' net worth.

# ============================================================
# PROPERTY TYPE RETURN BENCHMARKS (NPI basis, unleveraged)
# Used for deal-level attribution and GP alpha assessment
# Source: NCREIF Property Index (Q4 2024)
# ============================================================

ncreif_npi_by_property_type:
  description: >
    NCREIF NPI total returns by property type (unleveraged, gross of fees).
    Use these as the market baseline when decomposing GP alpha at the deal level.
    Compare deal-level gross IRR to these unleveraged benchmarks to assess
    whether returns come from market beta, leverage, or genuine GP skill.

  trailing_5_year_annualized_total_return:
    industrial:
      total: 15.2
      income: 4.1
      appreciation: 11.1
      note: "Strong appreciation from logistics demand and cap rate compression 2019-2022."
    multifamily:
      total: 9.8
      income: 4.5
      appreciation: 5.3
      note: "Sun Belt stronger than coastal in recent years."
    office:
      total: 2.1
      income: 5.8
      appreciation: -3.7
      note: "Remote work structural headwind. CBD gateway markets particularly weak."
    retail:
      total: 4.5
      income: 6.2
      appreciation: -1.7
      note: "Grocery-anchored and necessity retail resilient. Mall/power center weak."
    hotel:
      total: 8.2
      income: 3.5
      appreciation: 4.7
      note: "Post-COVID recovery strong 2022-2024; normalization in 2024."
    unit: "percent annualized"

  note: >
    These are UNLEVERAGED, GROSS-OF-FEE property returns.
    To compare to a leveraged fund's gross deal IRR, apply the leverage formula:
      Leveraged Equity Return = Unleveraged Return + (Unleveraged Return - Debt Cost) * LTV / (1-LTV)
    Any excess above the leverage-adjusted benchmark represents potential GP alpha.
