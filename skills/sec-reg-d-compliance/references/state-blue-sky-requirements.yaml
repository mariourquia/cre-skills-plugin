# State Blue Sky Filing Requirements for Regulation D Offerings
# Reference data for sec-reg-d-compliance skill
# Last updated: 2024-2025 data
# IMPORTANT: State requirements change periodically. Always verify current
# requirements on NASAA (https://www.nasaa.org/) or individual state securities
# regulator websites before filing. This reference provides a planning baseline.
#
# Filing method key:
#   EFD  = Electronic Filing Depository (https://www.efd.nasaa.org/)
#   PAPER = Paper filing required (mail to state regulator)
#   STATE_PORTAL = State-specific electronic filing system
#   EFD_OR_PAPER = Either method accepted

---

