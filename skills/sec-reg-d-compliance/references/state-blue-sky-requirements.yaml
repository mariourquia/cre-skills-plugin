      NJ: "$500"
      CT: "$150"
      FL: "$300"
      TX: "$200"

  scenario_medium:
    description: "100 investors across 10 states (NY, NJ, CT, CA, FL, TX, PA, MA, VA, IL)"
    offering_amount: "$5,000,000"
    estimated_filing_fees: "$5,100 - $7,700"
    breakdown:
      NY: "$3,600"
      CA: "$1,200"
      NJ: "$500"
      PA: "$500"
      TX: "$500"
      FL: "$500"
      MA: "$300"
      NC: "$350"
      VA: "$250"
      CT: "$150"
