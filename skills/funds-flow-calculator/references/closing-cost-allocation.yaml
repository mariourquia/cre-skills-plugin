# closing-cost-allocation.yaml
# Standard buyer vs. seller allocation for closing costs in commercial real estate acquisitions.
# Organized by cost category with state-specific conventions where they materially differ.
# PSA controls allocation; use this as the default when PSA is silent.
# All conventions reflect mid-2025 institutional market norms.

meta:
  last_reviewed: "2025-08-01"
  disclaimer: "Market convention only; actual allocation must be verified in the PSA and confirmed with local title counsel"
  basis: "Institutional commercial real estate (office, retail, industrial, multifamily, mixed-use)"

# =============================================================================
# COST CATEGORIES AND DEFAULT ALLOCATION
# =============================================================================

cost_categories:

  # ---------------------------------------------------------------------------
  title_insurance:
    description: "Insurance protecting against title defects"
    subcategories:
      owners_policy:
        default_payer: "BUYER"
        exceptions:
          TX: "SELLER pays owner's title policy by statute"
          CA: "SELLER pays by strong market convention in Northern CA; varies in Southern CA"
          FL: "SELLER pays by statute in most FL counties"
          NJ: "SELLER pays by convention"
        amount_basis: "Purchase price"
        rate_basis: "Promulgated rate (TX, FL) or filed rate (most other states)"
        typical_range: "0.2% - 0.5% of purchase price (decreasing rate at higher values)"
        example_15m: "$42,000 (estimated; TIRSA rate schedule in NY)"
        negotiability: "Premium is set by rate filing; endorsements are negotiable"
      lenders_policy:
        default_payer: "BUYER (buyer's financing cost)"
        exceptions: "None -- always buyer's cost"
        amount_basis: "Loan amount"
        rate_basis: "Same rate schedules as owner's policy; simultaneous issue discount typically available"
        typical_range: "0.1% - 0.3% of loan amount (simultaneous issue discount)"
        example_11_25m_loan: "$18,750 (estimated, simultaneous issue with owner's policy)"
        note: "If owner's and lender's policies issued simultaneously by same title company, lender's policy rate is significantly discounted"
    ordering_convention:
      who_selects_title_company: "Buyer selects in most markets; seller selects in TX and FL by statute"
      negotiation_point: "In large transactions, title company selection is a key negotiation point; choose company with capacity and local expertise"

  # ---------------------------------------------------------------------------
  escrow_and_settlement_fee:
    description: "Fee charged by escrow/settlement agent or closing attorney"
    default_payer: "SPLIT 50/50 BUYER AND SELLER"
    exceptions:
      CA: "Typically split 50/50; Southern CA convention may vary"
      TX: "Varies; title company may charge buyer only in some markets"
      WA: "Escrow company fee typically split"
      SE_states: "Attorney states (AL, GA, SC, NC, VA): closing attorney fees often buyer's cost for their attorney and seller's cost for their attorney"
    typical_range: "$1,500 - $5,000 for commercial (smaller transactions); $3,000 - $10,000 for institutional"
    note: "Some title companies include settlement fee in title insurance premium; confirm whether separate"

  # ---------------------------------------------------------------------------
  recording_fees:
    description: "County recorder fees for recording deed, mortgage, and other instruments"
    deed_recording:
      default_payer: "BUYER (buyer benefits from recording; ensures clear title)"
      exceptions:
        FL: "Seller pays recording fees on deed in most FL counties"
        TX: "Buyer pays by convention"
      typical_range: "$500 - $2,000 for commercial deed depending on pages"
    mortgage_recording:
      default_payer: "BUYER (buyer's financing; lender requires recording)"
      exceptions: "None -- always buyer's cost"
      typical_range: "$500 - $2,000 depending on state and pages"
    release_of_mortgage:
      payer: "SELLER (seller's obligation to clear their liens)"
      note: "Recording fee for satisfaction of seller's existing mortgage paid by seller"

  # ---------------------------------------------------------------------------
  transfer_tax:
    description: "State, county, and municipal real property transfer taxes"
    general_rule: "See references/transfer-tax-rates.yaml for state-by-state rates"
    default_payer_by_state:
      NY_state_transfer_tax: "SELLER"
      NYC_transfer_tax: "SELLER"
      CA_state_transfer_tax: "SPLIT 50/50 (Northern CA) or SELLER (Southern CA convention)"
      FL_documentary_stamps_deed: "SELLER (by statute)"
      FL_intangible_tax_mortgage: "BUYER (by statute)"
      IL_state_rtt: "SELLER"
      IL_chicago_buyer_tax: "BUYER"
      NJ_rtf: "SELLER"
      PA_rtt: "SPLIT 50/50"
      WA_reet: "SELLER"
      TX: "No transfer tax"
    negotiability: "Transfer tax allocation is negotiable in PSA; market convention is a starting point"
    critical_note: "Confirm PSA allocation; getting this wrong in negotiation creates closing-day disputes"

  # ---------------------------------------------------------------------------
  survey:
    description: "ALTA survey or updated existing survey"
    default_payer: "BUYER"
    rationale: "Buyer's due diligence expense; lender also requires"
    exceptions: "Seller may agree to pay as part of deal concession (in soft markets)"
    typical_range: "$3,000 - $15,000 (depends on size, complexity, whether new vs. update)"
    note: "Cost is higher for irregularly shaped parcels, multi-parcel assemblages, and rural properties"

  # ---------------------------------------------------------------------------
  environmental_assessments:
    description: "Phase I and Phase II Environmental Site Assessments"
    phase_i:
      default_payer: "BUYER"
      typical_range: "$2,000 - $6,000 (Phase I)"
      note: "Required by lender; buyer's due diligence cost"
    phase_ii:
      default_payer: "BUYER (if ordered at buyer's discretion)"
      exception: "If seller knew of contamination and failed to disclose, negotiate seller contribution"
      typical_range: "$15,000 - $100,000+ (sampling and lab costs vary widely)"
    remediation_cost:
      payer: "Negotiated; typically seller or price reduction; depends on who caused contamination and PSA terms"

  # ---------------------------------------------------------------------------
  broker_commission:
    description: "Sales commission or success fee to real estate broker(s)"
    default_payer: "SELLER"
    rationale: "Seller retains broker; seller's obligation to pay"
    exceptions: "Buyer's broker commission: may be paid by seller (co-op commission) or by buyer if buyer engaged broker separately"
    typical_rates:
      sub_5m: "3% - 5% of purchase price"
      5m_to_25m: "2% - 3% of purchase price"
      over_25m: "1% - 2% of purchase price"
      negotiated_flat_fee: "Common for very large transactions"
      co_op_split: "Listing broker and buyer's broker split total commission (e.g., 2%/1%)"
    payment_trigger: "Paid at closing; commission obligations survive deal failure if seller walks"
    escrow: "Title company holds proceeds and wires commission directly to brokerage from closing"
    example_15m: "$375,000 at 2.5%"

  # ---------------------------------------------------------------------------
  legal_fees:
    description: "Legal fees for transaction counsel"
    buyer_counsel:
      default_payer: "BUYER"
      typical_range: "$10,000 - $50,000 (depending on complexity, law firm, market)"
      note: "Institutional buyers using outside counsel budget $25,000-$75,000 for $15M+ transactions"
    seller_counsel:
      default_payer: "SELLER"
      typical_range: "$8,000 - $35,000"
    title_counsel:
      payer: "Title company absorbs (included in title premium)"

  # ---------------------------------------------------------------------------
  loan_origination_fee:
    description: "Lender origination / arrangement fee (also called points)"
    default_payer: "BUYER"
    rationale: "Buyer's financing cost; not shared with seller"
    typical_range: "0.5% - 2.0% of loan amount"
    example_11_25m_loan: "$112,500 at 1.0%"
    note: "Some agency lenders (Fannie, Freddie, FHA) have standard fee schedules; negotiate reduction for large loans"

  # ---------------------------------------------------------------------------
  appraisal:
    description: "Independent appraisal required by lender"
    default_payer: "BUYER"
    rationale: "Lender's requirement; buyer bears cost"
    typical_range: "$5,000 - $20,000 (commercial appraisal; larger for complex income-producing properties)"
    note: "Buyer typically pays in advance at lender's request; appears as a prepaid item in closing cost schedule"

  # ---------------------------------------------------------------------------
  property_condition_assessment:
    description: "Physical inspection / property condition report required by lender and buyer"
    default_payer: "BUYER"
    typical_range: "$3,000 - $12,000 (depends on property size and type)"

  # ---------------------------------------------------------------------------
  reserves_and_escrows:
    description: "Lender-required reserves funded at closing"
    default_payer: "BUYER"
    subcategories:
      tax_reserve:
        description: "3-6 months of estimated property taxes held in escrow by lender"
        typical_amount: "3-6 months of annual tax / 12"
        example: "3 months on $180K/year = $45,000"
      insurance_reserve:
        description: "2-3 months of annual insurance premium held in escrow"
        typical_amount: "2-3 months of annual premium"
      replacement_reserve:
        description: "Capital expenditure reserve (multifamily: $250-$400 per unit per year)"
        typical_amount: "Negotiated based on PCA findings and lender requirements"
      debt_service_reserve:
        description: "6-12 months of debt service held in lender-controlled account"
        applies_to: "Bridge loans, transitional assets, lease-up situations"
        typical_amount: "6 months P&I or IO"
      earnest_money_applied:
        note: "Earnest money paid during contract period is credited against buyer's cash at closing; appears as a credit (negative use)"

  # ---------------------------------------------------------------------------
  prepayment_penalty:
    description: "Prepayment premium or yield maintenance to retire seller's existing debt early"
    default_payer: "SELLER"
    rationale: "Seller's obligation under their loan documents"
    exceptions: "If buyer is assuming existing debt, no prepayment; if PSA negotiates seller concession, could be shared"
    note: "Prepayment penalty is a seller cost that reduces net proceeds; confirm amount from payoff letter before closing"

  # ---------------------------------------------------------------------------
  zoning_and_land_use:
    description: "Zoning certificate, use verification, or zoning report"
    default_payer: "BUYER"
    typical_range: "$500 - $3,000"

  # ---------------------------------------------------------------------------
  ucc_searches:
    description: "Search for UCC-1 financing statements against seller and the entity"
    default_payer: "BUYER (lender requires as condition to close)"
    typical_range: "$200 - $800 per entity searched"

  # ---------------------------------------------------------------------------
  tax_certificate:
    description: "Tax certificate from county confirming property tax payment status"
    default_payer: "BUYER"
    typical_range: "$100 - $500 per parcel"

# =============================================================================
# CREDIT ITEMS (ADJUSTMENTS AT CLOSING)
# =============================================================================

credits:
  earnest_money:
    direction: "Credit to BUYER"
    note: "Earnest money previously wired is applied against buyer's cash-to-close obligation; do not double-count as a source AND a credit"

  property_tax_proration:
    direction: "Credit to BUYER (if taxes paid in arrears and seller owes for pre-closing period)"
    alternative: "Credit to SELLER (if taxes paid in advance and seller has overpaid for post-closing period)"

  rent_proration:
    direction: "Credit to BUYER for rent already collected by seller covering post-closing period"
    note: "Delinquent rent: do not prorate; assign collection rights"

  security_deposit_transfer:
    direction: "Credit to BUYER"
    note: "Seller transfers cash deposits to buyer; buyer assumes liability to tenants"

  seller_credits:
    types:
      - "DD credits (seller concession for deficiencies found in due diligence)"
      - "Lease-up reserve (if property has vacant units buyer is underwriting to stabilize)"
      - "Tenant improvement obligation credit (if seller has unfunded TI obligations per executed leases)"
      - "Free rent obligation credit (seller funds buyer's free-rent period for existing tenants)"
    direction: "All are credits to BUYER (debits to seller)"

# =============================================================================
# ATTORNEY CLOSING STATE REQUIREMENTS
# =============================================================================

attorney_states:
  description: "In attorney-closing states, a licensed attorney must supervise closing; title company role is limited"
  states:
    - AL  # Alabama
    - CT  # Connecticut
    - DE  # Delaware
    - GA  # Georgia (for some transaction types)
    - MA  # Massachusetts
    - ME  # Maine
    - NH  # New Hampshire
    - NJ  # New Jersey
    - NY  # New York
    - NC  # North Carolina (limited)
    - SC  # South Carolina
    - RI  # Rhode Island
    - VT  # Vermont
    - WV  # West Virginia
  implication: "Budget for attorney fees on both sides; in NY for example, institutional closings routinely involve $15K-$50K per side in legal fees"

# =============================================================================
# SUMMARY TABLE: STANDARD ALLOCATION BY DEAL TYPE
# =============================================================================

standard_allocation_summary:
  conventional_acquisition_all_cash:
    buyer_pays:
      - "Owner's title insurance (most states)"
      - "Recording fees (deed)"
      - "Survey"
      - "Phase I Environmental"
      - "Appraisal (n/a if no lender)"
      - "Legal fees (buyer counsel)"
      - "UCC searches"
      - "Tax certificate"
      - "Zoning report"
    seller_pays:
      - "Broker commission"
      - "Transfer taxes (varies by state -- seller default)"
      - "Legal fees (seller counsel)"
      - "Existing mortgage payoff (including prepayment penalty)"
      - "Satisfaction of mortgage recording fee"
    split_50_50:
      - "Settlement / escrow fee (most states)"

  conventional_acquisition_financed:
    additional_buyer_costs:
      - "Loan origination fee"
      - "Lender's title insurance"
      - "Mortgage recording fee"
      - "Prepaid interest"
      - "Tax reserve"
      - "Insurance reserve"
      - "Replacement / DSCR reserve (if required)"
      - "Appraisal"
      - "Property condition assessment"

  acquisition_with_1031_exchange:
    additional_costs:
      - "QI fee: $750-$2,500 for forward exchange (SELLER's cost; QI is seller's agent)"
      - "QI wire fees: seller's cost"
      - "Exchange documents: seller's legal cost"
    note: "No additional title or recording cost related to 1031 exchange itself; standard deed package applies"

  upreit_contribution:
    seller_replaces_with:
      - "OP unit subscription agreement (seller's legal cost)"
      - "Tax protection agreement (negotiated; may add $5,000-$15,000 to legal)"
    buyer_reit_cost:
      - "REIT board resolution costs (legal)"
      - "OP agreement amendment (legal)"
      - "Transfer tax still applies in most states on UPREIT contributions"
