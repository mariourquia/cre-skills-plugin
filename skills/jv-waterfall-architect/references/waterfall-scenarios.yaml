# JV Waterfall Scenario Reference
# 6 structures, each with worked distributions at 8%, 12%, and 18% IRR
# Base: $10,000,000 total equity, 5-year hold

structures:

  # --- 1. Straight Split ---
  straight_split:
    description: >
      No preferred return. All distributions split pro-rata by equity share.
      Simplest structure, common in family/friends deals.
    terms:
      total_equity: 10000000
      lp_share: 0.90
      gp_share: 0.10
      preferred_return: null
      promote: null
      split: "90/10 on all distributions"
    distributions:
      irr_8pct:
        total_distributions: 14400000
        # No waterfall tiers -- straight pro-rata
        lp_total: 12960000  # 14,400,000 * 0.90
        gp_total: 1440000   # 14,400,000 * 0.10
        lp_multiple: 1.440  # 12,960,000 / 9,000,000
        gp_multiple: 1.440  # 1,440,000 / 1,000,000
        notes: "Identical multiples. GP has no incentive beyond pro-rata."
      irr_12pct:
        total_distributions: 17623000
        lp_total: 15860700
        gp_total: 1762300
        lp_multiple: 1.762
        gp_multiple: 1.762
      irr_18pct:
        total_distributions: 22878000
        lp_total: 20590200
        gp_total: 2287800
        lp_multiple: 2.288
        gp_multiple: 2.288

  # --- 2. Single Promote ---
  single_promote:
    description: >
      8% pref, then 80/20 LP/GP split on all remaining distributions.
      Most common simple institutional structure.
    terms:
      total_equity: 10000000
      lp_share: 0.90
      gp_share: 0.10
      preferred_return: 0.08
      pref_type: "simple, cumulative"
      tiers:
        - name: "Return of Capital"
          split: "pro-rata (90/10)"
        - name: "8% Preferred Return"
          split: "pro-rata (90/10)"
        - name: "GP Catch-up (100%)"
          target: "GP at 20% of above-ROC"
        - name: "Residual"
          split: "80/20 LP/GP"
    distributions:
      irr_8pct:
        total_distributions: 14400000
        tier_1_roc: {lp: 9000000, gp: 1000000}
        tier_2_pref: {lp: 3600000, gp: 400000}
        tier_3_catchup: {gp: 400000}  # only $400K remaining, catch-up incomplete
        tier_4_residual: {lp: 0, gp: 0}
        lp_total: 12600000
        gp_total: 1800000
        lp_multiple: 1.400
        gp_multiple: 1.800
        notes: "GP multiple exceeds LP due to partial catch-up. Catch-up not fully satisfied."
      irr_12pct:
        total_distributions: 17623000
        tier_1_roc: {lp: 9000000, gp: 1000000}
        tier_2_pref: {lp: 3600000, gp: 400000}
        tier_3_catchup: {gp: 500000}
        tier_4_residual:
          pool: 3123000
          lp: 2498400  # 3,123,000 * 0.80
          gp: 624600   # 3,123,000 * 0.20
        lp_total: 15098400
        gp_total: 2524600
        lp_multiple: 1.678
        gp_multiple: 2.525
      irr_18pct:
        total_distributions: 22878000
        tier_1_roc: {lp: 9000000, gp: 1000000}
        tier_2_pref: {lp: 3600000, gp: 400000}
        tier_3_catchup: {gp: 500000}
        tier_4_residual:
          pool: 8878000
          lp: 7102400
          gp: 1775600
        lp_total: 19702400
        gp_total: 3175600
        lp_multiple: 2.189
        gp_multiple: 3.176

  # --- 3. Multi-Tier Promote ---
  multi_tier:
    description: >
      8% pref, then escalating promote splits at 12% and 18% IRR hurdles.
      Standard for institutional programmatic JVs.
    terms:
      total_equity: 10000000
      lp_share: 0.90
      gp_share: 0.10
      preferred_return: 0.08
      pref_type: "simple, cumulative"
      tiers:
        - name: "Return of Capital"
          split: "pro-rata (90/10)"
        - name: "8% Preferred Return"
          split: "pro-rata (90/10)"
        - name: "GP Catch-up (100%)"
          target: "GP at 20% of above-ROC"
        - name: "80/20 up to 12% IRR"
          split: "80/20 LP/GP"
        - name: "70/30 up to 18% IRR"
          split: "70/30 LP/GP"
        - name: "50/50 above 18% IRR"
          split: "50/50 LP/GP"
    distributions:
      irr_8pct:
        total_distributions: 14400000
        lp_total: 12600000
        gp_total: 1800000
        lp_multiple: 1.400
        gp_multiple: 1.800
        notes: "Below first promote tier -- same as single promote at 8% IRR."
      irr_12pct:
        total_distributions: 17623000
        # Tiers 1-3 same as single promote: ROC + pref + catch-up
        # Tier 4 absorbs all remaining (at exactly 12% IRR breakpoint)
        lp_total: 15098400
        gp_total: 2524600
        lp_multiple: 1.678
        gp_multiple: 2.525
        notes: "At exactly 12% IRR, identical to single promote. No Tier 5 distributions."
      irr_18pct:
        total_distributions: 22878000
        # Tier 4 (80/20): from 12% to ~15% IRR breakpoint
        tier_4_pool: 3123000  # same as single promote tier 4
        # Tier 5 (70/30): 15% to 18% IRR
        tier_5_pool: 5255000  # 22,878,000 - 17,623,000
        tier_5_lp: 3678500
        tier_5_gp: 1576500
        lp_total: 18776900  # 15,098,400 + 3,678,500
        gp_total: 4101100   # 2,524,600 + 1,576,500
        lp_multiple: 2.086
        gp_multiple: 4.101
        notes: "GP 4.1x vs LP 2.1x. Multi-tier rewards outsized GP performance."

  # --- 4. European (Whole-Fund) ---
  european:
    description: >
      Portfolio-level waterfall. GP earns no promote until aggregate portfolio
      returns LP capital plus pref. Typical for institutional commingled funds.
    terms:
      total_equity: 10000000
      lp_share: 0.90
      gp_share: 0.10
      preferred_return: 0.08
      pref_type: "compounded annually, cumulative"
      promote_basis: "aggregate portfolio, not per-deal"
      tiers:
        - name: "Return of all LP capital across portfolio"
          split: "100% to LP"
        - name: "8% compounded pref on all LP capital"
          split: "100% to LP"
        - name: "GP catch-up (80/20)"
          target: "GP at 20% of above-ROC"
        - name: "Residual"
          split: "80/20 LP/GP"
    distributions:
      irr_8pct:
        total_distributions: 14400000
        # European: LP gets everything until ROC + pref satisfied
        lp_roc: 9000000
        lp_compounded_pref: 3525219  # 9M * ((1.08^5) - 1) = compounded
        gp_roc: 1000000
        gp_pref: 391691  # 1M * ((1.08^5) - 1)
        remaining: 483090  # 14,400,000 - 9,000,000 - 3,525,219 - 1,000,000 - 391,691
        # Catch-up begins but funds exhausted quickly
        lp_total: 12525219
        gp_total: 1874781  # 1,000,000 + 391,691 + 483,090 (all to catch-up)
        lp_multiple: 1.392
        gp_multiple: 1.875
        notes: "Compounded pref means LP receives slightly less than simple pref scenario. 8% compounded over 5yr = 46.9% cumulative vs 40% simple."
      irr_12pct:
        total_distributions: 17623000
        lp_roc: 9000000
        lp_compounded_pref: 3525219
        gp_roc: 1000000
        gp_pref: 391691
        remaining: 3706090
        # Catch-up: GP needs 20% of above-ROC
        # Above-ROC so far after pref: 3,916,910 (all pref). GP has 391,691 (10%).
        # Need: (391,691 + C) / (3,916,910 + C) = 0.20
        # 391,691 + C = 783,382 + 0.20C => 0.80C = 391,691 => C = 489,614
        gp_catchup: 489614
        residual_pool: 3216476  # 3,706,090 - 489,614
        residual_lp: 2573181   # 80%
        residual_gp: 643295    # 20%
        lp_total: 15098400
        gp_total: 2524600
        lp_multiple: 1.678
        gp_multiple: 2.525
      irr_18pct:
        total_distributions: 22878000
        remaining_above_roc_and_pref: 8960790
        gp_catchup: 489614
        residual_pool: 8471176
        residual_lp: 6776941
        residual_gp: 1694235
        lp_total: 19302160
        gp_total: 3575840
        lp_multiple: 2.145
        gp_multiple: 3.576
        notes: "European waterfall gives LP slightly more than American at same return level because compounded pref is higher and LP gets 100% until fully satisfied."

  # --- 5. American (Deal-by-Deal) ---
  american:
    description: >
      Promote calculated per deal at monetization. GP earns promote on winning
      deals regardless of portfolio losses. Clawback at fund termination.
    terms:
      total_equity: 10000000
      lp_share: 0.90
      gp_share: 0.10
      preferred_return: 0.08
      pref_type: "simple, cumulative, per-deal"
      promote_basis: "per-deal at monetization"
      clawback: "yes, at fund termination"
      tiers:
        - name: "Return of deal-level capital"
          split: "pro-rata (90/10)"
        - name: "8% pref on deal-level capital"
          split: "pro-rata (90/10)"
        - name: "GP catch-up (100%)"
          target: "GP at 20% of deal above-ROC"
        - name: "Residual"
          split: "80/20 LP/GP"
    distributions:
      # Example: 2-deal portfolio, $5M each
      # Deal A: sold at Year 3, 15% deal-level IRR
      # Deal B: sold at Year 5, 5% deal-level IRR
      deal_a:
        equity: 5000000
        hold_years: 3
        deal_irr: 0.15
        total_distributions: 7604000
        lp_roc: 4500000
        lp_pref: 1080000  # 4.5M * 0.08 * 3
        gp_roc: 500000
        gp_pref: 120000
        catchup: 150000
        residual_pool: 1254000
        residual_lp: 1003200
        residual_gp: 250800
        lp_deal_total: 6583200
        gp_deal_total: 1020800
        gp_deal_multiple: 2.042
      deal_b:
        equity: 5000000
        hold_years: 5
        deal_irr: 0.05
        total_distributions: 6381000
        lp_roc: 4500000
        lp_pref: 1800000  # 4.5M * 0.08 * 5
        gp_roc: 500000
        gp_pref: 200000
        # Only $81,000 remaining -- not enough for catch-up
        # Pref not fully satisfied (5% < 8%), so technically no promote.
        # But deal returned capital, just below pref hurdle.
        lp_deal_total: 5881000
        gp_deal_total: 500000  # Only ROC, pref shortfall
        notes: "Deal B returns capital but below pref. No promote earned."
      portfolio_summary:
        blended_irr: 0.096  # approximate portfolio IRR
        lp_total: 12464200
        gp_total: 1520800
        gp_promote_earned: 400800  # from Deal A only
        notes: >
          Under American waterfall, GP earned promote on Deal A (15% IRR)
          even though Deal B underperformed. Under European, no promote would
          be paid until portfolio-level pref was fully satisfied.
      irr_8pct:
        notes: "See single-deal distributions above. American mirrors single promote per deal."
        lp_total: 12600000
        gp_total: 1800000
        lp_multiple: 1.400
        gp_multiple: 1.800
      irr_12pct:
        lp_total: 15098400
        gp_total: 2524600
        lp_multiple: 1.678
        gp_multiple: 2.525
      irr_18pct:
        lp_total: 19702400
        gp_total: 3175600
        lp_multiple: 2.189
        gp_multiple: 3.176

  # --- 6. Catch-Up Variant ---
  catchup_variant:
    description: >
      Same as single promote but with a 50% partial catch-up instead of 100%.
      LP-friendly compromise. Less common but seen in negotiated JVs.
    terms:
      total_equity: 10000000
      lp_share: 0.90
      gp_share: 0.10
      preferred_return: 0.08
      pref_type: "simple, cumulative"
      catchup_rate: 0.50  # GP gets 50% during catch-up (not 100%)
      tiers:
        - name: "Return of Capital"
          split: "pro-rata (90/10)"
        - name: "8% Preferred Return"
          split: "pro-rata (90/10)"
        - name: "GP Catch-up (50/50)"
          target: "GP at 20% of above-ROC"
          split_during_catchup: "50/50"
        - name: "Residual"
          split: "80/20 LP/GP"
    distributions:
      irr_8pct:
        total_distributions: 14400000
        tier_1_roc: {lp: 9000000, gp: 1000000}
        tier_2_pref: {lp: 3600000, gp: 400000}
        remaining: 400000
        # During 50% catch-up, each dollar split 50/50
        # Need: (400,000 + 0.50*C) / (4,000,000 + C) = 0.20
        # 400,000 + 0.50C = 800,000 + 0.20C => 0.30C = 400,000 => C = 1,333,333
        # But only $400,000 available. Catch-up phase absorbs it:
        catchup_lp: 200000
        catchup_gp: 200000
        lp_total: 12800000
        gp_total: 1600000
        lp_multiple: 1.422
        gp_multiple: 1.600
        notes: "LP gets $200K more than 100% catch-up scenario. GP gets $200K less."
      irr_12pct:
        total_distributions: 17623000
        remaining_after_pref: 3623000
        # Catch-up: C = 1,333,333 (fully satisfied this time)
        catchup_lp: 666667
        catchup_gp: 666667
        # Residual: 3,623,000 - 1,333,333 = 2,289,667
        residual_lp: 1831734  # 80%
        residual_gp: 457933   # 20%
        lp_total: 15098401  # 9M + 3.6M + 666,667 + 1,831,734
        gp_total: 2524599   # 1M + 400K + 666,667 + 457,933
        lp_multiple: 1.678
        gp_multiple: 2.525
        notes: "At 12% IRR, partial catch-up reaches same destination -- just takes longer to catch up."
      irr_18pct:
        total_distributions: 22878000
        remaining_after_pref: 8878000
        catchup_pool: 1333333
        catchup_lp: 666667
        catchup_gp: 666667
        residual_pool: 7544667
        residual_lp: 6035734
        residual_gp: 1508933
        lp_total: 19302401
        gp_total: 3575599
        lp_multiple: 2.145
        gp_multiple: 3.576

# --- Comparison Summary ---
comparison:
  at_8pct_irr:
    note: "GP multiples across structures at 8% IRR"
    straight_split_gp: 1.440
    single_promote_gp: 1.800
    multi_tier_gp: 1.800
    european_gp: 1.875
    american_gp: 1.800
    catchup_50pct_gp: 1.600
    winner_for_gp: "european (compounding effect on co-invest pref)"
    winner_for_lp: "straight split (no promote leakage)"

  at_12pct_irr:
    straight_split_gp: 1.762
    single_promote_gp: 2.525
    multi_tier_gp: 2.525
    european_gp: 2.525
    american_gp: 2.525
    catchup_50pct_gp: 2.525
    winner_for_gp: "all promote structures converge at 12%"
    winner_for_lp: "straight split"

  at_18pct_irr:
    straight_split_gp: 2.288
    single_promote_gp: 3.176
    multi_tier_gp: 4.101
    european_gp: 3.576
    american_gp: 3.176
    catchup_50pct_gp: 3.576
    winner_for_gp: "multi-tier (escalating promote splits)"
    winner_for_lp: "straight split"
    key_insight: >
      Multi-tier creates the most GP upside at high returns (4.1x vs 3.2x single promote).
      The 70/30 and 50/50 tiers at 12%+ and 18%+ drive GP economics dramatically higher.
      This is why GPs negotiate for multi-tier structures on value-add and opportunistic deals.
