      exit_cap: 0.45
      vacancy: 1.00
      expense_growth: -0.10
      refi_rate: 0.25
    expense_growth:
      rent_growth: 0.20
      exit_cap: -0.10
      vacancy: -0.10
      expense_growth: 1.00
      refi_rate: 0.30
    refi_rate:
      rent_growth: -0.20
      exit_cap: 0.65
      vacancy: 0.25
      expense_growth: 0.30
      refi_rate: 1.00

