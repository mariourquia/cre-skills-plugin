# Correlation Matrices by Property Type
# Used by: monte-carlo-return-simulator
#
# Each matrix defines pairwise correlations between stochastic variables
# for Monte Carlo simulation of CRE investment returns.
#
# Variables:
#   rent_growth    - Annual rent growth rate
#   exit_cap       - Exit (terminal) capitalization rate
#   vacancy        - Stabilized vacancy rate
#   expense_growth - Annual operating expense growth rate
#   refi_rate      - Interest rate at refinance or floating rate reset
#   capex_overrun  - Capital expenditure overrun factor (value-add only)
#   absorption     - Absorption pace in months (lease-up only)
#
# Correlation values range from -1.0 to +1.0.
# Sources: NCREIF property index decomposition, CBRE cap rate surveys,
#          Federal Reserve interest rate data, author calibration.
# All matrices are symmetric and positive semi-definite.

multifamily:
  description: "Multifamily / apartment. Tighter correlations due to essential housing demand."
  variables: [rent_growth, exit_cap, vacancy, expense_growth, refi_rate]
  matrix:
    rent_growth:
      rent_growth: 1.00
      exit_cap: -0.30
      vacancy: -0.55
      expense_growth: 0.25
      refi_rate: -0.15
    exit_cap:
      rent_growth: -0.30
      exit_cap: 1.00
      vacancy: 0.35
      expense_growth: -0.10
      refi_rate: 0.60
    vacancy:
      rent_growth: -0.55
      exit_cap: 0.35
      vacancy: 1.00
      expense_growth: -0.05
      refi_rate: 0.15
    expense_growth:
      rent_growth: 0.25
      exit_cap: -0.10
      vacancy: -0.05
      expense_growth: 1.00
      refi_rate: 0.35
    refi_rate:
      rent_growth: -0.15
      exit_cap: 0.60
      vacancy: 0.15
      expense_growth: 0.35
      refi_rate: 1.00

office:
