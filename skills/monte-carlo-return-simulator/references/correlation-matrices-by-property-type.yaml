# Extended variables for value-add strategies
# Append these correlations to the base property-type matrix when applicable.

value_add_extensions:
  description: "Additional correlations for capex overrun and absorption pace variables in value-add deals."
  additional_variables: [capex_overrun, absorption]
  correlations_with_base:
    capex_overrun:
      rent_growth: -0.10
      exit_cap: 0.15
      vacancy: 0.10
      expense_growth: 0.40
      refi_rate: 0.20
      capex_overrun: 1.00
      absorption: 0.30
    absorption:
      rent_growth: -0.35
      exit_cap: 0.25
      vacancy: 0.50
      expense_growth: 0.05
      refi_rate: 0.15
      capex_overrun: 0.30
      absorption: 1.00
  notes: |
    capex_overrun correlates positively with expense_growth (both driven by construction/labor cost inflation)
    and positively with absorption (projects that run over budget often have delayed lease-up).
    absorption correlates strongly with vacancy (market weakness slows both existing and new leasing)
    and negatively with rent_growth (weak demand slows absorption and compresses rents).
