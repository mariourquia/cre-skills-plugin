  submarket: "Lehigh Valley, PA -- I-78 Corridor"
  property_type: Industrial / Logistics
  forecast_start: "Q2 2026"
  forecast_end: "Q1 2029"
  date_prepared: "2026-03-17"
  author: "Asset Management"
  data_sources:
    - "CoStar Analytics (Q1 2026 release)"
    - "Lehigh Valley Economic Development Corporation"
    - "PA DEP permit database"
    - "Upper Macungie Township Planning Commission minutes"
