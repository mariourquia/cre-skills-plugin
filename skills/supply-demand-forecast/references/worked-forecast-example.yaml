# ===========================================================================
# SECTION 5: INVESTMENT IMPLICATIONS
# ===========================================================================

investment_implications:

  near_term_2026:
    outlook: "Cautious"
    rationale: >
      2026 is the peak supply year with 3.35M SF delivering against 2.4M SF
      absorption. Vacancy will rise above the long-term average for the first
      time since 2021. Effective rent growth will be flat to slightly negative.
      Concessions will expand to 1-2 months free on new leases.
    strategy: >
      Hold existing assets. Do not acquire at sub-5.5% cap rates. Delay any
      disposition to avoid selling into a softening market. Renew existing
      tenants aggressively even at small concessions -- vacancy is more
      expensive than a rent reduction.

  medium_term_2027:
    outlook: "Improving rapidly"
    rationale: >
      Deliveries drop by 50% while absorption remains strong. The A/D ratio
      swings to nearly 2x, rapidly tightening the market. Vacancy falls
      below LTA by mid-year. This is the inflection point.
    strategy: >
      Acquire in early 2027 while vacancy is still elevated and pricing
      reflects 2026 softness. Sellers in early 2027 are pricing off 2026
      conditions. Buyers who can underwrite 2027 fundamentals will capture
      significant upside. Target 6.0-6.5% going-in cap rates.

  longer_term_2028_plus:
    outlook: "Bullish"
    rationale: >
      By late 2028, the market is extremely tight (sub-2% vacancy) with
      effective rents approaching $9.50/SF -- a 20%+ increase from current
      levels. New development will restart but won't deliver until 2030+
      given the Upper Macungie moratorium and 18-24 month construction timeline.
    strategy: >
      Dispose of stabilized assets at peak pricing in late 2028 / early 2029.
      Exit cap rates should compress to 5.0-5.5% given the combination of
      tight vacancy, strong rent growth, and constrained future supply.
      This is the optimal exit window before the next wave of development
      delivers.

  scenario_comparison:
    base_case:
      entry_cap_q1_2027: 6.25
      exit_cap_q4_2028: 5.25
      noi_growth_2yr: 18.5
      levered_irr_estimate: 22.0
    bull_case:
      entry_cap_q1_2027: 6.25
      exit_cap_q4_2028: 5.00
      noi_growth_2yr: 24.0
      levered_irr_estimate: 28.0
    bear_case:
      entry_cap_q1_2027: 6.50
      exit_cap_q4_2028: 5.75
      noi_growth_2yr: 8.0
      levered_irr_estimate: 14.0

  key_risks:
    - risk: "Amazon announces another expansion pause"
      probability: "Medium"
      impact: "Absorption drops 15-20%. Bear case becomes more likely."
      mitigation: "Diversify tenant base. Avoid single-tenant Amazon risk."
    - risk: "Recession deeper than bear case"
      probability: "Low"
      impact: "Absorption negative for 2-3 quarters. Vacancy exceeds 8%."
      mitigation: "Maintain conservative leverage (< 65% LTV). Cash reserves."
    - risk: "Upper Macungie moratorium lifted"
      probability: "Low (2026-2027), Medium (2028+)"
      impact: "New supply restarts sooner than forecast. 2029 delivery risk."
      mitigation: "Accelerate exit timeline if moratorium is lifted."
    - risk: "Interest rates spike (10yr > 6%)"
      probability: "Low"
      impact: "Cap rate expansion offsets NOI growth. Exit pricing weaker."
      mitigation: "Lock fixed-rate debt at acquisition. Model sensitivity."
