# ===========================================================================
# SECTION 3: DEMAND ANALYSIS (ABSORPTION SCENARIOS)
# ===========================================================================

demand_drivers:
  primary:
    - driver: "E-commerce fulfillment expansion"
      impact: "High"
      trend: "Continued growth but decelerating from 2020-2022 surge"
      notes: "Amazon, Walmart, Target all expanding in Lehigh Valley. However, Amazon paused expansion in 2022-2023 and is being more selective."
    - driver: "Reshoring / nearshoring"
      impact: "Moderate"
      trend: "Growing. CHIPS Act and supply chain diversification driving demand."
      notes: "Pharmaceutical and electronics manufacturing relocating distribution closer to East Coast ports."
    - driver: "3PL expansion"
      impact: "High"
      trend: "Steady. XPO, FedEx Logistics, Ryder all expanding."
      notes: "3PL sector is the largest demand driver by SF. Follows consumer goods volume."
    - driver: "Cold storage / food distribution"
      impact: "Moderate"
      trend: "Growing. Grocery delivery and meal kit demand."
      notes: "Cold storage commands 40-60% rent premium. Limited competitive supply."
  secondary:
    - driver: "Port of NY/NJ overflow"
      impact: "Moderate"
      trend: "Stable. NJ industrial vacancy tightening pushes demand to PA."
    - driver: "Cannabis distribution"
      impact: "Low-Moderate"
      trend: "Growing if PA legalizes recreational (pending legislation)."

absorption_scenarios:

  base_case:
    description: "Moderate e-commerce growth, stable 3PL expansion, no recession"
    annual_absorption_sf: 3_200_000
    quarterly_pattern: [0.20, 0.30, 0.30, 0.20]
    quarterly_absorption:
      Q2_2026: 800_000
      Q3_2026: 960_000
      Q4_2026: 640_000
      Q1_2027: 800_000
      Q2_2027: 800_000
      Q3_2027: 960_000
      Q4_2027: 640_000
      Q1_2028: 800_000
      Q2_2028: 800_000
      Q3_2028: 960_000
      Q4_2028: 640_000
      Q1_2029: 800_000

  bull_case:
    description: "Accelerated reshoring, Amazon expansion resumes, cold storage boom"
    annual_absorption_sf: 4_000_000
    quarterly_pattern: [0.22, 0.30, 0.28, 0.20]
    probability: 25
    key_assumption: "Amazon announces 1M+ SF BTS in 2027. Reshoring drives 2+ new tenants >500k SF."

  bear_case:
    description: "Mild recession, e-commerce growth stalls, 3PL consolidation"
    annual_absorption_sf: 2_000_000
    quarterly_pattern: [0.20, 0.25, 0.30, 0.25]
    probability: 25
    key_assumption: "Consumer spending decline -2%. Two major 3PL tenants consolidate operations, releasing 500k SF."

