# worked-forecast-example.yaml
# Industrial submarket 3-year supply/demand forecast.
# Subject: Lehigh Valley, PA -- Upper Macungie Township industrial.
# Demonstrates pipeline analysis, absorption scenarios, rent impact, and investment implications.

