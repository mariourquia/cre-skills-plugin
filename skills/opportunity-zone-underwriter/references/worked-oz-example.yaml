---
# Opportunity Zone Underwriter Worked Example
# $2M Capital Gains into JC OZ Multifamily Development
# Tax rules current as of 2026
# All dollar amounts in USD
---

example:
  id: oz_example_01
  name: "$2M Capital Gains -- Jersey City OZ MF Development"
  description: >
    Investor with $2M in realized capital gains invests in a Qualified
    Opportunity Zone Fund (QOZF) developing a 48-unit multifamily project
    in a designated OZ census tract in Jersey City, NJ. Full analysis
    of OZ benefit quantification, compliance tests, substantial improvement,
    and after-tax IRR comparison (OZ vs non-OZ).

  # -------------------------------------------------------------------
  # INVESTOR PROFILE
  # -------------------------------------------------------------------
  investor:
    capital_gains_realized: 2_000_000
    gains_source: "Sale of appreciated tech stock (long-term capital gains)"
    gains_recognition_date: "2026-02-15"
    investment_deadline: "2026-08-14"       # 180-day window to invest in QOZF
    tax_status: "Individual, married filing jointly"
    federal_cap_gains_rate: 0.200
    niit_rate: 0.038                       # Net Investment Income Tax
    nj_state_rate: 0.089                   # NJ top rate on capital gains
    combined_cap_gains_rate: 0.327         # federal 20% + NIIT 3.8% + NJ 8.9%
    tax_liability_without_oz: 654_000      # 2,000,000 * 0.327

  # -------------------------------------------------------------------
  # OZ FUND & PROJECT
  # -------------------------------------------------------------------
  oz_fund:
    fund_name: "JC Heights Opportunity Fund LLC"
    fund_type: "Single-asset QOZF"
    oz_tract: "34017005600"                # Hudson County, JC Heights
    designation_year: 2018
    fund_structure: "LLC taxed as partnership"
    investor_ownership_pct: 0.25           # $2M of $8M total QOZF equity

  project:
    property_type: "Ground-up 48-unit multifamily"
    location: "Jersey City Heights, NJ"
    total_development_cost: 18_000_000
    land_cost: 2_500_000
    hard_costs: 12_000_000                 # $250K/unit
    soft_costs: 2_000_000                  # architecture, engineering, permits, legal
    developer_fee: 1_500_000               # 8.3% of TDC
    construction_timeline: "24 months"
    stabilization: "Month 30 (6 months post-completion)"
    unit_mix:
      studios: { count: 8, sf: 450, rent: 1_800 }
      one_bed: { count: 24, sf: 650, rent: 2_400 }
      two_bed: { count: 16, sf: 900, rent: 3_100 }
    total_nra: 32_400
    avg_rent_per_unit: 2_525
    gross_potential_rent: 1_454_400        # monthly $121,200 * 12
    stabilized_vacancy: 0.05
    stabilized_egi: 1_381_680
    stabilized_opex: 552_672               # 40% of EGI
    stabilized_noi: 829_008

    capital_stack:
      senior_construction_loan: 10_000_000  # 55.6% LTC
      qozf_equity: 8_000_000               # 44.4% of TDC
      total: 18_000_000

  # -------------------------------------------------------------------
  # OZ BENEFIT QUANTIFICATION
  # -------------------------------------------------------------------
  oz_benefits:
    description: >
      Three OZ tax benefits under IRC Section 1400Z-2. As of 2026, the
      deferral and step-up benefits have specific timing implications.
      The 10-year exclusion is the primary remaining benefit.

    benefit_1_deferral:
      description: >
        Capital gains tax on the original $2M gain is DEFERRED until the
        earlier of: (i) sale of QOZF interest, or (ii) December 31, 2026.
        The 2026 deadline was set by the TCJA and has NOT been extended
        as of this analysis date.
      original_gain: 2_000_000
      deferral_start: "2026-02-15"
      deferral_end: "2026-12-31"           # statutory deadline
      months_deferred: 10                  # Feb 2026 to Dec 2026
      tax_deferred: 654_000
      time_value_of_deferral: 32_700       # 654,000 * 5% * (10/12) = ~$27K-33K
      note: >
        The deferral benefit is minimal for 2026 investments because the
        statutory inclusion date (12/31/2026) is only 10 months away.
        For investors who invested in 2018-2019, the deferral was 7-8 years.
        The deferral still matters for cash flow planning but is not a
        significant economic driver for new 2026 OZ investments.

    benefit_2_step_up:
      description: >
        Basis step-up provisions: 10% step-up after 5-year hold and 15%
        step-up after 7-year hold on the DEFERRED gain. These reduce the
        deferred gain recognized on 12/31/2026 (or at sale).
      five_year_hold: false                # cannot achieve 5yr hold before 12/31/2026
      seven_year_hold: false               # cannot achieve 7yr hold before 12/31/2026
      step_up_applicable: "NONE"
      step_up_amount: 0
      taxable_deferred_gain: 2_000_000     # full gain recognized 12/31/2026
      tax_due_12_31_2026: 654_000          # must be paid with 2026 tax return (due 4/15/2027)
      note: >
        The step-up benefits have effectively EXPIRED for new 2026 OZ investors.
        The 5-year and 7-year holding periods cannot be met before 12/31/2026.
        Investors who entered in 2018-2019 received 10-15% step-up. This is
        a significant reduction in OZ attractiveness for new entrants.

    benefit_3_ten_year_exclusion:
      description: >
        The PERMANENT exclusion of gain on appreciation of the QOZF investment
        if held for 10+ years. This is the primary remaining benefit for
        2026 investors. The basis of the QOZF investment steps up to FMV
        at sale, eliminating all tax on post-investment appreciation.
      holding_period_required: 10           # years
      earliest_qualifying_sale: "2036-02-15"  # 10 years from investment date
      projected_qozf_interest_value_at_year_10: 5_500_000
      original_investment: 2_000_000
      appreciation: 3_500_000              # $5.5M - $2.0M
      tax_on_appreciation_without_oz: 1_144_500  # 3,500,000 * 0.327
      tax_on_appreciation_with_oz: 0       # EXCLUDED
      ten_year_exclusion_value: 1_144_500
      note: >
        The 10-year exclusion is the sole meaningful benefit for 2026 OZ
        investors. It eliminates tax on $3.5M of projected appreciation
        (a $1.145M tax savings). This is equivalent to reducing the effective
        cap gains rate to 0% on all post-investment appreciation. The benefit
        scales with the magnitude of appreciation -- higher IRR deals benefit
        more from the OZ structure.

    total_oz_benefit_summary:
      deferral_time_value: 32_700
      step_up_savings: 0
      ten_year_exclusion: 1_144_500
      total_benefit: 1_177_200
      net_benefit_after_deferred_tax: 523_200  # 1,177,200 - 654,000 (deferred gain tax still due)
      note: >
        Net OZ benefit = $523K. This is the 10-year exclusion ($1.145M)
        minus the fact that deferred gain tax ($654K) must still be paid.
        The investor pays $654K in 2026 (deferred gain) but avoids $1.145M
        in future gain tax. Net savings: $491K on an NPV basis.

  # -------------------------------------------------------------------
  # COMPLIANCE TESTS
  # -------------------------------------------------------------------
  compliance:

    qozb_test:
      description: >
        Qualified Opportunity Zone Business (QOZB) requirements. The QOZF
        must invest in a QOZB (or directly in QOZ property). The QOZB
        must satisfy several tests.
      tests:
        - test: "70% Tangible Property Test"
          requirement: "At least 70% of tangible property owned/leased by QOZB must be QOZ business property"
          project_status: "PASS"
          detail: "100% of tangible property (the MF building) is in the OZ tract. 100% > 70%."

        - test: "50% Gross Income Test"
          requirement: "At least 50% of gross income derived from active conduct of business in the OZ"
          project_status: "PASS"
          detail: "All rental income is from property located in the OZ tract. 100% > 50%."

        - test: "Less Than 5% Financial Assets"
          requirement: "No more than 5% of aggregate assets in nonqualified financial property"
          project_status: "PASS"
          detail: "Operating reserves held in bank accounts are < 5% of total assets. Reasonable working capital safe harbor applies during construction."

        - test: "Sin Business Exclusion"
          requirement: "Cannot be a golf course, country club, massage parlor, hot tub facility, suntan facility, racetrack, gambling, or liquor store"
          project_status: "PASS"
          detail: "Multifamily residential rental. No excluded business activities."

        - test: "No Triple Net Lease"
          requirement: "Cannot be a triple net lease business (passive rental to NNN tenant)"
          project_status: "PASS"
          detail: "The QOZB owns and operates the property directly (with property manager). Not a NNN lease to a single tenant."

      overall_qozb_status: "ALL TESTS PASS"

    substantial_improvement_test:
      description: >
        For existing buildings acquired by a QOZF/QOZB, the entity must
        substantially improve the property by doubling the basis in the
        building (excluding land) within 30 months of acquisition. For
        ground-up construction, this test is automatically satisfied because
        there is no existing building to improve.
      applies: false
      reason: "Ground-up new construction. No existing building basis to double."
      alternative_analysis:
        description: >
          If this were an EXISTING building acquisition, the test would apply.
          Worked example for comparison:
        hypothetical:
          building_purchase_price: 4_000_000
          land_allocation: 1_000_000
          building_basis: 3_000_000
          required_improvement: 3_000_000   # must DOUBLE the building basis
          improvement_deadline: "30 months from acquisition"
          total_required_investment: 7_000_000  # acquisition + improvements
          timeline: >
            $3M in improvements over 30 months = $100K/month spend rate.
            For a 48-unit building, this is $62,500/unit in renovation -- a
            heavy gut renovation. Achievable for a significant value-add but
            requires careful planning to meet the 30-month deadline.

      project_specific:
        structure: "Ground-up development on vacant land"
        land_basis: 2_500_000
        building_cost: 15_500_000           # hard + soft + developer fee
        improvement_ratio: 6.20             # 15.5M / 2.5M = 6.2x land basis
        test_result: "N/A -- new construction automatically qualifies"
        note: >
          For ground-up: the IRS treats the entire building as new QOZ
          business property. No substantial improvement test required.
          This is a significant advantage of new construction in OZ deals.

  # -------------------------------------------------------------------
  # AFTER-TAX IRR COMPARISON: OZ vs NON-OZ
  # -------------------------------------------------------------------
  irr_comparison:
    description: >
      Side-by-side 10-year proforma comparing the same project inside an
      OZ structure vs. a conventional (non-OZ) structure. Same development
      costs, same NOI, same exit. The only difference is tax treatment.

    assumptions:
      hold_period: 10
      noi_growth: 0.030                    # 3% annual
      exit_cap: 0.0525
      year_10_noi: 1_114_000              # 829,008 * (1.03)^10 * (adjusted for ramp)
      exit_value: 21_219_000              # 1,114,000 / 0.0525
      selling_costs: 318_285               # 1.5%
      net_sale_proceeds: 20_900_715
      investor_share: 0.25                 # investor owns 25% of fund
      investor_proceeds: 5_225_179
      construction_loan_repayment: -10_000_000  # at stabilization, replaced by permanent
      permanent_loan: 11_000_000           # 55% of stabilized value (~$21M * 0.55)
      permanent_rate: 0.060
      permanent_amort: 30

    oz_scenario:
      investment: 2_000_000
      deferred_gain_tax_year_1: -654_000   # paid with 2026 return
      note: "Investor must have $654K liquid to pay deferred gain tax in April 2027"
      annual_cash_flow_investor_share:
        year_1: -50_000                    # construction period, no income, paying carry costs
        year_2: -25_000                    # construction completing
        year_3: 42_000                     # stabilization year, first NOI distribution
        year_4: 55_000
        year_5: 62_000
        year_6: 70_000
        year_7: 78_000
        year_8: 86_000
        year_9: 95_000
        year_10: 105_000
      exit_proceeds_investor: 5_225_179
      gain_on_oz_investment: 3_225_179      # 5,225,179 - 2,000,000
      tax_on_gain: 0                        # 10-YEAR EXCLUSION
      net_exit_proceeds: 5_225_179
      total_cash_flows: [-2_654_000, -50_000, -25_000, 42_000, 55_000, 62_000, 70_000, 78_000, 86_000, 95_000, 5_330_179]
      # Year 0: -2,000,000 investment - 654,000 deferred tax = -2,654,000
      # Year 10: 105,000 cash flow + 5,225,179 exit = 5,330,179
      after_tax_irr: 0.241                 # 24.1%
      after_tax_equity_multiple: 2.19

    non_oz_scenario:
      investment: 2_000_000
      cap_gains_tax_paid_immediately: -654_000   # tax on original gain, paid now
      net_investable: 1_346_000                   # only $1.346M available to invest
      note: >
        Without OZ, the investor pays $654K tax on the capital gain IMMEDIATELY
        and only has $1.346M to invest. Alternatively, they invest the full $2M
        but the $654K is not deferred -- it must be paid regardless. For apples-
        to-apples, we assume the full $2M is invested and the $654K tax is
        an additional cash outflow in Year 0 (same as OZ scenario).
      annual_cash_flow_investor_share:
        year_1: -50_000
        year_2: -25_000
        year_3: 42_000
        year_4: 55_000
        year_5: 62_000
        year_6: 70_000
        year_7: 78_000
        year_8: 86_000
        year_9: 95_000
        year_10: 105_000
      exit_proceeds_investor: 5_225_179
      gain_on_investment: 3_225_179
      tax_on_gain: 1_054_633               # 3,225,179 * 0.327 combined rate
      net_exit_after_tax: 4_170_546
      total_cash_flows: [-2_654_000, -50_000, -25_000, 42_000, 55_000, 62_000, 70_000, 78_000, 86_000, 95_000, 4_275_546]
      # Year 10: 105,000 + 4,170,546 = 4,275,546
      after_tax_irr: 0.187                 # 18.7%
      after_tax_equity_multiple: 1.79

    comparison:
      oz_after_tax_irr: 0.241
      non_oz_after_tax_irr: 0.187
      irr_advantage: 0.054                 # 540bps
      oz_equity_multiple: 2.19
      non_oz_equity_multiple: 1.79
      multiple_advantage: 0.40
      tax_savings_at_exit: 1_054_633
      note: >
        The OZ structure adds 540bps to after-tax IRR and 0.40x to equity
        multiple. The entire benefit comes from the 10-year exclusion
        (zero tax on $3.2M of appreciation). The deferral benefit is
        negligible for 2026 entrants. The OZ premium is substantial and
        justifies the additional structuring complexity and compliance cost.

  # -------------------------------------------------------------------
  # RISKS & CONSIDERATIONS
  # -------------------------------------------------------------------
  risks:
    - id: OZ-R1
      category: "Legislative"
      description: >
        The 10-year exclusion has not been modified by Congress, but there is
        ongoing legislative interest in OZ reform. Risk that rules change
        mid-hold (e.g., gain exclusion capped, OZ tracts redesignated).
      mitigation: "Unlikely to retroactively revoke benefits for existing QOZF investments. Grandfathering is standard."

    - id: OZ-R2
      category: "Compliance"
      description: >
        90% asset test: QOZF must hold 90% of assets in QOZ property,
        tested semi-annually (June 30 and December 31). Failure to meet
        the test triggers a penalty of (shortfall * federal short-term rate * months).
      mitigation: "Single-asset fund simplifies compliance. All assets are in the OZ project."

    - id: OZ-R3
      category: "Liquidity"
      description: >
        10-year hold is required to capture the exclusion benefit. Investor
        capital is locked for a decade. No secondary market for QOZF interests.
        Early exit forfeits the exclusion entirely.
      mitigation: "Investor must confirm 10-year liquidity tolerance. Structure allows for refinance distributions (cash-out refi does not trigger gain recognition)."

    - id: OZ-R4
      category: "Development"
      description: >
        Ground-up construction in JC Heights carries standard development risk:
        cost overruns, permitting delays, construction labor constraints.
        Any delay pushes back stabilization and cash flow.
      mitigation: "Fixed-price GC contract with 10% contingency. All permits obtained prior to QOZF investment closing."

  # -------------------------------------------------------------------
  # RECOMMENDATION
  # -------------------------------------------------------------------
  recommendation:
    proceed: true
    rationale:
      - "540bps after-tax IRR advantage (24.1% vs 18.7%) is compelling"
      - "10-year exclusion saves $1.055M in capital gains tax at exit"
      - "Jersey City Heights is a strong MF submarket with transit access and development momentum"
      - "Ground-up construction avoids substantial improvement test complexity"
      - "Single-asset QOZF simplifies compliance and reporting"
    key_requirement: >
      Investor must have $654K in liquid funds to pay deferred gain tax with
      2026 return (due April 2027). This is a hard cash requirement on top
      of the $2M QOZF investment. Total capital commitment: $2.654M.
    structuring_notes:
      - "QOZF must be formed and self-certified on IRS Form 8996"
      - "Investment must be made within 180 days of gain recognition (by August 2026)"
      - "Fund must file Form 8996 annually to certify 90% asset test compliance"
      - "Investor must file Form 8997 annually to report QOZF investment"
      - "At exit (2036+), investor takes basis step-up to FMV -- no gain recognition"
